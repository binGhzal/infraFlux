---
# Staging Environment Policies
apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-policies
  namespace: flux-system
data:
  update-policy: "aggressive"
  validation-policy: "warn"
  rollback-policy: "automatic"
  pre-release-policy: "allow"
  
---
# Resource quotas for staging (relaxed)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-quota
  namespace: default
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"