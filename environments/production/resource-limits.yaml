---
# Production Resource Limits
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: default
spec:
  limits:
  - default:
      cpu: "200m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container
    
---
# Pod disruption budget template
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: production-pdb-template
  namespace: flux-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      environment: production