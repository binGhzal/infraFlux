apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infraflux-deployment
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: infraflux-source
  path: "./deployments"
  prune: true
  wait: true
  timeout: 30m
  dependsOn:
    - name: infraflux-config
  postBuild:
    substitute:
      CLUSTER_NAME: "${cluster_name}"
      NETWORK_CIDR: "${network_cidr}"
      PROXMOX_HOST: "${proxmox_host}"
      CONTROLLER_COUNT: "${controller_count}"
      WORKER_COUNT: "${worker_count}"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: infraflux-source
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/your-username/infraFlux
