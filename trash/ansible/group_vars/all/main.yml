# InfraFlux Global Configuration
# This file contains the main configuration for your infrastructure deployment
# Most settings have sensible defaults and will auto-detect your environment

# =============================================================================
# BASIC SETTINGS - Customize these for your environment
# =============================================================================

# Cluster domain name (used for certificates and DNS)
cluster_domain: "{{ cluster_domain | default('local.cluster') }}"

# Admin email for Let's Encrypt certificates
admin_email: "{{ admin_email | default('admin@' + cluster_domain) }}"

# SSH user for all nodes (will auto-detect if not specified)
ansible_user: "{{ ansible_user | default('ubuntu') }}"

# =============================================================================
# NETWORK CONFIGURATION - Auto-detected from inventory
# =============================================================================

# Network settings are auto-detected from your inventory file
# You can override them here if needed

# Cluster network CIDR (auto-detected from ansible_host IPs)
# cluster_network: "10.0.0.0/16"

# Service network for Kubernetes services
service_network: "{{ service_network | default('10.96.0.0/12') }}"

# Pod network for Kubernetes pods
pod_network: "{{ pod_network | default('10.244.0.0/16') }}"

# =============================================================================
# FEATURES - Enable/disable components
# =============================================================================

# Core Kubernetes features
features:
  # High Availability (requires 3+ master nodes)
  ha_enabled: "{{ (groups['k3s_servers'] | length) >= 3 }}"

  # Load balancer (HAProxy + Keepalived)
  loadbalancer_enabled: "{{ features.ha_enabled }}"

  # GitOps with Flux
  flux_enabled: true

  # Authentication with Authentik
  authentik_enabled: true

  # Runtime security with Tetragon
  tetragon_enabled: true

  # Secure containers with Kata
  kata_containers_enabled: false

  # Backup with Velero
  backup_enabled: true

  # Monitoring and dashboards
  monitoring_enabled: true

# =============================================================================
# PROXMOX CONFIGURATION
# =============================================================================

proxmox:
  # VM defaults
  vm_defaults:
    memory: 4096        # MB
    cores: 2
    disk_size: 32       # GB
    storage: "local-lvm"
    network_bridge: "vmbr1"

  # VM sizes for different node types
  vm_sizes:
    controller:
      memory: 2048
      cores: 2
      disk_size: 20
    k3s_server:
      memory: 4096
      cores: 4
      disk_size: 32
    k3s_agent:
      memory: 8192
      cores: 8
      disk_size: 64

# =============================================================================
# PACKAGE VERSIONS - Latest stable versions
# =============================================================================

packages:
  k3s:
    version: "v1.31.5+k3s1"
  flux:
    version: "2.3.0"
  cilium:
    version: "1.16.5"
    cli_version: "v0.16.5"
  helm:
    version: "v3.16.4"
  tetragon:
    version: "1.2.0"
  kata_containers:
    version: "3.1.3"
  velero:
    version: "v1.12.0"
  autorestic:
    version: "1.7.9"

# =============================================================================
# SECURITY SETTINGS
# =============================================================================

security:
  # Automatically update packages
  auto_updates: true

  # Enable UFW firewall
  firewall_enabled: true

  # SSH hardening
  ssh_hardening: true

  # Fail2ban for intrusion prevention
  fail2ban_enabled: true

# =============================================================================
# ADVANCED SETTINGS - Usually don't need to change
# =============================================================================

# Kubernetes cluster configuration
k3s:
  # Disable built-in components (we'll use our own)
  disable:
    - traefik
    - servicelb
    - local-storage

  # Extra arguments for k3s server
  server_args: "--disable-network-policy --flannel-backend=none"

  # Extra arguments for k3s agent
  agent_args: ""

# Storage configuration
storage:
  # Local storage with TopoLVM
  local_storage: true

  # Storage classes to create
  storage_classes:
    - name: "local-fast"
      type: "ssd"
    - name: "local-bulk"
      type: "hdd"