---
# Main deployment playbook for infraFlux
# This orchestrates the entire deployment process through modular task playbooks

# Phase 1: Infrastructure Setup (Proxmox VMs)
- import_playbook: playbooks/infrastructure.yml
  when:
    - "'proxmox_servers' in groups"
    - "'proxmox_vms' in groups"

# Phase 2: Node Preparation
- import_playbook: playbooks/node-preparation.yml

# Phase 3: K3s Cluster Setup (Masters)
- import_playbook: playbooks/k3s-cluster.yml
  when: "'k3s_servers' in groups"

# Phase 4: Controllers Setup
- import_playbook: playbooks/controllers.yml
  when: "'controllers' in groups"

# Phase 5: Worker Nodes Setup
- import_playbook: playbooks/workers.yml
  when:
    - "('k3s_agents' in groups) or ('k3s_contended' in groups) or ('k3s_dedicated' in groups)"

# Phase 6: Kubernetes Applications and Services
- import_playbook: playbooks/applications.yml
  when: "'controllers' in groups"

# Special Case: Speedtester Nodes
- import_playbook: playbooks/speedtesters.yml
  when: "'speedtesters' in groups"

