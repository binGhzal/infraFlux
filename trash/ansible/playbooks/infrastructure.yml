---
# Infrastructure Setup - Proxmox VM Creation
# This playbook handles the creation and initial setup of VMs in Proxmox

- hosts: proxmox_servers:proxmox_vms
  gather_facts: no # because the nodes aren't up yet

  tasks:
    - { import_role: { name: proxmox }, tags: [ proxmox ] }
    - { import_role: { name: proxmox-controller }, tags: [ proxmox-controller ] }

- name: Wait for VMs to be ready
  hosts: proxmox_vms
  gather_facts: no
  tasks:
    - name: Wait for VMs to be reachable
      wait_for_connection:
        delay: 30
        timeout: 300
      ignore_errors: yes
