---
# Kubernetes Applications and Services Setup
# This playbook installs and configures Kubernetes applications and services

- hosts: controllers
  gather_facts: yes
  become: yes

  tasks:
    - name: Set host architecture
      set_fact:
        host_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"
      tags: always

    # Core Kubernetes services
    - name: Setup Sealed Secrets
      import_role:
        name: sealed-secrets
      tags: [ sealed-secrets ]

    - name: Setup Velero backup
      import_role:
        name: velero
      tags: [ velero ]

    # GitOps and Application Management
    - name: Setup Flux GitOps
      import_role:
        name: flux
      tags: [ flux ]
      when: flux_enabled | default(true)

    # Monitoring and Observability
    - name: Setup Grafana dashboards
      import_role:
        name: grafana-dashboards
      tags: [ grafana-dashboards ]

    - name: Setup Tetragon security monitoring
      import_role:
        name: tetragon
      tags: [ tetragon ]

    # Authentication and Authorization
    - name: Setup Authentik authentication
      import_role:
        name: authentik
      tags: [ authentik ]
      when: authentik_enabled | default(true)
