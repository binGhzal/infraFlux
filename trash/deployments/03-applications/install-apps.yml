---
- name: Deploy Core Applications
  hosts: controllers[0]
  become: no
  tasks:
    - name: Install Cilium CNI
      kubernetes.core.helm:
        name: cilium
        chart_ref: cilium/cilium
        chart_version: "1.14.5"
        release_namespace: kube-system
        create_namespace: yes
        values:
          operator:
            replicas: 1
          hubble:
            enabled: true
            relay:
              enabled: true
            ui:
              enabled: true
          cluster:
            name: "{{ cluster_name | default('k3s-cluster') }}"
            id: 1
      when: install_cilium | default(true) | bool

    - name: Install MetalLB Load Balancer
      kubernetes.core.helm:
        name: metallb
        chart_ref: metallb/metallb
        chart_version: "0.13.12"
        release_namespace: metallb-system
        create_namespace: yes
      when: install_metallb | default(true) | bool

    - name: Configure MetalLB IP Pool
      kubernetes.core.k8s:
        definition:
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: main-pool
            namespace: metallb-system
          spec:
            addresses:
              - "{{ metallb_ip_range | default(start_ip | ipmath(50) + '-' + start_ip | ipmath(60)) }}"
      when: install_metallb | default(true) | bool

    - name: Install Ingress NGINX
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        chart_version: "4.8.3"
        release_namespace: ingress-nginx
        create_namespace: yes
        values:
          controller:
            service:
              type: LoadBalancer
            metrics:
              enabled: true
      when: install_ingress_nginx | default(true) | bool

    - name: Install Cert Manager
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        chart_version: "1.13.3"
        release_namespace: cert-manager
        create_namespace: yes
        values:
          installCRDs: true
          prometheus:
            enabled: true
      when: install_cert_manager | default(true) | bool

    - name: Install Prometheus Stack
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: "55.5.0"
        release_namespace: monitoring
        create_namespace: yes
        values:
          prometheus:
            prometheusSpec:
              retention: "15d"
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 10Gi
          grafana:
            adminPassword: "{{ grafana_admin_password | default('admin123') }}"
            service:
              type: LoadBalancer
      when: install_monitoring | default(true) | bool

    - name: Install Sealed Secrets
      kubernetes.core.helm:
        name: sealed-secrets
        chart_ref: sealed-secrets/sealed-secrets
        chart_version: "2.15.1"
        release_namespace: kube-system
      when: install_sealed_secrets | default(true) | bool

    - name: Install Velero Backup
      kubernetes.core.helm:
        name: velero
        chart_ref: vmware-tanzu/velero
        chart_version: "5.2.0"
        release_namespace: velero
        create_namespace: yes
        values:
          configuration:
            backupStorageLocation:
              bucket: "{{ backup_bucket | default('cluster-backups') }}"
              config:
                region: "{{ backup_region | default('us-east-1') }}"
          schedules:
            daily:
              disabled: false
              schedule: "{{ backup_schedule | default('0 2 * * *') }}"
              template:
                ttl: "720h"
      when: enable_backup | default(true) | bool

    - name: Wait for all deployments to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ item }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 600
      loop:
        - kube-system
        - metallb-system
        - ingress-nginx
        - cert-manager
        - monitoring
      ignore_errors: yes
