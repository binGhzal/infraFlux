---
- name: "Creating VM: {{ vm_name }}"
  debug:
    msg:
      - "VM ID: {{ vm_id }}"
      - "Name: {{ vm_name }}"
      - "IP: {{ vm_ip }}/{{ network_prefix }}"
      - "Type: {{ vm_type }}"

- name: Create VM on Proxmox
  proxmox_kvm:
    api_host: "{{ config.proxmox_host }}"
    api_user: "{{ config.proxmox_user | default('root@pam') }}"
    api_password: "{{ proxmox_password }}"
    node: "{{ config.proxmox_node | default('pve') }}"
    vmid: "{{ vm_id }}"
    name: "{{ vm_name }}"
    clone: "{{ config.vm_template_name | default('ubuntu-template') }}"
    full: yes
    storage: "{{ config.proxmox_storage | default('local-lvm') }}"
    memory: "{{ config.vm_memory | default('4096') }}"
    cores: "{{ config.vm_cores | default('2') }}"
    net:
      net0: "virtio,bridge=vmbr0"
    ipconfig:
      ipconfig0: "ip={{ vm_ip }}/{{ network_prefix }},gw={{ gateway_ip }}"
    sshkeys: "{{ lookup('file', config.ssh_key_path | default('~/.ssh/id_rsa.pub')) }}"
    state: present
    timeout: 300
  register: vm_result

- name: Start VM
  proxmox_kvm:
    api_host: "{{ config.proxmox_host }}"
    api_user: "{{ config.proxmox_user | default('root@pam') }}"
    api_password: "{{ proxmox_password }}"
    node: "{{ config.proxmox_node | default('pve') }}"
    vmid: "{{ vm_id }}"
    state: started
  when: vm_result.changed

- name: "✅ VM {{ vm_name }} created successfully"
  debug:
    msg: "VM {{ vm_name }} ({{ vm_ip }}) is ready"
