---
- name: Download K3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'

- name: Install first K3s server (cluster init)
  environment:
    INSTALL_K3S_VERSION: "{{ config.k3s_version | default('v1.28.5+k3s1') }}"
    K3S_TOKEN: "{{ k3s_token }}"
  shell: |
    /tmp/k3s-install.sh server \
    --cluster-init \
    --disable servicelb \
    --disable traefik \
    --cluster-cidr="{{ config.pod_cidr | default('10.244.0.0/16') }}" \
    --service-cidr="{{ config.service_cidr | default('10.96.0.0/12') }}" \
    --cluster-dns="{{ config.cluster_dns | default('10.96.0.10') }}" \
    --write-kubeconfig-mode=644
  when: is_first_server | default(false)

- name: Wait for first server to be ready
  wait_for:
    port: 6443
    host: "{{ ansible_host }}"
    delay: 10
    timeout: 300
  when: is_first_server | default(false)

- name: Install additional K3s servers
  environment:
    INSTALL_K3S_VERSION: "{{ config.k3s_version | default('v1.28.5+k3s1') }}"
    K3S_TOKEN: "{{ k3s_token }}"
    K3S_URL: "https://{{ join_server }}:6443"
  shell: |
    /tmp/k3s-install.sh server \
    --disable servicelb \
    --disable traefik \
    --write-kubeconfig-mode=644
  when: not (is_first_server | default(false))

- name: Wait for server to be ready
  wait_for:
    port: 6443
    host: "{{ ansible_host }}"
    delay: 10
    timeout: 300

- name: Verify K3s server is running
  systemd:
    name: k3s
    state: started
    enabled: yes
