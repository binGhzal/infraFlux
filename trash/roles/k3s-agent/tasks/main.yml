---
- name: Download K3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'

- name: Install K3s agent
  environment:
    INSTALL_K3S_VERSION: "{{ config.k3s_version | default('v1.28.5+k3s1') }}"
    K3S_URL: "https://{{ k3s_server_ip }}:6443"
    K3S_TOKEN: "{{ k3s_token }}"
  shell: /tmp/k3s-install.sh agent

- name: Wait for agent to be ready
  wait_for:
    port: 10250
    host: "{{ ansible_host }}"
    delay: 10
    timeout: 300

- name: Verify K3s agent is running
  systemd:
    name: k3s-agent
    state: started
    enabled: yes
