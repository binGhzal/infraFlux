---
# Main tasks for VM template management

- name: "Include Packer variable generation"
  include_tasks: generate_packer_vars.yaml
  tags:
    - vm_template
    - packer_vars

- name: "Include template creation tasks"
  include_tasks: create_template.yaml
  tags:
    - vm_template
    - create

- name: "Include template validation tasks"
  include_tasks: validate_template.yaml
  tags:
    - vm_template
    - validate

- name: "Include template cleanup tasks"
  include_tasks: cleanup.yaml
  tags:
    - vm_template
    - cleanup
  when: vm_template_creation.cleanup_on_failure | bool