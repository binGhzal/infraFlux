---
# Generate Packer variables file

- name: "Validate required variables"
  assert:
    that:
      - talos_image_info is defined
      - talos_image_info.filename is defined
      - talos_image_info.version is defined
      - proxmox.api_url is defined
      - vault_proxmox_api_token is defined
    fail_msg: "Required variables missing for Packer template creation"

- name: "Set template facts"
  set_fact:
    template_name: "{{ vm_template_config.template_name_format | replace('{{ talos_version }}', talos_image_info.version) }}"
    template_vm_id: "{{ vm_template_config.base_vm_id + (groups['proxmox_servers'].index(inventory_hostname) if inventory_hostname in groups['proxmox_servers'] else 0) }}"

- name: "Create Packer variables for each Proxmox node"
  template:
    src: packer_variables.pkrvars.hcl.j2
    dest: "{{ playbook_dir }}/../packer/variables-{{ item }}.pkrvars.hcl"
    mode: '0600'
  vars:
    proxmox_node_name: "{{ item }}"
    node_vm_id: "{{ vm_template_config.base_vm_id + groups['proxmox_servers'].index(item) }}"
  loop: "{{ groups['proxmox_servers'] }}"
  register: packer_vars_files

- name: "Display generated Packer variables files"
  debug:
    msg: "Generated Packer variables: {{ packer_vars_files.results | map(attribute='dest') | list }}"

- name: "Validate Packer template file exists"
  stat:
    path: "{{ playbook_dir }}/../{{ packer_config.template_file }}"
  register: packer_template_stat

- name: "Fail if Packer template doesn't exist"
  fail:
    msg: "Packer template file not found: {{ packer_config.template_file }}"
  when: not packer_template_stat.stat.exists

- name: "Set Packer execution facts"
  set_fact:
    packer_template_path: "{{ playbook_dir }}/../{{ packer_config.template_file }}"
    packer_working_dir: "{{ playbook_dir }}/../packer"