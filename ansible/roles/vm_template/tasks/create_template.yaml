---
# Create VM templates using Packer

- name: "Check if Packer is installed"
  command: packer version
  register: packer_version_check
  failed_when: false
  changed_when: false

- name: "Fail if Packer is not installed"
  fail:
    msg: "Packer is not installed. Please install Packer first."
  when: packer_version_check.rc != 0

- name: "Display Packer version"
  debug:
    msg: "Using Packer {{ packer_version_check.stdout }}"

- name: "Check if template already exists on Proxmox nodes"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/nodes/{{ hostvars[item]['inventory_hostname'] }}/qemu"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
    timeout: 30
  register: existing_vms
  loop: "{{ groups['proxmox_servers'] }}"

- name: "Parse existing templates"
  set_fact:
    existing_templates: >-
      {{
        existing_vms.results |
        map(attribute='json.data') |
        flatten |
        selectattr('template', 'defined') |
        selectattr('template', 'equalto', 1) |
        selectattr('name', 'match', template_name + '.*') |
        list
      }}

- name: "Display existing templates"
  debug:
    msg: "Found existing templates: {{ existing_templates | map(attribute='name') | list }}"
  when: existing_templates | length > 0

- name: "Create VM templates with Packer"
  block:
    - name: "Initialize Packer"
      command: packer init {{ packer_template_path }}
      args:
        chdir: "{{ packer_working_dir }}"
      register: packer_init
      changed_when: "'downloaded successfully' in packer_init.stdout"

    - name: "Validate Packer template"
      command: >
        packer validate 
        -var-file="variables-{{ hostvars[item]['inventory_hostname'] }}.pkrvars.hcl"
        {{ packer_template_path | basename }}
      args:
        chdir: "{{ packer_working_dir }}"
      register: packer_validate
      loop: "{{ groups['proxmox_servers'] }}"
      when: >
        template_name not in 
        (existing_templates | selectattr('node', 'equalto', hostvars[item]['inventory_hostname']) | map(attribute='name') | list)

    - name: "Build VM templates with Packer"
      command: >
        packer build
        -var-file="variables-{{ hostvars[item]['inventory_hostname'] }}.pkrvars.hcl"
        {{ packer_template_path | basename }}
      args:
        chdir: "{{ packer_working_dir }}"
      environment:
        PACKER_LOG: "{{ packer_config.log_level }}"
        PACKER_LOG_PATH: "/tmp/packer-{{ hostvars[item]['inventory_hostname'] }}.log"
      register: packer_build
      loop: "{{ groups['proxmox_servers'] }}"
      when: >
        template_name not in 
        (existing_templates | selectattr('node', 'equalto', hostvars[item]['inventory_hostname']) | map(attribute='name') | list)
      async: "{{ vm_template_creation.timeout }}"
      poll: 30

    - name: "Display Packer build results"
      debug:
        msg:
          - "Node: {{ item.item }}"
          - "Status: {{ 'Success' if item.rc == 0 else 'Failed' }}"
          - "Duration: {{ item.delta if item.delta is defined else 'N/A' }}"
      loop: "{{ packer_build.results | default([]) }}"
      when: item is not skipped

  rescue:
    - name: "Handle Packer build failures"
      debug:
        msg: "Packer build failed for some nodes. Check logs for details."
      
    - name: "Display Packer logs location"
      debug:
        msg: "Packer logs available at: /tmp/packer-*.log"

    - name: "Fail the task"
      fail:
        msg: "VM template creation failed"

- name: "Wait for template creation to complete"
  pause:
    seconds: 30
  when: packer_build.results | default([]) | selectattr('started', 'equalto', 1) | list | length > 0

- name: "Verify templates were created successfully"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/nodes/{{ hostvars[item]['inventory_hostname'] }}/qemu"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
    timeout: 30
  register: verify_templates
  loop: "{{ groups['proxmox_servers'] }}"
  retries: 3
  delay: 10

- name: "Parse created templates"
  set_fact:
    created_templates: >-
      {{
        verify_templates.results |
        map(attribute='json.data') |
        flatten |
        selectattr('template', 'defined') |
        selectattr('template', 'equalto', 1) |
        selectattr('name', 'match', template_name + '.*') |
        list
      }}

- name: "Display template creation results"
  debug:
    msg:
      - "VM Template Creation Results"
      - "============================"
      - "Template Name: {{ template_name }}"
      - "Created Templates: {{ created_templates | length }}"
      - "Target Nodes: {{ groups['proxmox_servers'] | length }}"
      - "Templates: {{ created_templates | map(attribute='name') | list }}"

- name: "Ensure templates exist on all nodes"
  assert:
    that:
      - created_templates | length > 0
    fail_msg: "No VM templates were created successfully"

- name: "Set template creation facts"
  set_fact:
    vm_template_info:
      name: "{{ template_name }}"
      version: "{{ talos_image_info.version }}"
      created_templates: "{{ created_templates }}"
      nodes: "{{ groups['proxmox_servers'] }}"
      creation_completed: "{{ ansible_date_time.iso8601 }}"