---
# Generate Talos cluster configuration

- name: "Set configuration generation facts"
  set_fact:
    config_generation_start: "{{ ansible_date_time.iso8601 }}"

- name: "Generate cluster secrets"
  command: >
    talosctl gen secrets
    --output-file {{ talos_config.output_directory }}/secrets.yaml
  register: secrets_generation
  when: config_generation.generate_secrets | bool

- name: "Generate base cluster configuration"
  command: >
    talosctl gen config {{ cluster.name }}
    https://{{ cluster.talos.networking.cluster_endpoint }}:6443
    --output-dir {{ talos_config.output_directory }}
    --config-version {{ talos_config.config_version }}
    {{ '--with-secrets ' + talos_config.output_directory + '/secrets.yaml' if config_generation.generate_secrets else '' }}
    --kubernetes-version {{ cluster.talos.kubernetes_version }}
  register: config_generation_result

- name: "Validate base configuration generation"
  assert:
    that:
      - config_generation_result.rc == 0
    fail_msg: "Failed to generate base Talos configuration"

- name: "Read generated controlplane configuration"
  slurp:
    src: "{{ talos_config.output_directory }}/controlplane.yaml"
  register: base_controlplane_config

- name: "Read generated worker configuration"
  slurp:
    src: "{{ talos_config.output_directory }}/worker.yaml"
  register: base_worker_config

- name: "Parse base configurations"
  set_fact:
    base_controlplane_data: "{{ base_controlplane_config.content | b64decode | from_yaml }}"
    base_worker_data: "{{ base_worker_config.content | b64decode | from_yaml }}"

- name: "Generate control plane node configurations"
  template:
    src: controlplane.yaml.j2
    dest: "{{ talos_config.output_directory }}/controlplane/{{ hostvars[item]['inventory_hostname'] }}.yaml"
    mode: '0600'
  loop: "{{ groups['control_plane'] | default([]) }}"
  vars:
    node_hostname: "{{ hostvars[item]['inventory_hostname'] }}"
    node_ip: "{{ hostvars[item]['ansible_host'] | default(hostvars[item]['inventory_hostname']) }}"
    is_control_plane: true
    base_config: "{{ base_controlplane_data }}"

- name: "Generate worker node configurations"
  template:
    src: worker.yaml.j2
    dest: "{{ talos_config.output_directory }}/worker/{{ hostvars[item]['inventory_hostname'] }}.yaml"
    mode: '0600'
  loop: "{{ groups['workers'] | default([]) }}"
  vars:
    node_hostname: "{{ hostvars[item]['inventory_hostname'] }}"
    node_ip: "{{ hostvars[item]['ansible_host'] | default(hostvars[item]['inventory_hostname']) }}"
    is_control_plane: false
    base_config: "{{ base_worker_data }}"

- name: "Set configuration facts"
  set_fact:
    talos_configs_generated:
      - "{{ talos_config.output_directory }}/talosconfig"
      - "{{ talos_config.output_directory }}/controlplane.yaml"
      - "{{ talos_config.output_directory }}/worker.yaml"
    talos_secrets_file: "{{ talos_config.output_directory }}/secrets.yaml"
    config_generation_complete: true

- name: "Display generation results"
  debug:
    msg:
      - "Configuration Generation Complete"
      - "================================"
      - "Base configs: controlplane.yaml, worker.yaml"
      - "Node-specific configs: {{ (groups['control_plane'] | default([]) | length) + (groups['workers'] | default([]) | length) }}"
      - "Secrets file: {{ 'Generated' if config_generation.generate_secrets else 'Skipped' }}"
      - "Talosconfig: {{ talos_config.output_directory }}/talosconfig"