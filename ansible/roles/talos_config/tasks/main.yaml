---
# Talos Configuration Generator Main Tasks

- name: "Display Talos configuration banner"
  debug:
    msg:
      - "========================================="
      - "   Talos Configuration Generator"
      - "========================================="
      - "Cluster: {{ cluster.name }}"
      - "Talos Version: {{ cluster.talos.version }}"
      - "Kubernetes Version: {{ cluster.talos.kubernetes_version }}"
      - "Endpoint: {{ cluster.talos.networking.cluster_endpoint }}"
      - "========================================="

- name: "Create output directories"
  file:
    path: "{{ item }}"
    state: directory
    mode: '0750'
  loop:
    - "{{ talos_config.output_directory }}"
    - "{{ talos_config.output_directory }}/controlplane"
    - "{{ talos_config.output_directory }}/worker"
    - "{{ talos_config.output_directory }}/patches"
    - "{{ backup.backup_directory if backup.enabled else talos_config.output_directory + '/unused' }}"

- name: "Check for existing configurations"
  stat:
    path: "{{ talos_config.output_directory }}/talosconfig"
  register: existing_talosconfig

- name: "Generate Talos cluster configuration"
  include_tasks: generate_configs.yaml
  when: >
    config_generation.force_regenerate | bool or
    not existing_talosconfig.stat.exists

- name: "Apply node-specific patches"
  include_tasks: apply_patches.yaml
  when: config_generation.generate_patches | bool

- name: "Validate generated configurations"
  include_tasks: validate_configs.yaml
  when: validation.syntax_check | bool

- name: "Bundle configurations"
  include_tasks: bundle_configs.yaml
  when: config_generation.bundle_configs | bool

- name: "Create backup"
  include_tasks: backup_configs.yaml
  when: backup.enabled | bool

- name: "Bootstrap cluster"
  include_tasks: bootstrap_cluster.yaml
  when: bootstrap.enabled | bool

- name: "Display configuration summary"
  debug:
    msg:
      - "Talos Configuration Complete"
      - "============================"
      - "Configurations generated: {{ talos_configs_generated | default([]) | length }}"
      - "Output directory: {{ talos_config.output_directory }}"
      - "Talosconfig: {{ talos_config.output_directory }}/talosconfig"
      - "Control plane configs: {{ groups['control_plane'] | length if groups['control_plane'] is defined else 0 }}"
      - "Worker configs: {{ groups['workers'] | length if groups['workers'] is defined else 0 }}"
      - "Bootstrap ready: {{ bootstrap_ready | default(false) }}"