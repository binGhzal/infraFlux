---
# Talos Configuration Generator defaults

# Talos configuration generation
talos_config:
  generate_configs: true
  config_version: "v1alpha1"
  persist_configs: true
  validate_configs: true
  output_directory: "{{ playbook_dir }}/generated/talos"

# Cluster bootstrap
bootstrap:
  enabled: true
  wait_for_cluster: true
  timeout: 600  # 10 minutes
  check_interval: 30
  bootstrap_node: "{{ groups['control_plane'][0] if groups['control_plane'] is defined else '' }}"

# Configuration generation options
config_generation:
  force_regenerate: false
  include_examples: true
  generate_patches: true
  generate_secrets: true
  bundle_configs: true

# Node configuration
node_config:
  control_plane:
    install_disk: "/dev/sda"
    install_image: "{{ cluster.talos.install_image | default('ghcr.io/siderolabs/installer:' + cluster.talos.version) }}"
    extra_kernel_args: []
    extra_mounts: []
    sysctls: {}
  
  worker:
    install_disk: "/dev/sda"
    install_image: "{{ cluster.talos.install_image | default('ghcr.io/siderolabs/installer:' + cluster.talos.version) }}"
    extra_kernel_args: []
    extra_mounts: []
    sysctls: {}

# Network configuration
network_config:
  force_dhcp: false
  dns_servers:
    - "8.8.8.8"
    - "1.1.1.1"
  ntp_servers:
    - "time.cloudflare.com"
    - "pool.ntp.org"

# Security configuration
security_config:
  generate_ca: true
  ca_validity_hours: 8760  # 1 year
  cert_validity_hours: 8760  # 1 year
  enable_encryption: true
  
# Kubernetes configuration
kubernetes_config:
  service_account:
    key_algorithm: "rsa"
    key_size: 2048
  audit_policy: true
  encryption_config: true
  
# CNI configuration
cni_config:
  name: "none"  # Will be configured post-bootstrap
  urls: []

# Additional features
features:
  stable_hostname: true
  kms_encryption: false
  cluster_discovery: true
  kubelet_certs: true

# Validation settings
validation:
  syntax_check: true
  schema_validation: true
  connectivity_test: false
  dry_run_apply: false

# Backup and recovery
backup:
  enabled: true
  backup_directory: "{{ talos_config.output_directory }}/backups"
  keep_backups: 3
  include_secrets: true