---
# Generate Terraform templates

- name: "Validate template files exist"
  stat:
    path: "{{ playbook_dir }}/../{{ item }}"
  register: template_files
  loop:
    - "{{ terraform_templates.main_template }}"
    - "{{ terraform_templates.variables_template }}"

- name: "Fail if template files are missing"
  fail:
    msg: "Template file not found: {{ item.item }}"
  loop: "{{ template_files.results }}"
  when: not item.stat.exists

- name: "Generate main.tf"
  template:
    src: "{{ playbook_dir }}/../{{ terraform_templates.main_template }}"
    dest: "{{ terraform_main_file }}"
    mode: '0644'
  register: main_tf_generated

- name: "Generate variables.tf"
  template:
    src: "{{ playbook_dir }}/../{{ terraform_templates.variables_template }}"
    dest: "{{ terraform_variables_file }}"
    mode: '0644'
  register: variables_tf_generated

- name: "Generate terraform.tfvars"
  template:
    src: terraform.tfvars.j2
    dest: "{{ terraform_tfvars_file }}"
    mode: '0600'
  when: terraform_generation.create_tfvars | bool

- name: "Validate generated Terraform syntax"
  block:
    - name: "Initialize Terraform"
      command: terraform init
      args:
        chdir: "{{ terraform_config.workspace_dir }}"
      register: terraform_init_result

    - name: "Validate Terraform configuration"
      command: terraform validate
      args:
        chdir: "{{ terraform_config.workspace_dir }}"
      register: terraform_validate_result

    - name: "Format Terraform files"
      command: terraform fmt
      args:
        chdir: "{{ terraform_config.workspace_dir }}"
      register: terraform_fmt_result
      when: terraform_generation.format_files | bool

  rescue:
    - name: "Handle Terraform validation failure"
      debug:
        msg:
          - "Terraform validation failed:"
          - "Init output: {{ terraform_init_result.stdout if terraform_init_result is defined else 'N/A' }}"
          - "Validation output: {{ terraform_validate_result.stdout if terraform_validate_result is defined else 'N/A' }}"
          - "Error: {{ terraform_validate_result.stderr if terraform_validate_result is defined else 'N/A' }}"

    - name: "Clean up on validation failure"
      file:
        path: "{{ terraform_config.workspace_dir }}"
        state: absent
      when: terraform_generation.cleanup_on_error | bool

    - name: "Fail the task"
      fail:
        msg: "Terraform configuration validation failed"

  when: terraform_generation.validate_syntax | bool

- name: "Display generation results"
  debug:
    msg:
      - "Terraform configuration generated successfully:"
      - "Main file: {{ terraform_main_file }}"
      - "Variables file: {{ terraform_variables_file }}"
      - "TFVars file: {{ terraform_tfvars_file if terraform_generation.create_tfvars else 'Not created' }}"
      - "Validation: {{ 'Passed' if terraform_generation.validate_syntax else 'Skipped' }}"
      - "Formatting: {{ 'Applied' if terraform_generation.format_files else 'Skipped' }}"

- name: "Set generation facts"
  set_fact:
    terraform_generation_complete: true
    terraform_files_generated:
      main: "{{ terraform_main_file }}"
      variables: "{{ terraform_variables_file }}"
      tfvars: "{{ terraform_tfvars_file if terraform_generation.create_tfvars else null }}"
    terraform_init_complete: "{{ terraform_init_result is defined and terraform_init_result.rc == 0 }}"