---
# Talos image cleanup tasks

- name: "Clean up old cached images"
  block:
    - name: "Find old image files in cache"
      find:
        paths: "{{ talos_image_cache.directory }}"
        patterns: "talos-*.img"
        age: "{{ talos_image_cache.max_age_days }}d"
        file_type: file
      register: old_images
      when: talos_image_cache.enabled | bool

    - name: "Display old images found"
      debug:
        msg: "Found {{ old_images.files | length }} old image files to clean up"
      when: 
        - talos_image_cache.enabled | bool
        - old_images.files is defined

    - name: "Remove old image files"
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_images.files }}"
      when:
        - talos_image_cache.enabled | bool
        - old_images.files is defined
        - old_images.files | length > 0

    - name: "Display cleanup results"
      debug:
        msg: "Cleaned up {{ old_images.files | length }} old image files"
      when:
        - talos_image_cache.enabled | bool
        - old_images.files is defined
        - old_images.files | length > 0

  rescue:
    - name: "Handle cleanup errors"
      debug:
        msg: "Warning: Some cleanup operations failed, but continuing..."

- name: "Clean up temporary directories"
  block:
    - name: "Find temporary directories"
      find:
        paths: "/tmp"
        patterns: "talos-*"
        file_type: directory
        age: "1h"
      register: temp_dirs

    - name: "Remove old temporary directories"
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ temp_dirs.files }}"
      when: temp_dirs.files | length > 0

  rescue:
    - name: "Handle temp cleanup errors"
      debug:
        msg: "Warning: Failed to clean some temporary directories"

- name: "Display cache status"
  debug:
    msg:
      - "Cache directory: {{ talos_image_cache.directory }}"
      - "Cache enabled: {{ talos_image_cache.enabled }}"
      - "Max age: {{ talos_image_cache.max_age_days }} days"
      - "Current image: {{ talos_image_info.filename }}"
  when: talos_image_cache.enabled | bool