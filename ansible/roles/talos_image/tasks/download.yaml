---
# Talos image download tasks

- name: "Ensure cache directory exists"
  file:
    path: "{{ talos_image_cache.directory }}"
    state: directory
    mode: '0755'
  when: talos_image_cache.enabled | bool

- name: "Set local image path"
  set_fact:
    talos_local_image_path: "{{ talos_image_cache.directory }}/{{ talos_image_info.filename }}"
  when: talos_image_cache.enabled | bool

- name: "Check if image already exists locally"
  stat:
    path: "{{ talos_local_image_path }}"
  register: local_image_stat
  when: talos_image_cache.enabled | bool

- name: "Check local image age"
  set_fact:
    image_too_old: >-
      {{
        (ansible_date_time.epoch | int) - (local_image_stat.stat.mtime | int) > 
        (talos_image_cache.max_age_days * 24 * 3600)
      }}
  when: 
    - talos_image_cache.enabled | bool
    - local_image_stat.stat.exists

- name: "Download Talos image"
  block:
    - name: "Create temporary download directory"
      tempfile:
        state: directory
        prefix: "talos-download-"
      register: download_temp_dir

    - name: "Download compressed Talos image"
      get_url:
        url: "{{ talos_image_info.url }}"
        dest: "{{ download_temp_dir.path }}/{{ talos_image_info.filename }}.{{ talos_image_config.compression }}"
        timeout: "{{ talos_download_config.timeout }}"
        mode: '0644'
      register: download_result
      retries: "{{ talos_download_config.retries }}"
      delay: 30

    - name: "Verify download size"
      stat:
        path: "{{ download_result.dest }}"
      register: downloaded_file

    - name: "Display download information"
      debug:
        msg:
          - "Downloaded: {{ download_result.dest }}"
          - "Size: {{ downloaded_file.stat.size | human_readable }}"
          - "Status: {{ download_result.status_code }}"

    - name: "Decompress image"
      command: >
        gunzip -f "{{ download_result.dest }}"
      when: talos_image_config.compression == "gz"
      register: decompress_result

    - name: "Set decompressed file path"
      set_fact:
        decompressed_file: "{{ download_result.dest | regex_replace('\\.' + talos_image_config.compression + '$', '') }}"

    - name: "Verify decompressed file"
      stat:
        path: "{{ decompressed_file }}"
      register: decompressed_stat

    - name: "Move image to cache directory"
      copy:
        src: "{{ decompressed_file }}"
        dest: "{{ talos_local_image_path }}"
        remote_src: true
        mode: '0644'
      when: talos_image_cache.enabled | bool

    - name: "Set final image path"
      set_fact:
        talos_final_image_path: "{{ talos_local_image_path if talos_image_cache.enabled else decompressed_file }}"

    - name: "Clean up temporary download directory"
      file:
        path: "{{ download_temp_dir.path }}"
        state: absent
      when: talos_image_cache.enabled | bool

  when: >
    not talos_image_cache.enabled | bool or
    not local_image_stat.stat.exists or
    image_too_old | default(false)

- name: "Use existing cached image"
  set_fact:
    talos_final_image_path: "{{ talos_local_image_path }}"
  when:
    - talos_image_cache.enabled | bool
    - local_image_stat.stat.exists
    - not (image_too_old | default(false))

- name: "Verify final image file"
  stat:
    path: "{{ talos_final_image_path }}"
  register: final_image_stat

- name: "Fail if image file doesn't exist"
  fail:
    msg: "Talos image file not found: {{ talos_final_image_path }}"
  when: not final_image_stat.stat.exists

- name: "Display final image information"
  debug:
    msg:
      - "Talos image ready: {{ talos_final_image_path }}"
      - "Size: {{ final_image_stat.stat.size | human_readable }}"
      - "Modified: {{ final_image_stat.stat.mtime | int | strftime('%Y-%m-%d %H:%M:%S') }}"

- name: "Update Talos image facts"
  set_fact:
    talos_image_info: "{{ talos_image_info | combine({
      'local_path': talos_final_image_path,
      'size_bytes': final_image_stat.stat.size,
      'downloaded': ansible_date_time.iso8601
    }) }}"