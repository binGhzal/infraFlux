---
# Main tasks for Talos image management

- name: "Include Talos image factory tasks"
  include_tasks: factory.yaml
  tags:
    - talos_image
    - factory

- name: "Include image download tasks"
  include_tasks: download.yaml
  tags:
    - talos_image
    - download

- name: "Include Proxmox image management tasks"
  include_tasks: proxmox.yaml
  tags:
    - talos_image
    - proxmox

- name: "Include image cleanup tasks"
  include_tasks: cleanup.yaml
  tags:
    - talos_image
    - cleanup
  when: talos_image_cache.cleanup_on_success | bool