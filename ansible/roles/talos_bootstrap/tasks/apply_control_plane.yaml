---
# Apply control plane configurations

- name: "Initialize control plane application tracking"
  set_fact:
    control_plane_apply_results: []
    control_plane_ready_nodes: []

- name: "Apply configuration to bootstrap node first"
  block:
    - name: "Apply config to bootstrap node {{ bootstrap_config.bootstrap_node }}"
      command: >
        talosctl apply-config
        --insecure
        --nodes {{ bootstrap_node_ip }}
        --file {{ talos_config.output_directory | default(playbook_dir + '/generated/talos') }}/controlplane/{{ bootstrap_config.bootstrap_node }}.yaml
      register: bootstrap_apply_result
      retries: "{{ bootstrap_config.retry_attempts }}"
      delay: "{{ bootstrap_config.retry_delay }}"

    - name: "Wait for bootstrap node to accept configuration"
      pause:
        seconds: "{{ bootstrap_process.wait_between_nodes }}"

    - name: "Verify bootstrap node is responding"
      uri:
        url: "https://{{ bootstrap_node_ip }}:50000/v1alpha1/machine/stats"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403]
      register: bootstrap_node_check
      retries: 10
      delay: 15
      until: bootstrap_node_check.status in [200, 401, 403]

    - name: "Add bootstrap node to ready list"
      set_fact:
        control_plane_ready_nodes: "{{ control_plane_ready_nodes + [bootstrap_config.bootstrap_node] }}"

  rescue:
    - name: "Handle bootstrap node configuration failure"
      debug:
        msg:
          - "Failed to apply configuration to bootstrap node"
          - "Error: {{ bootstrap_apply_result.stderr if bootstrap_apply_result is defined else 'Unknown error' }}"
          - "This may require manual intervention"

    - name: "Fail bootstrap process"
      fail:
        msg: "Bootstrap node configuration failed - cannot proceed"

- name: "Apply configuration to remaining control plane nodes"
  block:
    - name: "Apply config to {{ item }}"
      command: >
        talosctl apply-config
        --insecure
        --nodes {{ hostvars[item]['ansible_host'] | default(hostvars[item]['inventory_hostname']) }}
        --file {{ talos_config.output_directory | default(playbook_dir + '/generated/talos') }}/controlplane/{{ item }}.yaml
      register: cp_apply_result
      loop: "{{ groups['control_plane'] | default([]) }}"
      when: item != bootstrap_config.bootstrap_node
      retries: "{{ bootstrap_config.retry_attempts }}"
      delay: "{{ bootstrap_config.retry_delay }}"

    - name: "Wait between control plane node applications"
      pause:
        seconds: "{{ bootstrap_process.wait_between_nodes }}"
      when: bootstrap_process.sequential_application | bool

    - name: "Verify control plane nodes are responding"
      uri:
        url: "https://{{ hostvars[item]['ansible_host'] | default(hostvars[item]['inventory_hostname']) }}:50000/v1alpha1/machine/stats"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403]
      register: cp_nodes_check
      loop: "{{ groups['control_plane'] | default([]) }}"
      when: item != bootstrap_config.bootstrap_node
      retries: 8
      delay: 20
      until: cp_nodes_check.status in [200, 401, 403]

    - name: "Update control plane ready nodes list"
      set_fact:
        control_plane_ready_nodes: "{{ control_plane_ready_nodes + [item.item] }}"
      loop: "{{ cp_nodes_check.results }}"
      when: 
        - cp_nodes_check is defined
        - item.status in [200, 401, 403]

  rescue:
    - name: "Handle control plane configuration failures"
      debug:
        msg:
          - "Some control plane nodes failed configuration"
          - "Ready nodes: {{ control_plane_ready_nodes }}"
          - "Failed nodes may require manual intervention"

- name: "Wait for all control plane nodes to stabilize"
  pause:
    seconds: "{{ bootstrap_process.post_bootstrap_wait }}"

- name: "Perform control plane health check"
  uri:
    url: "https://{{ hostvars[item]['ansible_host'] | default(hostvars[item]['inventory_hostname']) }}:50000/v1alpha1/machine/stats"
    method: GET
    validate_certs: false
    status_code: [200, 401, 403]
  register: final_cp_health_check
  loop: "{{ control_plane_ready_nodes }}"
  retries: 5
  delay: 30

- name: "Set control plane application facts"
  set_fact:
    control_plane_configs_applied: true
    control_plane_ready_count: "{{ control_plane_ready_nodes | length }}"
    control_plane_total_count: "{{ groups['control_plane'] | length if groups['control_plane'] is defined else 0 }}"
    control_plane_application_successful: "{{ control_plane_ready_count | int == control_plane_total_count | int }}"

- name: "Create control plane application log"
  copy:
    content: |
      Control Plane Configuration Application
      =====================================
      Timestamp: {{ ansible_date_time.iso8601 }}
      Bootstrap Node: {{ bootstrap_config.bootstrap_node }} ({{ bootstrap_node_ip }})
      Total Nodes: {{ control_plane_total_count }}
      Ready Nodes: {{ control_plane_ready_count }}
      Ready Node List: {{ control_plane_ready_nodes | join(', ') }}
      Application Status: {{ 'SUCCESS' if control_plane_application_successful else 'PARTIAL' }}
      
      Node Details:
      {% for node in control_plane_ready_nodes %}
      - {{ node }}: {{ hostvars[node]['ansible_host'] | default(hostvars[node]['inventory_hostname']) }}
      {% endfor %}
    dest: "{{ logging.log_directory }}/control_plane_application.log"
    mode: '0644'
  when: logging.save_logs | bool

- name: "Display control plane application results"
  debug:
    msg:
      - "Control Plane Configuration Applied"
      - "=================================="
      - "Bootstrap node: {{ bootstrap_config.bootstrap_node }} ✓"
      - "Total nodes: {{ control_plane_total_count }}"
      - "Ready nodes: {{ control_plane_ready_count }}"
      - "Success rate: {{ control_plane_ready_count }}/{{ control_plane_total_count }}"
      - "Status: {{ 'SUCCESS' if control_plane_application_successful else 'PARTIAL' }}"
      - "Ready nodes: {{ control_plane_ready_nodes | join(', ') }}"