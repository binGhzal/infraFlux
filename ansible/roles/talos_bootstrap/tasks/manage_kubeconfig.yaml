---
# Generate and manage kubeconfig

- name: "Validate bootstrap completion"
  assert:
    that:
      - cluster_bootstrap_complete | default(false)
      - bootstrap_successful | default(false)
    fail_msg: "Cluster must be successfully bootstrapped before generating kubeconfig"

- name: "Generate kubeconfig"
  block:
    - name: "Generate kubeconfig from cluster"
      command: >
        talosctl kubeconfig
        --nodes {{ bootstrap_node_ip }}
        --endpoints {{ bootstrap_node_ip }}
        --talosconfig {{ talos_config.output_directory | default(playbook_dir + '/generated/talos') }}/talosconfig
        {{ kubeconfig.output_path }}
      register: kubeconfig_generation_result
      retries: 5
      delay: 30

    - name: "Verify kubeconfig file exists"
      stat:
        path: "{{ kubeconfig.output_path }}"
      register: kubeconfig_file_check

  rescue:
    - name: "Handle kubeconfig generation failure"
      debug:
        msg:
          - "Kubeconfig generation failed"
          - "Error: {{ kubeconfig_generation_result.stderr if kubeconfig_generation_result is defined else 'Unknown error' }}"
          - "This may indicate cluster bootstrap issues"

    - name: "Set kubeconfig generation failure"
      set_fact:
        kubeconfig_generated: false
        kubeconfig_validation_passed: false

- name: "Validate kubeconfig access"
  block:
    - name: "Test cluster access with kubectl version"
      command: kubectl version --kubeconfig {{ kubeconfig.output_path }}
      register: kubectl_version_test
      retries: 10
      delay: 15
      until: kubectl_version_test.rc == 0

    - name: "Test kubectl get nodes"
      command: kubectl get nodes --kubeconfig {{ kubeconfig.output_path }}
      register: kubectl_nodes_test
      retries: 15
      delay: 20
      until: kubectl_nodes_test.rc == 0

    - name: "Test kubectl get namespaces"
      command: kubectl get namespaces --kubeconfig {{ kubeconfig.output_path }}
      register: kubectl_namespaces_test

    - name: "Test kubectl cluster-info"
      command: kubectl cluster-info --kubeconfig {{ kubeconfig.output_path }}
      register: kubectl_cluster_info_test

  rescue:
    - name: "Handle kubeconfig validation failure"
      debug:
        msg:
          - "Kubeconfig validation failed"
          - "Cluster may not be fully ready"
          - "Some tests may have failed"

  when: 
    - kubeconfig.validate_access | bool
    - kubeconfig_file_check.stat.exists | default(false)

- name: "Parse kubectl test results"
  set_fact:
    kubeconfig_tests:
      kubectl_version: "{{ kubectl_version_test.rc == 0 if kubectl_version_test is defined else false }}"
      kubectl_nodes: "{{ kubectl_nodes_test.rc == 0 if kubectl_nodes_test is defined else false }}"
      kubectl_namespaces: "{{ kubectl_namespaces_test.rc == 0 if kubectl_namespaces_test is defined else false }}"
      kubectl_cluster_info: "{{ kubectl_cluster_info_test.rc == 0 if kubectl_cluster_info_test is defined else false }}"

- name: "Get cluster node information"
  command: kubectl get nodes -o json --kubeconfig {{ kubeconfig.output_path }}
  register: cluster_nodes_json
  when: kubeconfig_tests.kubectl_nodes | default(false)

- name: "Parse cluster nodes"
  set_fact:
    cluster_nodes_info: "{{ cluster_nodes_json.stdout | from_json if cluster_nodes_json is defined and cluster_nodes_json.rc == 0 else {} }}"

- name: "Count ready nodes"
  set_fact:
    ready_nodes_count: >-
      {{
        cluster_nodes_info.items |
        selectattr('status.conditions', 'defined') |
        selectattr('status.conditions', 'selectattr', 'type', 'equalto', 'Ready') |
        selectattr('status.conditions', 'selectattr', 'status', 'equalto', 'True') |
        list | length
      }}
  when: cluster_nodes_info.items is defined

- name: "Set kubeconfig management facts"
  set_fact:
    kubeconfig_generated: "{{ kubeconfig_file_check.stat.exists | default(false) }}"
    kubeconfig_validation_passed: "{{ kubeconfig_tests.kubectl_version | default(false) and kubeconfig_tests.kubectl_nodes | default(false) }}"
    kubectl_access_working: "{{ kubeconfig_tests.kubectl_version | default(false) }}"
    cluster_nodes_accessible: "{{ kubeconfig_tests.kubectl_nodes | default(false) }}"
    ready_nodes: "{{ ready_nodes_count | default(0) }}"

- name: "Create kubeconfig management report"
  set_fact:
    kubeconfig_report:
      timestamp: "{{ ansible_date_time.iso8601 }}"
      kubeconfig_path: "{{ kubeconfig.output_path }}"
      generation_successful: "{{ kubeconfig_generated }}"
      validation_passed: "{{ kubeconfig_validation_passed }}"
      test_results: "{{ kubeconfig_tests | default({}) }}"
      cluster_access: "{{ kubectl_access_working }}"
      nodes_accessible: "{{ cluster_nodes_accessible }}"
      ready_nodes_count: "{{ ready_nodes }}"
      total_expected_nodes: "{{ (groups['control_plane'] | default([]) | length) + (groups['workers'] | default([]) | length) }}"

- name: "Save kubeconfig management report"
  copy:
    content: "{{ kubeconfig_report | to_nice_json(indent=2) }}"
    dest: "{{ logging.log_directory }}/kubeconfig_report.json"
    mode: '0644'
  when: logging.save_logs | bool

- name: "Create kubeconfig usage instructions"
  template:
    src: kubeconfig_instructions.md.j2
    dest: "{{ kubeconfig.output_path | dirname }}/KUBECONFIG_USAGE.md"
    mode: '0644'
  when: kubeconfig_generated | bool

- name: "Display kubeconfig management results"
  debug:
    msg:
      - "Kubeconfig Management Complete"
      - "============================="
      - "Generation: {{ 'SUCCESS' if kubeconfig_generated else 'FAILED' }}"
      - "Validation: {{ 'PASSED' if kubeconfig_validation_passed else 'FAILED' }}"
      - "kubectl version: {{ 'OK' if kubeconfig_tests.kubectl_version | default(false) else 'FAILED' }}"
      - "kubectl get nodes: {{ 'OK' if kubeconfig_tests.kubectl_nodes | default(false) else 'FAILED' }}"
      - "kubectl get namespaces: {{ 'OK' if kubeconfig_tests.kubectl_namespaces | default(false) else 'FAILED' }}"
      - "Ready nodes: {{ ready_nodes | default(0) }}/{{ (groups['control_plane'] | default([]) | length) + (groups['workers'] | default([]) | length) }}"
      - "Kubeconfig path: {{ kubeconfig.output_path if kubeconfig_generated else 'Not generated' }}"
      - "Usage instructions: {{ kubeconfig.output_path | dirname }}/KUBECONFIG_USAGE.md"