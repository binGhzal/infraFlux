---
# Talos Bootstrap Main Tasks

- name: "Display bootstrap banner"
  debug:
    msg:
      - "========================================"
      - "    Talos Cluster Bootstrap"
      - "========================================"
      - "Cluster: {{ cluster.name }}"
      - "Bootstrap Node: {{ bootstrap_config.bootstrap_node }}"
      - "Control Plane Count: {{ groups['control_plane'] | length if groups['control_plane'] is defined else 0 }}"
      - "Worker Count: {{ groups['workers'] | length if groups['workers'] is defined else 0 }}"
      - "========================================"

- name: "Set bootstrap start time"
  set_fact:
    bootstrap_start_time: "{{ ansible_date_time.iso8601 }}"
    bootstrap_node_ip: "{{ hostvars[bootstrap_config.bootstrap_node]['ansible_host'] | default(hostvars[bootstrap_config.bootstrap_node]['inventory_hostname']) }}"

- name: "Create logging directory"
  file:
    path: "{{ logging.log_directory }}"
    state: directory
    mode: '0750'
  when: logging.save_logs | bool

- name: "Pre-bootstrap validation"
  include_tasks: pre_bootstrap_validation.yaml
  when: pre_bootstrap.validate_configs | bool

- name: "Apply control plane configurations"
  include_tasks: apply_control_plane.yaml
  when: bootstrap_process.apply_control_plane_first | bool

- name: "Bootstrap cluster"
  include_tasks: bootstrap_cluster.yaml
  when: bootstrap_config.enabled | bool

- name: "Generate and validate kubeconfig"
  include_tasks: manage_kubeconfig.yaml
  when: kubeconfig.generate | bool

- name: "Apply worker configurations"
  include_tasks: apply_workers.yaml
  when: 
    - worker_management.apply_after_bootstrap | bool
    - groups['workers'] is defined
    - groups['workers'] | length > 0

- name: "Validate cluster health"
  include_tasks: validate_cluster.yaml
  when: cluster_validation.check_api_server | bool

- name: "Monitor cluster stability"
  include_tasks: monitor_cluster.yaml
  when: health_monitoring.enabled | bool

- name: "Generate bootstrap report"
  include_tasks: generate_report.yaml

- name: "Display bootstrap summary"
  debug:
    msg:
      - "Bootstrap Process Complete"
      - "========================="
      - "Status: {{ 'SUCCESS' if bootstrap_successful | default(false) else 'PARTIAL/FAILED' }}"
      - "Cluster: {{ cluster.name }}"
      - "Bootstrap Node: {{ bootstrap_config.bootstrap_node }} ({{ bootstrap_node_ip }})"
      - "Control Plane Nodes: {{ control_plane_ready_count | default(0) }}/{{ groups['control_plane'] | length if groups['control_plane'] is defined else 0 }}"
      - "Worker Nodes: {{ worker_ready_count | default(0) }}/{{ groups['workers'] | length if groups['workers'] is defined else 0 }}"
      - "Cluster Endpoint: {{ cluster.talos.networking.cluster_endpoint }}"
      - "Kubeconfig: {{ kubeconfig.output_path if kubeconfig.generate else 'Not generated' }}"
      - "Bootstrap Duration: {{ bootstrap_duration | default('unknown') }}"