---
# Final Reporting

- name: "Calculate total orchestration time"
  set_fact:
    orchestration_end_time: "{{ ansible_date_time.iso8601 }}"
    orchestration_duration: "{{ ((ansible_date_time.epoch | int) - (orchestration_start_time | to_datetime('%Y-%m-%dT%H:%M:%SZ') | int)) | int }}"

- name: "Generate comprehensive deployment report"
  set_fact:
    final_deployment_report:
      metadata:
        infraflux_version: "v2.0"
        deployment_id: "{{ cluster.name }}-{{ ansible_date_time.date }}-{{ ansible_date_time.time | replace(':', '') }}"
        generated_at: "{{ orchestration_end_time }}"
        orchestration_duration_seconds: "{{ orchestration_duration }}"
        orchestration_duration_human: "{{ (orchestration_duration | int / 60) | round(1) }} minutes"
      
      project_info:
        name: "{{ project.name }}"
        environment: "{{ project.environment }}"
        cluster_name: "{{ cluster.name }}"
        talos_version: "{{ cluster.talos.version }}"
        kubernetes_version: "{{ cluster.talos.kubernetes_version }}"
      
      infrastructure:
        proxmox_nodes: "{{ groups['proxmox_servers'] | length }}"
        total_vms_deployed: "{{ (groups['control_plane'] | default([]) | length) + (groups['workers'] | default([]) | length) }}"
        control_plane_nodes: "{{ groups['control_plane'] | length if groups['control_plane'] is defined else 0 }}"
        worker_nodes: "{{ groups['workers'] | length if groups['workers'] is defined else 0 }}"
        cluster_endpoint: "{{ cluster.talos.networking.cluster_endpoint }}"
      
      resources:
        total_cpu_cores: "{{ total_allocated_cpu | default('unknown') }}"
        total_memory_mb: "{{ total_allocated_memory | default('unknown') }}"
        vm_template_used: "{{ vm_template_info.name if vm_template_info is defined else 'unknown' }}"
        storage_used: "{{ proxmox.storage.vm_storage }}"
        network_bridge: "{{ proxmox.network.vm_bridge }}"
      
      phases_completed:
        prerequisites_validated: "{{ orchestration_flow.validate_prerequisites | bool }}"
        images_prepared: "{{ talos_image_prepared | default(false) }}"
        templates_created: "{{ template_creation_complete | default(false) }}"
        infrastructure_generated: "{{ infrastructure_generation_complete | default(false) }}"
        infrastructure_deployed: "{{ infrastructure_deployment_complete | default(false) }}"
        deployment_validated: "{{ deployment_validation_complete | default(false) }}"
      
      networking:
        pod_subnet: "{{ cluster.talos.networking.pod_subnet }}"
        service_subnet: "{{ cluster.talos.networking.service_subnet }}"
        dns_domain: "{{ cluster.talos.networking.dns_domain }}"
        vm_ip_addresses: "{{ deployed_vm_ips | default([]) }}"
      
      files_generated:
        terraform_config: "{{ terraform_files_generated if terraform_files_generated is defined else {} }}"
        deployment_summary: "{{ terraform_config.workspace_dir }}/deployment_summary.json"
        validation_report: "{{ validation_report_path if validation_report_path is defined else 'not generated' }}"
        orchestration_log: "{{ terraform_config.workspace_dir }}/orchestration.log"
      
      next_steps:
        - "Bootstrap Talos cluster with talosctl"
        - "Configure kubectl access"
        - "Deploy CNI (Cilium)"
        - "Deploy CSI (Longhorn)"
        - "Install Flux for GitOps"
        - "Configure ingress controller"
        - "Set up monitoring stack"
      
      status:
        overall: "{{ 'success' if (deployment_successful | default(false)) and (validation_successful | default(false)) else 'partial' }}"
        deployment: "{{ 'success' if deployment_successful | default(false) else 'failed' }}"
        validation: "{{ 'success' if validation_successful | default(false) else 'failed' }}"

- name: "Save final deployment report"
  copy:
    content: "{{ final_deployment_report | to_nice_json(indent=2) }}"
    dest: "{{ terraform_config.workspace_dir }}/final_deployment_report.json"
    mode: '0644'

- name: "Generate human-readable summary"
  template:
    src: deployment_summary.md.j2
    dest: "{{ terraform_config.workspace_dir }}/DEPLOYMENT_SUMMARY.md"
    mode: '0644'
  vars:
    report: "{{ final_deployment_report }}"

- name: "Create next steps script"
  template:
    src: next_steps.sh.j2
    dest: "{{ terraform_config.workspace_dir }}/next_steps.sh"
    mode: '0755'
  vars:
    cluster_endpoint: "{{ cluster.talos.networking.cluster_endpoint }}"
    cluster_name: "{{ cluster.name }}"

- name: "Display final deployment summary"
  debug:
    msg:
      - ""
      - "========================================"
      - "  InfraFlux v2.0 Deployment Complete   "
      - "========================================"
      - ""
      - "Deployment ID: {{ final_deployment_report.metadata.deployment_id }}"
      - "Duration: {{ final_deployment_report.metadata.orchestration_duration_human }}"
      - "Status: {{ final_deployment_report.status.overall | upper }}"
      - ""
      - "Infrastructure Summary:"
      - "----------------------"
      - "Cluster: {{ final_deployment_report.project_info.cluster_name }}"
      - "Environment: {{ final_deployment_report.project_info.environment }}"
      - "Talos Version: {{ final_deployment_report.project_info.talos_version }}"
      - "Kubernetes Version: {{ final_deployment_report.project_info.kubernetes_version }}"
      - ""
      - "Resources Deployed:"
      - "------------------"
      - "Control Plane Nodes: {{ final_deployment_report.infrastructure.control_plane_nodes }}"
      - "Worker Nodes: {{ final_deployment_report.infrastructure.worker_nodes }}"
      - "Total VMs: {{ final_deployment_report.infrastructure.total_vms_deployed }}"
      - "CPU Cores: {{ final_deployment_report.resources.total_cpu_cores }}"
      - "Memory: {{ final_deployment_report.resources.total_memory_mb }}MB"
      - ""
      - "Network Configuration:"
      - "---------------------"
      - "Cluster Endpoint: {{ final_deployment_report.infrastructure.cluster_endpoint }}"
      - "Pod Subnet: {{ final_deployment_report.networking.pod_subnet }}"
      - "Service Subnet: {{ final_deployment_report.networking.service_subnet }}"
      - ""
      - "Generated Files:"
      - "---------------"
      - "Final Report: {{ terraform_config.workspace_dir }}/final_deployment_report.json"
      - "Summary: {{ terraform_config.workspace_dir }}/DEPLOYMENT_SUMMARY.md"
      - "Next Steps: {{ terraform_config.workspace_dir }}/next_steps.sh"
      - ""
      - "Next Steps:"
      - "----------"
      - "1. Review the deployment summary"
      - "2. Run: chmod +x {{ terraform_config.workspace_dir }}/next_steps.sh"
      - "3. Execute: {{ terraform_config.workspace_dir }}/next_steps.sh"
      - "4. Follow the Talos cluster bootstrap process"
      - ""
      - "========================================"

- name: "Set final completion facts"
  set_fact:
    infraflux_orchestration_complete: true
    final_report_generated: true
    deployment_report_path: "{{ terraform_config.workspace_dir }}/final_deployment_report.json"