---
# Phase 5: Deploy Infrastructure

- name: "Set orchestration phase"
  set_fact:
    orchestration_phase: "infrastructure_deployment"

- name: "Validate prerequisites for deployment"
  assert:
    that:
      - terraform_plan_generated | default(false)
      - terraform_workspace_ready | default(false)
      - terraform_plan_file is defined
    fail_msg: "Infrastructure not ready for deployment. Run generate_infrastructure first."

- name: "Apply Terraform configuration"
  command: "terraform apply {{ '-auto-approve' if infrastructure_deployment.auto_approve else '' }} {{ terraform_plan_file }}"
  args:
    chdir: "{{ terraform_config.workspace_dir }}"
  register: terraform_apply_result
  timeout: "{{ infrastructure_deployment.wait_timeout }}"
  environment:
    TF_INPUT: "false"

- name: "Parse Terraform apply output"
  set_fact:
    terraform_apply_summary:
      resources_created: "{{ terraform_apply_result.stdout | regex_findall('Apply complete! Resources: (\\d+) added') | first | default('0') }}"
      resources_changed: "{{ terraform_apply_result.stdout | regex_findall('(\\d+) changed') | first | default('0') }}"
      resources_destroyed: "{{ terraform_apply_result.stdout | regex_findall('(\\d+) destroyed') | first | default('0') }}"
      apply_successful: "{{ 'Apply complete!' in terraform_apply_result.stdout }}"

- name: "Validate deployment success"
  assert:
    that:
      - terraform_apply_summary.apply_successful | bool
      - terraform_apply_result.rc == 0
    fail_msg: "Terraform apply failed. Check logs for details."

- name: "Get Terraform outputs"
  command: terraform output -json
  args:
    chdir: "{{ terraform_config.workspace_dir }}"
  register: terraform_outputs
  failed_when: false

- name: "Parse Terraform outputs"
  set_fact:
    terraform_output_data: "{{ terraform_outputs.stdout | from_json if terraform_outputs.rc == 0 else {} }}"

- name: "Wait for VM boot completion"
  pause:
    seconds: "{{ timing.vm_boot_wait }}"

- name: "Check VM status on Proxmox"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/nodes/{{ hostvars[item]['proxmox_node'] }}/qemu/{{ hostvars[item]['vm_id'] }}/status/current"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
  register: vm_status_check
  loop: "{{ (groups['control_plane'] | default([])) + (groups['workers'] | default([])) }}"
  retries: "{{ infrastructure_deployment.health_check_retries }}"
  delay: "{{ infrastructure_deployment.health_check_delay }}"

- name: "Validate all VMs are running"
  assert:
    that:
      - item.json.data.status == "running"
    fail_msg: "VM {{ hostvars[item.item]['inventory_hostname'] }} is not running. Status: {{ item.json.data.status }}"
  loop: "{{ vm_status_check.results }}"

- name: "Get VM IP addresses"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/nodes/{{ hostvars[item]['proxmox_node'] }}/qemu/{{ hostvars[item]['vm_id'] }}/agent/network-get-interfaces"
    method: POST
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
  register: vm_network_info
  loop: "{{ (groups['control_plane'] | default([])) + (groups['workers'] | default([])) }}"
  failed_when: false
  retries: 5
  delay: 10

- name: "Extract VM IP addresses"
  set_fact:
    vm_ip_addresses: >-
      {{
        vm_network_info.results |
        selectattr('status', 'equalto', 200) |
        map(attribute='json.data.result') |
        map('selectattr', 'name', 'ne', 'lo') |
        map('map', attribute='ip-addresses') |
        map('flatten') |
        map('selectattr', 'ip-address-type', 'equalto', 'ipv4') |
        map('map', attribute='ip-address') |
        flatten |
        select('match', '^(?!127\\.0\\.0\\.1).*') |
        list
      }}

- name: "Test SSH connectivity to VMs"
  wait_for:
    host: "{{ item }}"
    port: 22
    timeout: "{{ timing.vm_ready_timeout }}"
    state: started
  loop: "{{ vm_ip_addresses }}"
  when: 
    - vm_ip_addresses | length > 0
    - not validation.skip_vm_accessibility | bool

- name: "Create deployment summary"
  set_fact:
    deployment_summary:
      status: "{{ 'success' if terraform_apply_summary.apply_successful else 'failed' }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
      resources_created: "{{ terraform_apply_summary.resources_created }}"
      vms_deployed:
        control_plane: "{{ groups['control_plane'] | length if groups['control_plane'] is defined else 0 }}"
        workers: "{{ groups['workers'] | length if groups['workers'] is defined else 0 }}"
        total: "{{ (groups['control_plane'] | default([]) | length) + (groups['workers'] | default([]) | length) }}"
      vm_ip_addresses: "{{ vm_ip_addresses }}"
      cluster_endpoint: "{{ cluster.talos.networking.cluster_endpoint }}"

- name: "Save deployment summary"
  template:
    src: deployment_summary.json.j2
    dest: "{{ terraform_config.workspace_dir }}/deployment_summary.json"
    mode: '0644'
  vars:
    summary_data: "{{ deployment_summary }}"

- name: "Display deployment results"
  debug:
    msg:
      - "Infrastructure Deployment Complete"
      - "=================================="
      - "Status: {{ deployment_summary.status }}"
      - "Resources Created: {{ deployment_summary.resources_created }}"
      - "Control Plane VMs: {{ deployment_summary.vms_deployed.control_plane }}"
      - "Worker VMs: {{ deployment_summary.vms_deployed.workers }}"
      - "Total VMs: {{ deployment_summary.vms_deployed.total }}"
      - "VM IPs: {{ vm_ip_addresses | join(', ') if vm_ip_addresses else 'Not available' }}"
      - "Cluster Endpoint: {{ deployment_summary.cluster_endpoint }}"
      - "Summary: {{ terraform_config.workspace_dir }}/deployment_summary.json"

- name: "Set deployment completion facts"
  set_fact:
    infrastructure_deployment_complete: true
    deployment_successful: "{{ terraform_apply_summary.apply_successful | bool }}"
    deployed_vm_ips: "{{ vm_ip_addresses }}"