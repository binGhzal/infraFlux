---
# Phase 2: Prepare Talos Images

- name: "Set orchestration phase"
  set_fact:
    orchestration_phase: "image_preparation"

- name: "Create image download directory"
  file:
    path: "{{ image_management.download_dir | default('/tmp/talos-images') }}"
    state: directory
    mode: '0755'

- name: "Check if Talos image already exists"
  stat:
    path: "{{ image_management.download_dir | default('/tmp/talos-images') }}/{{ cluster.talos.image_name | default('talos-' + cluster.talos.version + '.iso') }}"
  register: existing_image
  when: image_management.skip_existing | bool

- name: "Download Talos image via Image Factory"
  include_role:
    name: talos_image
  vars:
    talos_download_dir: "{{ image_management.download_dir | default('/tmp/talos-images') }}"
    force_download: "{{ image_management.force_download | bool }}"
  when: >
    image_management.force_download | bool or
    not (existing_image.stat.exists | default(false))

- name: "Validate downloaded image checksum"
  block:
    - name: "Get image checksum"
      stat:
        path: "{{ image_management.download_dir | default('/tmp/talos-images') }}/{{ cluster.talos.image_name | default('talos-' + cluster.talos.version + '.iso') }}"
        checksum_algorithm: sha256
      register: image_checksum

    - name: "Verify checksum against factory response"
      assert:
        that:
          - image_checksum.stat.checksum == talos_image_checksum
        fail_msg: "Image checksum validation failed"
      when: talos_image_checksum is defined

  when: image_management.validate_checksums | bool

- name: "Copy image to Proxmox nodes"
  copy:
    src: "{{ image_management.download_dir | default('/tmp/talos-images') }}/{{ cluster.talos.image_name | default('talos-' + cluster.talos.version + '.iso') }}"
    dest: "{{ proxmox.storage.iso_path | default('/var/lib/vz/template/iso') }}/{{ cluster.talos.image_name | default('talos-' + cluster.talos.version + '.iso') }}"
    mode: '0644'
  delegate_to: "{{ item }}"
  loop: "{{ groups['proxmox_servers'] }}"
  register: image_copy_results

- name: "Verify image exists on all Proxmox nodes"
  stat:
    path: "{{ proxmox.storage.iso_path | default('/var/lib/vz/template/iso') }}/{{ cluster.talos.image_name | default('talos-' + cluster.talos.version + '.iso') }}"
  delegate_to: "{{ item }}"
  loop: "{{ groups['proxmox_servers'] }}"
  register: image_verification

- name: "Validate image deployment"
  assert:
    that:
      - item.stat.exists
    fail_msg: "Image not found on Proxmox node {{ item.item }}"
  loop: "{{ image_verification.results }}"

- name: "Clean up local image cache"
  file:
    path: "{{ image_management.download_dir | default('/tmp/talos-images') }}"
    state: absent
  when: image_management.cleanup_cache | bool

- name: "Set image preparation facts"
  set_fact:
    talos_image_prepared: true
    talos_image_location: "{{ proxmox.storage.iso_path | default('/var/lib/vz/template/iso') }}/{{ cluster.talos.image_name | default('talos-' + cluster.talos.version + '.iso') }}"

- name: "Display image preparation results"
  debug:
    msg:
      - "Image Preparation Complete"
      - "========================"
      - "Image: {{ cluster.talos.image_name | default('talos-' + cluster.talos.version + '.iso') }}"
      - "Location: {{ talos_image_location }}"
      - "Deployed to {{ groups['proxmox_servers'] | length }} Proxmox nodes"
      - "Cache cleaned: {{ 'Yes' if image_management.cleanup_cache else 'No' }}"