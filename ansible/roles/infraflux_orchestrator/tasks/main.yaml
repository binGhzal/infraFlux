---
# InfraFlux Orchestrator Main Tasks
# This is the master orchestration workflow for InfraFlux v2.0

- name: "Display InfraFlux banner"
  debug:
    msg:
      - "=================================="
      - "   InfraFlux v2.0 Deployment"
      - "=================================="
      - "Cluster: {{ cluster.name }}"
      - "Environment: {{ project.environment }}"
      - "Talos Version: {{ cluster.talos.version }}"
      - "Target Nodes: {{ groups['proxmox_servers'] | length }}"
      - "Control Plane: {{ groups['control_plane'] | length if groups['control_plane'] is defined else 0 }}"
      - "Workers: {{ groups['workers'] | length if groups['workers'] is defined else 0 }}"
      - "=================================="

- name: "Set orchestration start time"
  set_fact:
    orchestration_start_time: "{{ ansible_date_time.iso8601 }}"
    orchestration_phase: "starting"

# Phase 1: Prerequisites validation
- name: "Phase 1: Validate Prerequisites"
  include_tasks: validate_prerequisites.yaml
  when: orchestration_flow.validate_prerequisites | bool
  tags:
    - orchestration
    - prerequisites
    - phase1

# Phase 2: Image preparation
- name: "Phase 2: Prepare Talos Images"
  include_tasks: prepare_images.yaml
  when: orchestration_flow.prepare_images | bool
  tags:
    - orchestration
    - images
    - phase2

# Phase 3: Template creation
- name: "Phase 3: Create VM Templates"
  include_tasks: create_templates.yaml
  when: orchestration_flow.create_templates | bool
  tags:
    - orchestration
    - templates
    - phase3

# Phase 4: Infrastructure generation
- name: "Phase 4: Generate Infrastructure"
  include_tasks: generate_infrastructure.yaml
  when: orchestration_flow.generate_terraform | bool
  tags:
    - orchestration
    - terraform
    - phase4

# Phase 5: Infrastructure deployment
- name: "Phase 5: Deploy Infrastructure"
  include_tasks: deploy_infrastructure.yaml
  when: orchestration_flow.deploy_infrastructure | bool
  tags:
    - orchestration
    - deploy
    - phase5

# Phase 6: Post-deployment validation
- name: "Phase 6: Validate Deployment"
  include_tasks: validate_deployment.yaml
  when: orchestration_flow.validate_deployment | bool
  tags:
    - orchestration
    - validate
    - phase6

# Final reporting
- name: "Generate deployment report"
  include_tasks: generate_report.yaml
  tags:
    - orchestration
    - report