---
# Phase 1: Validate Prerequisites

- name: "Set orchestration phase"
  set_fact:
    orchestration_phase: "prerequisites"

- name: "Check Proxmox connectivity"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/cluster/status"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
    timeout: 10
  register: proxmox_connectivity
  when: prerequisites.check_connectivity | bool

- name: "Validate Proxmox cluster status"
  assert:
    that:
      - proxmox_connectivity.status == 200
      - proxmox_connectivity.json.data is defined
    fail_msg: "Proxmox cluster is not accessible or unhealthy"
  when: prerequisites.check_connectivity | bool

- name: "Check SSH connectivity to Proxmox nodes"
  wait_for_connection:
    timeout: 30
  delegate_to: "{{ item }}"
  loop: "{{ groups['proxmox_servers'] }}"
  when: prerequisites.check_connectivity | bool

- name: "Validate storage availability"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/nodes/{{ hostvars[item]['inventory_hostname'] }}/storage"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
  register: storage_check
  loop: "{{ groups['proxmox_servers'] }}"
  when: prerequisites.verify_storage | bool

- name: "Validate required storage pools exist"
  assert:
    that:
      - storage_info | selectattr('storage', 'equalto', proxmox.storage.vm_storage) | list | length > 0
      - storage_info | selectattr('storage', 'equalto', proxmox.storage.template_storage) | list | length > 0
    fail_msg: "Required storage pools not found on {{ item.item }}"
  vars:
    storage_info: "{{ item.json.data }}"
  loop: "{{ storage_check.results }}"
  when: 
    - prerequisites.verify_storage | bool
    - item.status == 200

- name: "Check available resources"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/nodes/{{ hostvars[item]['inventory_hostname'] }}/status"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
  register: resource_check
  loop: "{{ groups['proxmox_servers'] }}"
  when: prerequisites.validate_resources | bool

- name: "Calculate total resource requirements"
  set_fact:
    total_cpu_required: >-
      {{
        (groups['control_plane'] | default([]) | length * cluster.nodes.control_plane.resources.cpu) +
        (groups['workers'] | default([]) | length * cluster.nodes.workers.resources.cpu)
      }}
    total_memory_required: >-
      {{
        (groups['control_plane'] | default([]) | length * cluster.nodes.control_plane.resources.memory) +
        (groups['workers'] | default([]) | length * cluster.nodes.workers.resources.memory)
      }}

- name: "Validate sufficient resources available"
  assert:
    that:
      - total_cpu_available >= (total_cpu_required | int * 1.2) | int
      - total_memory_available >= (total_memory_required | int * 1.2) | int
    fail_msg: "Insufficient resources. Required: {{ total_cpu_required }} cores, {{ total_memory_required }}MB memory"
  vars:
    total_cpu_available: "{{ resource_check.results | map(attribute='json.data.cpuinfo.cpus') | sum }}"
    total_memory_available: "{{ resource_check.results | map(attribute='json.data.memory.total') | sum }}"
  when: prerequisites.validate_resources | bool

- name: "Check network bridges"
  command: brctl show {{ proxmox.network.vm_bridge }}
  register: bridge_check
  delegate_to: "{{ item }}"
  loop: "{{ groups['proxmox_servers'] }}"
  failed_when: false
  when: prerequisites.check_network | bool

- name: "Validate network bridges exist"
  assert:
    that:
      - item.rc == 0
    fail_msg: "Network bridge {{ proxmox.network.vm_bridge }} not found on {{ item.item }}"
  loop: "{{ bridge_check.results }}"
  when: 
    - prerequisites.check_network | bool
    - bridge_check is defined

- name: "Check VM ID availability"
  uri:
    url: "{{ proxmox.api_url }}/api2/json/nodes/{{ hostvars[item]['proxmox_node'] }}/qemu/{{ hostvars[item]['vm_id'] }}/status/current"
    method: GET
    headers:
      Authorization: "PVEAPIToken={{ proxmox.api_user }}!{{ proxmox.api_token_id }}={{ vault_proxmox_api_token }}"
    validate_certs: false
  register: vm_id_check
  loop: "{{ (groups['control_plane'] | default([])) + (groups['workers'] | default([])) }}"
  failed_when: false

- name: "Validate VM IDs are available"
  assert:
    that:
      - item.status == 500 or item.status == 404  # VM doesn't exist
    fail_msg: "VM ID {{ hostvars[item.item]['vm_id'] }} already exists on {{ hostvars[item.item]['proxmox_node'] }}"
  loop: "{{ vm_id_check.results }}"
  when: vm_id_check is defined

- name: "Display prerequisites validation results"
  debug:
    msg:
      - "Prerequisites Validation Complete"
      - "================================="
      - "Proxmox Connectivity: ✓"
      - "SSH Access: ✓"
      - "Storage Availability: ✓"
      - "Resource Capacity: ✓"
      - "Network Configuration: ✓"
      - "VM ID Availability: ✓"
      - "Total CPU Required: {{ total_cpu_required }}"
      - "Total Memory Required: {{ total_memory_required }}MB"
      - "Ready for deployment: ✓"