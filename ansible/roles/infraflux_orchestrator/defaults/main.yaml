---
# InfraFlux Orchestrator defaults

# Orchestration flow configuration
orchestration_flow:
  validate_prerequisites: true
  prepare_images: true
  create_templates: true
  generate_terraform: true
  deploy_infrastructure: true
  wait_for_vms: true
  validate_deployment: true

# Prerequisites validation
prerequisites:
  check_connectivity: true
  validate_resources: true
  verify_storage: true
  check_network: true
  validate_permissions: true

# Image management
image_management:
  force_download: false
  skip_existing: true
  cleanup_cache: false
  validate_checksums: true

# Template management  
template_management:
  force_recreate: false
  validate_templates: true
  cleanup_failed: true
  parallel_creation: false

# Infrastructure deployment
infrastructure_deployment:
  plan_only: false
  auto_approve: false
  parallel_deployment: false
  wait_timeout: 1800  # 30 minutes
  health_check_retries: 10
  health_check_delay: 30

# Validation settings
validation:
  skip_vm_accessibility: false
  skip_resource_check: false
  detailed_reporting: true
  fail_fast: true

# Rollback configuration
rollback:
  enabled: true
  preserve_state: true
  cleanup_resources: true
  restore_backup: false

# Logging and reporting
logging:
  level: "INFO"
  detailed_output: true
  preserve_logs: true
  log_retention_days: 7

# Timing configuration
timing:
  vm_boot_wait: 60
  vm_ready_timeout: 300
  cluster_ready_timeout: 600
  service_ready_timeout: 180