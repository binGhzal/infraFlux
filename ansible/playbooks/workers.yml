---
# Worker Nodes Setup - K3s agent installation and configuration
# This playbook handles the setup of K3s worker nodes

- hosts: k3s_agents,k3s_contended,k3s_dedicated
  gather_facts: yes
  become: yes

  tasks:
    - name: Set host architecture
      set_fact:
        host_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"
      tags: always

    # Worker-specific services
    - name: Setup transcode killer service
      import_role:
        name: transcode-killer
      tags: [ transcode-killer ]

    # Install K3s agent
    - name: Install K3s agent
      import_role:
        name: k3s-agent
      tags: [ k3s-agent ]

    # Optional: Kata containers for secure workloads
    - name: Setup Kata containers runtime
      import_role:
        name: kata-containers
      tags: [ kata-containers ]
      when: kata_containers_enabled | default(false)
