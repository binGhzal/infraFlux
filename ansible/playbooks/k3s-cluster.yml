---
# K3s Cluster Setup - Master nodes installation and configuration
# This playbook handles the setup of K3s master nodes and load balancing

- hosts: k3s_servers
  gather_facts: yes
  become: yes

  vars:
    local_home: "{{ lookup('env','HOME') }}"
    # HAProxy backend configuration for K3s API
    haproxy_k8s_backends: |
      {% for master in groups["k3s_servers"] %}
      {% if hostvars[master]["cluster_ip"] is defined %}
      server k8s-api-{{ hostvars[master]["inventory_hostname_short"]}} {{ hostvars[master]["cluster_ip"] }}:6443 check
      {% else %}
      server k8s-api-{{ hostvars[master]["inventory_hostname_short"]}} {{ cluster_nic_class_c }}.{{ hostvars[master]["ansible_host"].split(".")[3] }}:6443 check
      {% endif %}
      {% endfor %}

  tasks:
    - name: Set host architecture
      set_fact:
        host_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"
      tags: always

    # Setup load balancing for HA clusters
    - name: Setup HAProxy for K3s API load balancing
      import_role:
        name: haproxy
      tags: [ haproxy ]
      when: "inventory_hostname in groups['haproxy_servers']"

    - name: Setup Keepalived for HAProxy HA
      import_role:
        name: keepalived
      tags: [ keepalived ]
      when: "inventory_hostname in groups['haproxy_servers']"

    # Install K3s servers
    - name: Install K3s servers (standard)
      import_role:
        name: k3s-server
      tags: [ k3s-server ]
      when: "'experiment' not in ansible_play_name"

    - name: Install K3s servers (experimental)
      import_role:
        name: k3s-server-experiment
      tags: [ k3s-server-experiment ]
      when: "'experiment' in ansible_play_name or 'crunchbits' in group_names"

    # Additional services on first master
    - name: Setup OIDC on first master
      import_role:
        name: oidc
      tags: [ oidc ]
      when: "groups['k3s_servers'][0] == inventory_hostname"

    - name: Setup backup on all masters
      import_role:
        name: backup
      tags: [ backup ]
