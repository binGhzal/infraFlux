---
# InfraFlux v2.0 Main Deployment Playbook
# This is the master playbook that orchestrates the entire infrastructure deployment

- name: "InfraFlux v2.0 Infrastructure Deployment"
  hosts: localhost
  gather_facts: yes
  vars_files:
    - ../configs/global.yaml
  
  vars:
    # Terraform configuration
    terraform_config:
      workspace_dir: "{{ playbook_dir }}/../generated/terraform"
      backend:
        type: "local"
        config:
          path: "terraform.tfstate"
    
    # Output directories
    output_directories:
      base: "{{ playbook_dir }}/../generated"
      terraform: "{{ playbook_dir }}/../generated/terraform"
      talos: "{{ playbook_dir }}/../generated/talos"
      logs: "{{ playbook_dir }}/../generated/logs"

  pre_tasks:
    - name: "Display InfraFlux deployment banner"
      debug:
        msg:
          - "======================================================="
          - "             InfraFlux v2.0 Deployment"
          - "======================================================="
          - "Project: {{ project.name }} {{ project.version }}"
          - "Environment: {{ project.environment }}"
          - "Cluster: {{ cluster.name }}"
          - "Talos Version: {{ cluster.talos.version }}"
          - "Kubernetes Version: {{ cluster.talos.kubernetes_version }}"
          - "Target Proxmox Nodes: {{ groups['proxmox_servers'] | length }}"
          - "Control Plane Nodes: {{ groups['control_plane'] | length }}"
          - "Worker Nodes: {{ groups['workers'] | length }}"
          - "======================================================="

    - name: "Create output directories"
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ output_directories.base }}"
        - "{{ output_directories.terraform }}"
        - "{{ output_directories.talos }}"
        - "{{ output_directories.logs }}"

    - name: "Validate configuration"
      assert:
        that:
          - project.name is defined
          - cluster.name is defined
          - cluster.talos.version is defined
          - groups['proxmox_servers'] | length > 0
          - groups['control_plane'] | length > 0
        fail_msg: "Required configuration missing. Check global.yaml and inventory."

  roles:
    - role: infraflux_orchestrator
      tags:
        - orchestration
        - infrastructure
        - deployment

  post_tasks:
    - name: "Display deployment completion summary"
      debug:
        msg:
          - "======================================================="
          - "          InfraFlux Deployment Complete"
          - "======================================================="
          - "Status: {{ 'SUCCESS' if infraflux_orchestration_complete | default(false) else 'INCOMPLETE' }}"
          - "Cluster: {{ cluster.name }}"
          - "Generated Files:"
          - "  - Terraform: {{ terraform_config.workspace_dir }}"
          - "  - Talos Configs: {{ output_directories.talos }}"
          - "  - Deployment Logs: {{ output_directories.logs }}"
          - ""
          - "Next Steps:"
          - "  1. Review deployment logs and reports"
          - "  2. Verify cluster health and accessibility"
          - "  3. Deploy CNI and CSI components"
          - "  4. Set up GitOps and monitoring"
          - "======================================================="