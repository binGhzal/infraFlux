---
# InfraFlux Enhanced Monitoring and Observability Playbook
# Deploys comprehensive monitoring stack with log aggregation and alerting

- name: Deploy Enhanced Monitoring Stack
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    cluster_domain: "{{ cluster_domain | default('cluster.local') }}"
    monitoring_stack: "{{ monitoring_stack | default('full') }}"
    enable_log_aggregation: "{{ enable_log_aggregation | default(false) | bool }}"
    enable_hubble_ui: "{{ enable_hubble_ui | default(true) | bool }}"
    enable_alerting: "{{ enable_alerting | default(true) | bool }}"
    alert_channels: "{{ alert_channels | default('webhook') }}"
    monitoring_retention_days: "{{ monitoring_retention_days | default('30') }}"

  tasks:
    - name: Display monitoring deployment information
      debug:
        msg:
          - "📊 Starting Enhanced Monitoring Deployment"
          - "Monitoring Stack: {{ monitoring_stack }}"
          - "Log Aggregation: {{ enable_log_aggregation }}"
          - "Hubble UI: {{ enable_hubble_ui }}"
          - "Alerting: {{ enable_alerting }}"
          - "Alert Channels: {{ alert_channels }}"
          - "Retention: {{ monitoring_retention_days }} days"

    # Prometheus Stack (Enhanced)
    - name: Deploy Enhanced Prometheus Stack
      when: monitoring_stack in ['full', 'basic']
      block:
        - name: Create monitoring namespace
          kubernetes.core.k8s:
            name: monitoring
            api_version: v1
            kind: Namespace
            state: present

        - name: Deploy Prometheus
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: prometheus
                namespace: monitoring
                labels:
                  app: prometheus
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: prometheus
                template:
                  metadata:
                    labels:
                      app: prometheus
                  spec:
                    containers:
                    - name: prometheus
                      image: prom/prometheus:v2.47.0
                      ports:
                      - containerPort: 9090
                      args:
                        - '--config.file=/etc/prometheus/prometheus.yml'
                        - '--storage.tsdb.path=/prometheus'
                        - '--storage.tsdb.retention.time={{ monitoring_retention_days }}d'
                        - '--web.console.libraries=/etc/prometheus/console_libraries'
                        - '--web.console.templates=/etc/prometheus/consoles'
                        - '--web.enable-lifecycle'
                        - '--web.enable-admin-api'
                      volumeMounts:
                      - name: prometheus-config
                        mountPath: /etc/prometheus
                      - name: prometheus-storage
                        mountPath: /prometheus
                      resources:
                        requests:
                          memory: "512Mi"
                          cpu: "200m"
                        limits:
                          memory: "1Gi"
                          cpu: "500m"
                    volumes:
                    - name: prometheus-config
                      configMap:
                        name: prometheus-config
                    - name: prometheus-storage
                      emptyDir: {}

        - name: Create Prometheus ConfigMap
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: prometheus-config
                namespace: monitoring
              data:
                prometheus.yml: |
                  global:
                    scrape_interval: 15s
                    evaluation_interval: 15s

                  rule_files:
                    - "first_rules.yml"

                  alerting:
                    alertmanagers:
                      - static_configs:
                          - targets:
                            - alertmanager:9093

                  scrape_configs:
                    - job_name: 'prometheus'
                      static_configs:
                        - targets: ['localhost:9090']

                    - job_name: 'kubernetes-apiservers'
                      kubernetes_sd_configs:
                      - role: endpoints
                      scheme: https
                      tls_config:
                        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                      relabel_configs:
                      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                        action: keep
                        regex: default;kubernetes;https

                    - job_name: 'kubernetes-nodes'
                      kubernetes_sd_configs:
                      - role: node
                      scheme: https
                      tls_config:
                        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                      relabel_configs:
                      - action: labelmap
                        regex: __meta_kubernetes_node_label_(.+)

                    - job_name: 'kubernetes-pods'
                      kubernetes_sd_configs:
                      - role: pod
                      relabel_configs:
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                        action: keep
                        regex: true
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                        action: replace
                        target_label: __metrics_path__
                        regex: (.+)

                first_rules.yml: |
                  groups:
                  - name: example
                    rules:
                    - alert: HighRequestLatency
                      expr: job:request_latency_seconds:mean5m{job="myjob"} > 0.5
                      for: 10m
                      labels:
                        severity: page
                      annotations:
                        summary: High request latency

        - name: Create Prometheus Service
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: prometheus
                namespace: monitoring
                labels:
                  app: prometheus
              spec:
                selector:
                  app: prometheus
                ports:
                - name: web
                  port: 9090
                  targetPort: 9090

        - name: Deploy Grafana
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: grafana
                namespace: monitoring
                labels:
                  app: grafana
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: grafana
                template:
                  metadata:
                    labels:
                      app: grafana
                  spec:
                    containers:
                    - name: grafana
                      image: grafana/grafana:10.0.0
                      ports:
                      - containerPort: 3000
                      env:
                      - name: GF_SECURITY_ADMIN_PASSWORD
                        value: admin123
                      - name: GF_USERS_ALLOW_SIGN_UP
                        value: "false"
                      volumeMounts:
                      - name: grafana-storage
                        mountPath: /var/lib/grafana
                      resources:
                        requests:
                          memory: "256Mi"
                          cpu: "100m"
                        limits:
                          memory: "512Mi"
                          cpu: "200m"
                    volumes:
                    - name: grafana-storage
                      emptyDir: {}

        - name: Create Grafana Service
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: grafana
                namespace: monitoring
                labels:
                  app: grafana
              spec:
                selector:
                  app: grafana
                ports:
                - name: web
                  port: 3000
                  targetPort: 3000

        - name: Create Grafana Ingress
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: grafana
                namespace: monitoring
                annotations:
                  traefik.ingress.kubernetes.io/router.entrypoints: web
              spec:
                rules:
                - host: grafana.{{ cluster_domain }}
                  http:
                    paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: grafana
                          port:
                            number: 3000

    # Loki Log Aggregation
    - name: Deploy Loki Log Aggregation
      when: enable_log_aggregation and monitoring_stack == 'full'
      block:
        - name: Deploy Loki
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: loki
                namespace: monitoring
                labels:
                  app: loki
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: loki
                template:
                  metadata:
                    labels:
                      app: loki
                  spec:
                    containers:
                    - name: loki
                      image: grafana/loki:2.9.0
                      ports:
                      - containerPort: 3100
                      args:
                        - -config.file=/etc/loki/local-config.yaml
                      volumeMounts:
                      - name: loki-config
                        mountPath: /etc/loki
                      - name: loki-storage
                        mountPath: /tmp/loki
                      resources:
                        requests:
                          memory: "256Mi"
                          cpu: "100m"
                        limits:
                          memory: "512Mi"
                          cpu: "200m"
                    volumes:
                    - name: loki-config
                      configMap:
                        name: loki-config
                    - name: loki-storage
                      emptyDir: {}

        - name: Create Loki ConfigMap
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: loki-config
                namespace: monitoring
              data:
                local-config.yaml: |
                  auth_enabled: false

                  server:
                    http_listen_port: 3100

                  ingester:
                    lifecycler:
                      address: 127.0.0.1
                      ring:
                        kvstore:
                          store: inmemory
                        replication_factor: 1
                    chunk_idle_period: 5m
                    chunk_retain_period: 30s
                    max_transfer_retries: 0

                  schema_config:
                    configs:
                      - from: 2020-10-24
                        store: boltdb
                        object_store: filesystem
                        schema: v11
                        index:
                          prefix: index_
                          period: 168h

                  storage_config:
                    boltdb:
                      directory: /tmp/loki/index

                    filesystem:
                      directory: /tmp/loki/chunks

                  limits_config:
                    enforce_metric_name: false
                    reject_old_samples: true
                    reject_old_samples_max_age: 168h

                  chunk_store_config:
                    max_look_back_period: 0s

                  table_manager:
                    retention_deletes_enabled: false
                    retention_period: 0s

        - name: Create Loki Service
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: loki
                namespace: monitoring
                labels:
                  app: loki
              spec:
                selector:
                  app: loki
                ports:
                - name: http
                  port: 3100
                  targetPort: 3100

        - name: Deploy Promtail
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: promtail
                namespace: monitoring
                labels:
                  app: promtail
              spec:
                selector:
                  matchLabels:
                    app: promtail
                template:
                  metadata:
                    labels:
                      app: promtail
                  spec:
                    containers:
                    - name: promtail
                      image: grafana/promtail:2.9.0
                      args:
                        - -config.file=/etc/promtail/config.yml
                      volumeMounts:
                      - name: config
                        mountPath: /etc/promtail
                      - name: varlog
                        mountPath: /var/log
                        readOnly: true
                      - name: varlibdockercontainers
                        mountPath: /var/lib/docker/containers
                        readOnly: true
                      resources:
                        requests:
                          memory: "64Mi"
                          cpu: "50m"
                        limits:
                          memory: "128Mi"
                          cpu: "100m"
                    volumes:
                    - name: config
                      configMap:
                        name: promtail-config
                    - name: varlog
                      hostPath:
                        path: /var/log
                    - name: varlibdockercontainers
                      hostPath:
                        path: /var/lib/docker/containers

        - name: Create Promtail ConfigMap
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: promtail-config
                namespace: monitoring
              data:
                config.yml: |
                  server:
                    http_listen_port: 9080
                    grpc_listen_port: 0

                  positions:
                    filename: /tmp/positions.yaml

                  clients:
                    - url: http://loki:3100/loki/api/v1/push

                  scrape_configs:
                  - job_name: containers
                    static_configs:
                    - targets:
                        - localhost
                      labels:
                        job: containerlogs
                        __path__: /var/log/containers/*log

                  - job_name: syslog
                    static_configs:
                    - targets:
                        - localhost
                      labels:
                        job: syslog
                        __path__: /var/log/syslog

    # Hubble UI for Cilium Network Observability
    - name: Deploy Hubble UI
      when: enable_hubble_ui
      block:
        - name: Enable Hubble in Cilium
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: cilium-config
                namespace: kube-system
              data:
                hubble-relay-enabled: "true"
                hubble-ui-enabled: "true"

        - name: Deploy Hubble UI
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: hubble-ui
                namespace: kube-system
                labels:
                  k8s-app: hubble-ui
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    k8s-app: hubble-ui
                template:
                  metadata:
                    labels:
                      k8s-app: hubble-ui
                  spec:
                    containers:
                    - name: frontend
                      image: quay.io/cilium/hubble-ui:v0.12.0
                      ports:
                      - containerPort: 8081
                        name: http
                      resources:
                        requests:
                          memory: "64Mi"
                          cpu: "50m"
                        limits:
                          memory: "128Mi"
                          cpu: "100m"

        - name: Create Hubble UI Service
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: hubble-ui
                namespace: kube-system
                labels:
                  k8s-app: hubble-ui
              spec:
                selector:
                  k8s-app: hubble-ui
                ports:
                - name: http
                  port: 80
                  targetPort: 8081

        - name: Create Hubble UI Ingress
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: hubble-ui
                namespace: kube-system
                annotations:
                  traefik.ingress.kubernetes.io/router.entrypoints: web
              spec:
                rules:
                - host: hubble.{{ cluster_domain }}
                  http:
                    paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: hubble-ui
                          port:
                            number: 80

    # AlertManager for Enhanced Alerting
    - name: Deploy AlertManager
      when: enable_alerting and monitoring_stack == 'full'
      block:
        - name: Deploy AlertManager
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: alertmanager
                namespace: monitoring
                labels:
                  app: alertmanager
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: alertmanager
                template:
                  metadata:
                    labels:
                      app: alertmanager
                  spec:
                    containers:
                    - name: alertmanager
                      image: prom/alertmanager:v0.26.0
                      ports:
                      - containerPort: 9093
                      args:
                        - '--config.file=/etc/alertmanager/config.yml'
                        - '--storage.path=/alertmanager'
                      volumeMounts:
                      - name: alertmanager-config
                        mountPath: /etc/alertmanager
                      - name: alertmanager-storage
                        mountPath: /alertmanager
                      resources:
                        requests:
                          memory: "128Mi"
                          cpu: "50m"
                        limits:
                          memory: "256Mi"
                          cpu: "100m"
                    volumes:
                    - name: alertmanager-config
                      configMap:
                        name: alertmanager-config
                    - name: alertmanager-storage
                      emptyDir: {}

        - name: Create AlertManager ConfigMap
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: alertmanager-config
                namespace: monitoring
              data:
                config.yml: |
                  global:
                    smtp_smarthost: 'localhost:587'
                    smtp_from: 'alertmanager@{{ cluster_domain }}'

                  route:
                    group_by: ['alertname']
                    group_wait: 10s
                    group_interval: 10s
                    repeat_interval: 1h
                    receiver: 'webhook'

                  receivers:
                  - name: 'webhook'
                    webhook_configs:
                    - url: 'http://webhook-receiver:8080/webhook'

        - name: Create AlertManager Service
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: alertmanager
                namespace: monitoring
                labels:
                  app: alertmanager
              spec:
                selector:
                  app: alertmanager
                ports:
                - name: web
                  port: 9093
                  targetPort: 9093

    - name: Enhanced monitoring deployment complete
      debug:
        msg:
          - "✅ Enhanced Monitoring and Observability Phase Complete!"
          - "Prometheus: http://{{ ansible_default_ipv4.address }}:30090 (if NodePort enabled)"
          - "Grafana: http://grafana.{{ cluster_domain }} (admin/admin123)"
          - "Loki: {{ 'Enabled' if enable_log_aggregation else 'Disabled' }}"
          - "Hubble UI: {{ 'http://hubble.' + cluster_domain if enable_hubble_ui else 'Disabled' }}"
          - "AlertManager: {{ 'Enabled' if enable_alerting else 'Disabled' }}"
          - "Retention: {{ monitoring_retention_days }} days"