---
- name: Prepare Kubernetes Nodes
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Display node preparation information
      debug:
        msg:
          - "⚙️ Preparing node: {{ inventory_hostname }}"
          - "IP Address: {{ ansible_host }}"
      delegate_to: localhost
      run_once: false

    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install essential packages
      package:
        name:
          - curl
          - wget
          - git
          - htop
          - net-tools
          - software-properties-common
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Disable swap permanently
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
      when: disable_swap | default(true) | bool

    - name: Configure kernel modules for Kubernetes
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay
        - ip_vs
        - ip_vs_rr
        - ip_vs_wrr
        - ip_vs_sh

    - name: Make kernel modules persistent
      lineinfile:
        path: /etc/modules-load.d/k3s.conf
        line: "{{ item }}"
        create: yes
      loop:
        - br_netfilter
        - overlay
        - ip_vs
        - ip_vs_rr
        - ip_vs_wrr
        - ip_vs_sh

    - name: Configure sysctl parameters for Kubernetes
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }
        - { key: 'net.ipv4.conf.all.forwarding', value: '1' }
        - { key: 'net.ipv6.conf.all.forwarding', value: '1' }
        - { key: 'fs.inotify.max_user_watches', value: '524288' }
        - { key: 'fs.inotify.max_user_instances', value: '512' }

    - name: Configure firewall for Kubernetes
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '6443'  # Kubernetes API
        - '2379:2380'  # etcd
        - '10250'  # kubelet
        - '10251'  # kube-scheduler
        - '10252'  # kube-controller-manager
        - '30000:32767'  # NodePort services
      when:
        - enable_firewall | default(true) | bool
        - inventory_hostname in groups['controllers']

    - name: Configure firewall for worker nodes
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '10250'  # kubelet
        - '30000:32767'  # NodePort services
      when:
        - enable_firewall | default(true) | bool
        - inventory_hostname in groups['workers']

    - name: Enable firewall
      ufw:
        state: enabled
        policy: deny
        direction: incoming
      when: enable_firewall | default(true) | bool

    - name: Configure SSH for better security
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
      notify: restart sshd

    - name: Set timezone
      timezone:
        name: "{{ timezone | default('UTC') }}"

    - name: Configure NTP
      systemd:
        name: systemd-timesyncd
        enabled: yes
        state: started

    - name: Node preparation complete
      debug:
        msg:
          - "✅ Node {{ inventory_hostname }} prepared successfully"
          - "Ready for K3s installation"

  handlers:
    - name: restart sshd
      systemd:
        name: sshd
        state: restarted
