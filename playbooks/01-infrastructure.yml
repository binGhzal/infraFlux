---
- name: "Phase 1: Create Infrastructure (Proxmox VMs)"
  hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../config/cluster-config.yaml
  vars:
    # Auto-detect network if not specified
    detected_network: "{{ ansible_default_ipv4.network }}/{{ ansible_default_ipv4.netmask | ipaddr('prefix') }}"
    detected_gateway: "{{ ansible_default_ipv4.gateway }}"
    network_cidr: "{{ config.network_cidr | default(detected_network) }}"
    gateway_ip: "{{ config.gateway_ip | default(detected_gateway) }}"

    # VM configuration
    vm_base_name: "{{ config.cluster_name | default('infraflux') }}"
    controller_count: "{{ config.controller_count | default(3) }}"
    worker_count: "{{ config.worker_count | default(3) }}"

    # Calculate IP assignments
    network_base: "{{ network_cidr | ipaddr('network') }}"
    network_prefix: "{{ network_cidr | ipaddr('prefix') }}"
    start_ip: "{{ network_base | ipaddr('10') | ipaddr('address') }}"

  tasks:
    - name: Display deployment information
      debug:
        msg:
          - "=== InfraFlux Infrastructure Deployment ==="
          - "Cluster: {{ vm_base_name }}"
          - "Network: {{ network_cidr }}"
          - "Gateway: {{ gateway_ip }}"
          - "Controllers: {{ controller_count }}"
          - "Workers: {{ worker_count }}"
          - "Starting IP: {{ start_ip }}"

    - name: Validate Proxmox connection
      uri:
        url: "https://{{ config.proxmox_host }}:8006/api2/json/access/ticket"
        method: POST
        validate_certs: no
        body_format: form-urlencoded
        body:
          username: "{{ config.proxmox_user | default('root@pam') }}"
          password: "{{ proxmox_password }}"
        timeout: 10
      register: proxmox_auth
      failed_when: proxmox_auth.status != 200

    - name: Create controller VMs
      include_role:
        name: proxmox
      vars:
        vm_id: "{{ 100 + item }}"
        vm_name: "{{ vm_base_name }}-controller-{{ item }}"
        vm_ip: "{{ start_ip | ipmath(item) }}"
        vm_type: "controller"
      loop: "{{ range(1, (controller_count | int) + 1) | list }}"

    - name: Create worker VMs
      include_role:
        name: proxmox
      vars:
        vm_id: "{{ 200 + item }}"
        vm_name: "{{ vm_base_name }}-worker-{{ item }}"
        vm_ip: "{{ start_ip | ipmath((controller_count | int) + item) }}"
        vm_type: "worker"
      loop: "{{ range(1, (worker_count | int) + 1) | list }}"

    - name: Generate dynamic inventory
      template:
        src: ../templates/inventory.ini.j2
        dest: ../templates/inventory.ini
      vars:
        controllers: "{{ range(1, (controller_count | int) + 1) | list }}"
        workers: "{{ range(1, (worker_count | int) + 1) | list }}"

    - name: Wait for all VMs to be accessible
      wait_for:
        host: "{{ start_ip | ipmath(item) }}"
        port: 22
        delay: 30
        timeout: 300
      loop: "{{ range(1, ((controller_count | int) + (worker_count | int)) + 1) | list }}"

    - name: Infrastructure deployment completed
      debug:
        msg:
          - "✅ Infrastructure deployment completed successfully!"
          - "✅ {{ controller_count }} controllers created"
          - "✅ {{ worker_count }} workers created"
          - "✅ Inventory generated at templates/inventory.ini"
          - ""
          - "Next step: Run 'deploy.sh nodes' to prepare the nodes"
