---
# InfraFlux Security and Authentication Playbook
# Deploys authentication systems, security hardening, and access control

- name: Deploy Security and Authentication Stack
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    cluster_domain: "{{ cluster_domain | default('cluster.local') }}"
    auth_provider: "{{ auth_provider | default('none') }}"
    enable_crowdsec: "{{ enable_crowdsec | default(false) | bool }}"
    enable_sealed_secrets: "{{ enable_sealed_secrets | default(true) | bool }}"

  tasks:
    - name: Display security deployment information
      debug:
        msg:
          - "🔐 Starting Security and Authentication Deployment"
          - "Authentication Provider: {{ auth_provider }}"
          - "CrowdSec Security: {{ enable_crowdsec }}"
          - "Sealed Secrets: {{ enable_sealed_secrets }}"
          - "Cluster Domain: {{ cluster_domain }}"

    # Sealed Secrets for GitOps-ready secret management
    - name: Deploy Sealed Secrets Controller
      when: enable_sealed_secrets
      block:
        - name: Create sealed-secrets namespace
          kubernetes.core.k8s:
            name: sealed-secrets
            api_version: v1
            kind: Namespace
            state: present

        - name: Deploy Sealed Secrets Controller
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: sealed-secrets-controller
                namespace: sealed-secrets
                labels:
                  name: sealed-secrets-controller
              spec:
                minReadySeconds: 30
                replicas: 1
                revisionHistoryLimit: 10
                selector:
                  matchLabels:
                    name: sealed-secrets-controller
                strategy:
                  rollingUpdate:
                    maxSurge: 25%
                    maxUnavailable: 25%
                  type: RollingUpdate
                template:
                  metadata:
                    labels:
                      name: sealed-secrets-controller
                  spec:
                    containers:
                    - args: []
                      command:
                      - controller
                      env: []
                      image: quay.io/bitnami/sealed-secrets-controller:v0.24.5
                      imagePullPolicy: IfNotPresent
                      livenessProbe:
                        httpGet:
                          path: /healthz
                          port: http
                        initialDelaySeconds: 30
                        timeoutSeconds: 1
                      name: sealed-secrets-controller
                      ports:
                      - containerPort: 8080
                        name: http
                      readinessProbe:
                        httpGet:
                          path: /healthz
                          port: http
                        initialDelaySeconds: 5
                        timeoutSeconds: 1
                      resources: {}
                      securityContext:
                        readOnlyRootFilesystem: true
                        runAsNonRoot: true
                        runAsUser: 1001
                      stdin: false
                      tty: false
                      volumeMounts:
                      - mountPath: /tmp
                        name: tmp
                    imagePullSecrets: []
                    nodeSelector: {}
                    serviceAccountName: sealed-secrets-controller
                    terminationGracePeriodSeconds: 30
                    volumes:
                    - emptyDir: {}
                      name: tmp

        - name: Create Sealed Secrets Controller Service Account
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                name: sealed-secrets-controller
                namespace: sealed-secrets
                labels:
                  name: sealed-secrets-controller

        - name: Create Sealed Secrets Controller Service
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: sealed-secrets-controller
                namespace: sealed-secrets
                labels:
                  name: sealed-secrets-controller
              spec:
                ports:
                - name: http
                  port: 8080
                  targetPort: 8080
                selector:
                  name: sealed-secrets-controller
                type: ClusterIP

        - name: Display Sealed Secrets information
          debug:
            msg:
              - "✅ Sealed Secrets Controller deployed"
              - "Install kubeseal CLI to create sealed secrets:"
              - "curl -OL https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.5/kubeseal-0.24.5-linux-amd64.tar.gz"
              - "tar -xvzf kubeseal-0.24.5-linux-amd64.tar.gz kubeseal"
              - "sudo install -m 755 kubeseal /usr/local/bin/kubeseal"

    # Authelia Authentication System
    - name: Deploy Authelia Authentication
      when: auth_provider == "authelia"
      block:
        - name: Create authelia namespace
          kubernetes.core.k8s:
            name: authelia
            api_version: v1
            kind: Namespace
            state: present

        - name: Create Authelia configuration
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: authelia-config
                namespace: authelia
              data:
                configuration.yml: |
                  theme: light
                  jwt_secret: a-very-important-secret
                  default_redirection_url: https://auth.{{ cluster_domain }}

                  server:
                    host: 0.0.0.0
                    port: 9091

                  log:
                    level: debug

                  authentication_backend:
                    file:
                      path: /config/users_database.yml

                  access_control:
                    default_policy: deny
                    rules:
                      - domain: "*.{{ cluster_domain }}"
                        policy: one_factor

                  session:
                    name: authelia_session
                    secret: unsecure_session_secret
                    expiration: 3600
                    inactivity: 300
                    domain: {{ cluster_domain }}

                  regulation:
                    max_retries: 3
                    find_time: 120
                    ban_time: 300

                  storage:
                    local:
                      path: /config/db.sqlite3

                  notifier:
                    filesystem:
                      filename: /config/notification.txt

                users_database.yml: |
                  users:
                    admin:
                      displayname: "Admin User"
                      password: "$argon2id$v=19$m=65536,t=3,p=2$BjLa2TTjdAWN3QLzz1QKpA$rm3jaiTQtQm1gJBNk4cG7D+Tt4W8qg6A8Q5ySiBqWxY"  # Password: password123
                      email: admin@{{ cluster_domain }}
                      groups:
                        - admins
                        - dev

        - name: Deploy Authelia
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: authelia
                namespace: authelia
                labels:
                  app: authelia
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: authelia
                template:
                  metadata:
                    labels:
                      app: authelia
                  spec:
                    containers:
                    - name: authelia
                      image: authelia/authelia:4.38.0
                      ports:
                      - containerPort: 9091
                      volumeMounts:
                      - name: config
                        mountPath: /config
                      resources:
                        requests:
                          memory: "64Mi"
                          cpu: "50m"
                        limits:
                          memory: "128Mi"
                          cpu: "100m"
                    volumes:
                    - name: config
                      configMap:
                        name: authelia-config

        - name: Create Authelia Service
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: authelia
                namespace: authelia
              spec:
                selector:
                  app: authelia
                ports:
                - name: http
                  port: 80
                  targetPort: 9091

        - name: Create Authelia Ingress
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: authelia
                namespace: authelia
                annotations:
                  traefik.ingress.kubernetes.io/router.entrypoints: web
              spec:
                rules:
                - host: auth.{{ cluster_domain }}
                  http:
                    paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: authelia
                          port:
                            number: 80

        - name: Display Authelia information
          debug:
            msg:
              - "✅ Authelia Authentication deployed"
              - "Access URL: http://auth.{{ cluster_domain }}"
              - "Default credentials: admin / password123"
              - "Configure DNS or add to /etc/hosts:"
              - "{{ ansible_default_ipv4.address }} auth.{{ cluster_domain }}"

    # CrowdSec Security Analysis
    - name: Deploy CrowdSec Security
      when: enable_crowdsec
      block:
        - name: Create crowdsec namespace
          kubernetes.core.k8s:
            name: crowdsec
            api_version: v1
            kind: Namespace
            state: present

        - name: Deploy CrowdSec Agent
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: crowdsec-agent
                namespace: crowdsec
                labels:
                  app: crowdsec-agent
              spec:
                selector:
                  matchLabels:
                    app: crowdsec-agent
                template:
                  metadata:
                    labels:
                      app: crowdsec-agent
                  spec:
                    hostNetwork: true
                    containers:
                    - name: crowdsec-agent
                      image: crowdsecurity/crowdsec:v1.6.0
                      env:
                      - name: COLLECTIONS
                        value: "crowdsecurity/traefik crowdsecurity/http-cve"
                      volumeMounts:
                      - name: crowdsec-config
                        mountPath: /etc/crowdsec
                      - name: crowdsec-data
                        mountPath: /var/lib/crowdsec/data
                      - name: traefik-logs
                        mountPath: /var/log/traefik
                        readOnly: true
                      resources:
                        requests:
                          memory: "128Mi"
                          cpu: "100m"
                        limits:
                          memory: "256Mi"
                          cpu: "200m"
                    volumes:
                    - name: crowdsec-config
                      emptyDir: {}
                    - name: crowdsec-data
                      emptyDir: {}
                    - name: traefik-logs
                      hostPath:
                        path: /var/log/traefik

        - name: Display CrowdSec information
          debug:
            msg:
              - "✅ CrowdSec Security Analysis deployed"
              - "CrowdSec will analyze logs and block malicious IPs"
              - "Configure Traefik to forward logs to CrowdSec"

    # RBAC Configuration
    - name: Configure RBAC and Security Policies
      block:
        - name: Create security ClusterRole
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRole
              metadata:
                name: infraflux-security-admin
              rules:
              - apiGroups: [""]
                resources: ["secrets", "configmaps"]
                verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
              - apiGroups: ["apps"]
                resources: ["deployments", "daemonsets"]
                verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

        - name: Create security ClusterRoleBinding
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRoleBinding
              metadata:
                name: infraflux-security-admin
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: ClusterRole
                name: infraflux-security-admin
              subjects:
              - kind: ServiceAccount
                name: default
                namespace: kube-system

    - name: Security deployment complete
      debug:
        msg:
          - "✅ Security and Authentication Phase Complete!"
          - "Sealed Secrets: {{ 'Enabled' if enable_sealed_secrets else 'Disabled' }}"
          - "Authentication: {{ auth_provider }}"
          - "CrowdSec: {{ 'Enabled' if enable_crowdsec else 'Disabled' }}"
          - "RBAC: Configured with security policies"