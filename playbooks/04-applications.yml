---
- name: "Phase 4: Install Applications"
  hosts: controllers[0]
  become: no
  vars_files:
    - ../config/cluster-config.yaml
  vars:
    kubeconfig_path: /tmp/kubeconfig

  tasks:
    - name: Display application installation information
      debug:
        msg:
          - "=== Installing Applications ==="
          - "Cilium: {{ config.install_cilium | default(true) }}"
          - "MetalLB: {{ config.install_metallb | default(true) }}"
          - "Ingress NGINX: {{ config.install_ingress_nginx | default(true) }}"
          - "Cert Manager: {{ config.install_cert_manager | default(true) }}"
          - "Monitoring: {{ config.install_monitoring | default(true) }}"

    - name: Install core applications
      include_role:
        name: applications

    - name: Application installation completed
      debug:
        msg:
          - "✅ Application installation completed successfully!"
          - "✅ Core networking and infrastructure apps are ready"
          - ""
          - "Cluster is ready to use!"
          - "Kubeconfig: /tmp/kubeconfig"
