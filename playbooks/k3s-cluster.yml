---
- name: Setup K3s Kubernetes Cluster
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    k3s_server_ip: "{{ hostvars[groups['controllers'][0]]['ansible_host'] }}"
    k3s_token: "{{ k3s_token | default(lookup('password', '/tmp/k3s_token chars=ascii_letters,digits length=32')) }}"

  tasks:
    - name: Display K3s cluster information
      debug:
        msg:
          - "🔧 Setting up K3s cluster"
          - "First server: {{ k3s_server_ip }}"
          - "K3s version: {{ k3s_version | default('latest') }}"
          - "Cluster CIDR: {{ cluster_cidr | default('10.244.0.0/16') }}"
          - "Service CIDR: {{ service_cidr | default('10.96.0.0/12') }}"
      run_once: true
      delegate_to: localhost

# Install K3s on the first controller (cluster init)
- name: Install K3s on first controller
  hosts: controllers[0]
  become: yes
  tasks:
    - name: Download K3s installer
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Install first K3s server (cluster init)
      shell: |
        INSTALL_K3S_VERSION="{{ k3s_version | default('') }}" \
        K3S_TOKEN="{{ k3s_token }}" \
        sh /tmp/k3s-install.sh server \
        --cluster-init \
        --disable servicelb \
        --disable traefik \
        --cluster-cidr="{{ cluster_cidr | default('10.244.0.0/16') }}" \
        --service-cidr="{{ service_cidr | default('10.96.0.0/12') }}" \
        --cluster-dns="{{ cluster_dns | default('10.96.0.10') }}" \
        --write-kubeconfig-mode=644
      args:
        creates: /etc/systemd/system/k3s.service

    - name: Wait for first server to be ready
      wait_for:
        port: 6443
        host: "{{ ansible_host }}"
        delay: 10
        timeout: 300

    - name: Verify first server is running
      uri:
        url: "https://{{ ansible_host }}:6443/healthz"
        method: GET
        validate_certs: no
        status_code: 200
      retries: 30
      delay: 10

# Install K3s on additional controllers
- name: Install K3s on additional controllers
  hosts: controllers[1:]
  become: yes
  tasks:
    - name: Download K3s installer
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Install additional K3s servers
      shell: |
        INSTALL_K3S_VERSION="{{ k3s_version | default('') }}" \
        K3S_TOKEN="{{ k3s_token }}" \
        sh /tmp/k3s-install.sh server \
        --server https://{{ k3s_server_ip }}:6443 \
        --disable servicelb \
        --disable traefik \
        --write-kubeconfig-mode=644
      args:
        creates: /etc/systemd/system/k3s.service

    - name: Wait for additional servers to be ready
      wait_for:
        port: 6443
        host: "{{ ansible_host }}"
        delay: 10
        timeout: 300

# Install K3s on workers
- name: Install K3s on worker nodes
  hosts: workers
  become: yes
  tasks:
    - name: Download K3s installer
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Install K3s agent
      shell: |
        INSTALL_K3S_VERSION="{{ k3s_version | default('') }}" \
        K3S_URL="https://{{ k3s_server_ip }}:6443" \
        K3S_TOKEN="{{ k3s_token }}" \
        sh /tmp/k3s-install.sh agent
      args:
        creates: /etc/systemd/system/k3s-agent.service

    - name: Wait for agent to join cluster
      wait_for:
        port: 10250
        host: "{{ ansible_host }}"
        delay: 10
        timeout: 300

# Configure kubectl access
- name: Configure kubectl access
  hosts: controllers[0]
  become: yes
  tasks:
    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy kubeconfig for ubuntu user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        remote_src: yes

    - name: Update kubeconfig server address
      replace:
        path: /home/ubuntu/.kube/config
        regexp: 'https://127.0.0.1:6443'
        replace: "https://{{ ansible_host }}:6443"

    - name: Fetch kubeconfig to local machine
      fetch:
        src: /home/ubuntu/.kube/config
        dest: ./kubeconfig
        flat: yes

    - name: Display cluster status
      shell: kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml get nodes -o wide
      register: cluster_status

    - name: Show cluster information
      debug:
        msg:
          - "✅ K3s cluster setup complete!"
          - "Kubeconfig downloaded to: ./kubeconfig"
          - "Cluster status:"
          - "{{ cluster_status.stdout_lines }}"
