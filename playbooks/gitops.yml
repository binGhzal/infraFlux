---
# InfraFlux GitOps and Secret Management Playbook
# Implements Flux CLI for GitOps automation and kubeseal for secret management

- name: Deploy GitOps and Secret Management
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    cluster_domain: "{{ cluster_domain | default('cluster.local') }}"
    enable_gitops: "{{ enable_gitops | default(true) | bool }}"
    git_repository: "{{ git_repository | default('') }}"
    git_branch: "{{ git_branch | default('main') }}"
    git_path: "{{ git_path | default('./cluster') }}"
    sealed_secrets_version: "v0.24.5"
    flux_version: "v2.1.2"

  tasks:
    - name: Display GitOps deployment information
      debug:
        msg:
          - "🔄 Starting GitOps and Secret Management Deployment"
          - "GitOps Enabled: {{ enable_gitops }}"
          - "Git Repository: {{ git_repository }}"
          - "Git Branch: {{ git_branch }}"
          - "Flux Version: {{ flux_version }}"
          - "Sealed Secrets Version: {{ sealed_secrets_version }}"

    # Install Flux CLI
    - name: Install Flux CLI
      when: enable_gitops
      block:
        - name: Check if Flux CLI is installed
          command: flux version --client
          register: flux_check
          failed_when: false
          changed_when: false

        - name: Download and install Flux CLI
          when: flux_check.rc != 0
          block:
            - name: Create temporary directory for Flux
              tempfile:
                state: directory
                suffix: flux
              register: flux_temp_dir

            - name: Download Flux CLI (Linux)
              get_url:
                url: "https://github.com/fluxcd/flux2/releases/download/{{ flux_version }}/flux_{{ flux_version[1:] }}_linux_amd64.tar.gz"
                dest: "{{ flux_temp_dir.path }}/flux.tar.gz"
              when: ansible_system == "Linux"

            - name: Download Flux CLI (macOS)
              get_url:
                url: "https://github.com/fluxcd/flux2/releases/download/{{ flux_version }}/flux_{{ flux_version[1:] }}_darwin_amd64.tar.gz"
                dest: "{{ flux_temp_dir.path }}/flux.tar.gz"
              when: ansible_system == "Darwin"

            - name: Extract Flux CLI
              unarchive:
                src: "{{ flux_temp_dir.path }}/flux.tar.gz"
                dest: "{{ flux_temp_dir.path }}"
                remote_src: yes

            - name: Install Flux CLI to /usr/local/bin
              copy:
                src: "{{ flux_temp_dir.path }}/flux"
                dest: /usr/local/bin/flux
                mode: '0755'
              become: yes

            - name: Verify Flux CLI installation
              command: flux version --client
              register: flux_version_output

            - name: Display Flux CLI version
              debug:
                msg: "✅ Flux CLI installed: {{ flux_version_output.stdout }}"

    # Install kubeseal CLI
    - name: Install kubeseal CLI
      block:
        - name: Check if kubeseal CLI is installed
          command: kubeseal --version
          register: kubeseal_check
          failed_when: false
          changed_when: false

        - name: Download and install kubeseal CLI
          when: kubeseal_check.rc != 0
          block:
            - name: Create temporary directory for kubeseal
              tempfile:
                state: directory
                suffix: kubeseal
              register: kubeseal_temp_dir

            - name: Download kubeseal CLI (Linux)
              get_url:
                url: "https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ sealed_secrets_version }}/kubeseal-{{ sealed_secrets_version[1:] }}-linux-amd64.tar.gz"
                dest: "{{ kubeseal_temp_dir.path }}/kubeseal.tar.gz"
              when: ansible_system == "Linux"

            - name: Download kubeseal CLI (macOS)
              get_url:
                url: "https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ sealed_secrets_version }}/kubeseal-{{ sealed_secrets_version[1:] }}-darwin-amd64.tar.gz"
                dest: "{{ kubeseal_temp_dir.path }}/kubeseal.tar.gz"
              when: ansible_system == "Darwin"

            - name: Extract kubeseal CLI
              unarchive:
                src: "{{ kubeseal_temp_dir.path }}/kubeseal.tar.gz"
                dest: "{{ kubeseal_temp_dir.path }}"
                remote_src: yes

            - name: Install kubeseal CLI to /usr/local/bin
              copy:
                src: "{{ kubeseal_temp_dir.path }}/kubeseal"
                dest: /usr/local/bin/kubeseal
                mode: '0755'
              become: yes

            - name: Verify kubeseal CLI installation
              command: kubeseal --version
              register: kubeseal_version_output

            - name: Display kubeseal CLI version
              debug:
                msg: "✅ kubeseal CLI installed: {{ kubeseal_version_output.stdout }}"

    # Deploy Sealed Secrets Controller
    - name: Deploy Sealed Secrets Controller
      block:
        - name: Install Sealed Secrets Controller
          kubernetes.core.k8s:
            state: present
            src: "https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ sealed_secrets_version }}/controller.yaml"

        - name: Wait for Sealed Secrets Controller to be ready
          kubernetes.core.k8s_info:
            api_version: apps/v1
            kind: Deployment
            name: sealed-secrets-controller
            namespace: kube-system
            wait: true
            wait_condition:
              type: Available
              status: "True"
            wait_timeout: 300

        - name: Get Sealed Secrets public key
          command: kubeseal --fetch-cert
          register: sealed_secrets_cert
          retries: 5
          delay: 10
          until: sealed_secrets_cert.rc == 0

        - name: Save Sealed Secrets public key
          copy:
            content: "{{ sealed_secrets_cert.stdout }}"
            dest: "./sealed-secrets-public-key.pem"

        - name: Display Sealed Secrets information
          debug:
            msg:
              - "✅ Sealed Secrets Controller deployed"
              - "Public key saved to: ./sealed-secrets-public-key.pem"
              - "Create sealed secrets with: echo -n 'secret-value' | kubeseal --raw --from-file=/dev/stdin --name secret-name --namespace default"

    # Bootstrap Flux (if Git repository is provided)
    - name: Bootstrap Flux GitOps
      when: enable_gitops and git_repository != ""
      block:
        - name: Check Flux prerequisites
          command: flux check --pre
          register: flux_prereq_check

        - name: Display Flux prerequisites result
          debug:
            msg: "{{ flux_prereq_check.stdout_lines }}"

        - name: Bootstrap Flux
          command: >
            flux bootstrap git
            --url={{ git_repository }}
            --branch={{ git_branch }}
            --path={{ git_path }}
            --components-extra=image-reflector-controller,image-automation-controller
          register: flux_bootstrap_result
          when: flux_prereq_check.rc == 0

        - name: Display Flux bootstrap result
          debug:
            msg: "{{ flux_bootstrap_result.stdout_lines }}"
          when: flux_bootstrap_result is defined

        - name: Create cluster directory structure
          file:
            path: "{{ item }}"
            state: directory
          loop:
            - "./cluster/infrastructure"
            - "./cluster/applications"
            - "./cluster/secrets"

        - name: Create Flux GitRepository source
          copy:
            content: |
              ---
              apiVersion: source.toolkit.fluxcd.io/v1beta2
              kind: GitRepository
              metadata:
                name: infraflux-cluster
                namespace: flux-system
              spec:
                interval: 30s
                ref:
                  branch: {{ git_branch }}
                url: {{ git_repository }}
                ignore: |
                  # exclude all
                  /*
                  # include only cluster directory
                  !/cluster
            dest: "./cluster/flux-source.yaml"

        - name: Create Production Kustomization
          copy:
            content: |
              ---
              apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
              kind: Kustomization
              metadata:
                name: infraflux-production
                namespace: flux-system
              spec:
                interval: 10m
                timeout: 5m
                path: "./cluster/overlays/production"
                prune: true
                wait: true
                sourceRef:
                  kind: GitRepository
                  name: infraflux-cluster
                healthChecks:
                  - apiVersion: apps/v1
                    kind: Deployment
                    name: prometheus
                    namespace: monitoring
                  - apiVersion: apps/v1
                    kind: Deployment
                    name: grafana
                    namespace: monitoring
                postBuild:
                  substitute:
                    cluster_domain: "{{ cluster_domain }}"
                    cluster_name: "{{ cluster_name | default('infraflux-cluster') }}"
            dest: "./cluster/flux-kustomization-prod.yaml"

        - name: Create Development Kustomization
          copy:
            content: |
              ---
              apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
              kind: Kustomization
              metadata:
                name: infraflux-development
                namespace: flux-system
              spec:
                interval: 5m
                timeout: 3m
                path: "./cluster/overlays/development"
                prune: true
                wait: true
                sourceRef:
                  kind: GitRepository
                  name: infraflux-cluster
                postBuild:
                  substitute:
                    cluster_domain: "dev.{{ cluster_domain }}"
                    cluster_name: "{{ cluster_name | default('infraflux-cluster') }}-dev"
            dest: "./cluster/flux-kustomization-dev.yaml"

        - name: Create cluster base resources
          copy:
            content: |
              ---
              apiVersion: v1
              kind: Namespace
              metadata:
                name: infraflux-system
                labels:
                  app.kubernetes.io/part-of: infraflux
                  toolkit.fluxcd.io/tenant: infraflux-team
              ---
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: cluster-config
                namespace: infraflux-system
              data:
                cluster_name: "{{ cluster_name | default('infraflux-cluster') }}"
                cluster_domain: "{{ cluster_domain }}"
                environment: "production"
            dest: "./cluster/base/infrastructure/namespace.yaml"

        - name: Create Kustomize patches directory
          file:
            path: "{{ item }}"
            state: directory
          loop:
            - "./cluster/base/patches"
            - "./cluster/overlays/production/patches"
            - "./cluster/overlays/development/patches"

        - name: Create production resource patches
          copy:
            content: |
              ---
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: prometheus
                namespace: monitoring
              spec:
                template:
                  spec:
                    containers:
                    - name: prometheus
                      resources:
                        requests:
                          memory: "1Gi"
                          cpu: "500m"
                        limits:
                          memory: "2Gi"
                          cpu: "1000m"
              ---
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: grafana
                namespace: monitoring
              spec:
                template:
                  spec:
                    containers:
                    - name: grafana
                      resources:
                        requests:
                          memory: "512Mi"
                          cpu: "200m"
                        limits:
                          memory: "1Gi"
                          cpu: "500m"
            dest: "./cluster/overlays/production/patches/production-resources.yaml"

    # Create example sealed secret
    - name: Create example sealed secret
      block:
        - name: Create example secret for sealing
          copy:
            content: |
              apiVersion: v1
              kind: Secret
              metadata:
                name: example-secret
                namespace: default
              type: Opaque
              stringData:
                password: "super-secret-password"
                api-key: "very-secret-api-key"
            dest: "./example-secret.yaml"

        - name: Create sealed version of example secret
          shell: kubeseal --format=yaml < example-secret.yaml > example-sealed-secret.yaml
          register: seal_result
          failed_when: false

        - name: Display sealed secret creation result
          debug:
            msg:
              - "✅ Example secrets created:"
              - "Original: ./example-secret.yaml (DO NOT COMMIT THIS)"
              - "Sealed: ./example-sealed-secret.yaml (SAFE TO COMMIT)"
          when: seal_result.rc == 0

        - name: Remove plain text secret file
          file:
            path: "./example-secret.yaml"
            state: absent

    # Create GitOps helper scripts
    - name: Create GitOps helper scripts
      block:
        - name: Create seal-secret.sh script
          copy:
            content: |
              #!/bin/bash
              # InfraFlux Sealed Secret Helper
              # Usage: ./seal-secret.sh <secret-name> <namespace> <key> <value>

              set -euo pipefail

              SECRET_NAME="${1:-}"
              NAMESPACE="${2:-default}"
              KEY="${3:-}"
              VALUE="${4:-}"

              if [[ -z "$SECRET_NAME" || -z "$KEY" || -z "$VALUE" ]]; then
                  echo "Usage: $0 <secret-name> <namespace> <key> <value>"
                  echo "Example: $0 my-secret default password 'my-secret-password'"
                  exit 1
              fi

              echo "Creating sealed secret: $SECRET_NAME in namespace: $NAMESPACE"

              # Create temporary secret
              cat > temp-secret.yaml << EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: $SECRET_NAME
                namespace: $NAMESPACE
              type: Opaque
              stringData:
                $KEY: "$VALUE"
              EOF

              # Seal the secret
              kubeseal --format=yaml < temp-secret.yaml > "cluster/secrets/$SECRET_NAME-sealed.yaml"

              # Clean up
              rm temp-secret.yaml

              echo "✅ Sealed secret created: cluster/secrets/$SECRET_NAME-sealed.yaml"
              echo "You can safely commit this file to Git!"
            dest: "./seal-secret.sh"
            mode: '0755'

        - name: Create flux-update.sh script
          copy:
            content: |
              #!/bin/bash
              # InfraFlux GitOps Update Helper
              # Usage: ./flux-update.sh [component]

              set -euo pipefail

              COMPONENT="${1:-all}"

              echo "🔄 Updating Flux components: $COMPONENT"

              case "$COMPONENT" in
                "all")
                    flux reconcile source git flux-system
                    flux reconcile kustomization flux-system
                    flux reconcile kustomization infraflux-infrastructure
                    flux reconcile kustomization infraflux-applications
                    ;;
                "infrastructure")
                    flux reconcile kustomization infraflux-infrastructure
                    ;;
                "applications")
                    flux reconcile kustomization infraflux-applications
                    ;;
                *)
                    echo "Unknown component: $COMPONENT"
                    echo "Available components: all, infrastructure, applications"
                    exit 1
                    ;;
              esac

              echo "✅ Flux reconciliation complete"
            dest: "./flux-update.sh"
            mode: '0755'

        - name: Create .gitignore for GitOps
          copy:
            content: |
              # InfraFlux GitOps .gitignore
              
              # Never commit plain text secrets
              *-secret.yaml
              secret.yaml
              secrets.yaml
              
              # Temporary files
              temp-*.yaml
              *.tmp
              
              # Local configuration
              .env
              .env.local
              
              # kubeseal temporary files
              kubeseal-*.pem
              
              # Sealed secrets public key (this is safe to commit)
              !sealed-secrets-public-key.pem
              
              # Application-specific
              /kubeconfig
              /inventory.ini
            dest: "./.gitignore-gitops"

    - name: GitOps and Secret Management deployment complete
      debug:
        msg:
          - "✅ GitOps and Secret Management Phase Complete!"
          - "Flux CLI: {{ 'Installed' if enable_gitops else 'Skipped' }}"
          - "kubeseal CLI: Installed"
          - "Sealed Secrets Controller: Deployed"
          - "GitOps Bootstrap: {{ 'Completed' if git_repository else 'Skipped (no repository provided)' }}"
          - ""
          - "📝 Next Steps:"
          - "1. Use ./seal-secret.sh to create sealed secrets"
          - "2. Use ./flux-update.sh to force reconciliation"
          - "3. Commit cluster/ directory to Git for GitOps"
          - "4. Add sealed-secrets-public-key.pem to your Git repository"
          - ""
          - "🔐 Secret Management:"
          - "• Create secrets: ./seal-secret.sh <name> <namespace> <key> <value>"
          - "• Apply sealed secrets: kubectl apply -f cluster/secrets/"
          - "• Public key: ./sealed-secrets-public-key.pem"