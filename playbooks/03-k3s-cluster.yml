---
- name: "Phase 3: Setup K3s Cluster"
  hosts: controllers
  become: yes
  serial: 1
  vars_files:
    - ../config/cluster-config.yaml
  vars:
    k3s_server_ip: "{{ hostvars[groups['controllers'][0]]['ansible_host'] }}"
    k3s_token: "{{ config.k3s_token | default(lookup('password', '/tmp/k3s_token chars=ascii_letters,digits length=32')) }}"

  tasks:
    - name: Setup first K3s server (cluster init)
      include_role:
        name: k3s-server
      vars:
        is_first_server: true
      when: inventory_hostname == groups['controllers'][0]

    - name: Setup additional K3s servers
      include_role:
        name: k3s-server
      vars:
        is_first_server: false
        join_server: "{{ k3s_server_ip }}"
      when: inventory_hostname != groups['controllers'][0]

- name: "Phase 3: Setup K3s Workers"
  hosts: workers
  become: yes
  vars_files:
    - ../config/cluster-config.yaml
  vars:
    k3s_server_ip: "{{ hostvars[groups['controllers'][0]]['ansible_host'] }}"
    k3s_token: "{{ config.k3s_token | default(lookup('password', '/tmp/k3s_token chars=ascii_letters,digits length=32')) }}"

  tasks:
    - name: Setup K3s agents
      include_role:
        name: k3s-agent

- name: "Phase 3: Configure kubectl access"
  hosts: controllers[0]
  become: yes
  vars_files:
    - ../config/cluster-config.yaml

  tasks:
    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy kubeconfig for ubuntu user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        remote_src: yes

    - name: Update kubeconfig server address
      replace:
        path: /home/ubuntu/.kube/config
        regexp: 'https://127.0.0.1:6443'
        replace: "https://{{ ansible_host }}:6443"

    - name: Fetch kubeconfig to local machine
      fetch:
        src: /home/ubuntu/.kube/config
        dest: /tmp/kubeconfig
        flat: yes

    - name: K3s cluster setup completed
      debug:
        msg:
          - "✅ K3s cluster setup completed successfully!"
          - "✅ Controllers: {{ groups['controllers'] | length }}"
          - "✅ Workers: {{ groups['workers'] | length }}"
          - "✅ Kubeconfig saved to /tmp/kubeconfig"
          - ""
          - "Next step: Run 'deploy.sh apps' to install applications"
