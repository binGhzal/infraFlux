---
# InfraFlux v2.0 - Main Deployment Playbook
# Declarative infrastructure deployment using Ansible and Jinja2

- name: "InfraFlux v2.0 - Declarative Infrastructure Deployment"
  hosts: localhost
  gather_facts: true
  vars:
    # Load unified configuration from YAML file
    config: "{{ lookup('file', config_file) | from_yaml }}"
    
    # Deployment settings
    deployment_id: "infraflux-{{ ansible_date_time.epoch }}"
    work_dir: "/tmp/{{ deployment_id }}"
    
    # Extract configuration with smart defaults
    cluster_name: "{{ config.metadata.name }}"
    cluster_environment: "{{ config.metadata.environment | default('development') }}"
    
    # Proxmox settings with auto-detection
    proxmox_host: "{{ config.spec.infrastructure.proxmox.host }}"
    proxmox_user: "root@pam"  # Standard Proxmox user
    proxmox_node: "{{ config.spec.infrastructure.proxmox.node | default('pve') }}"
    proxmox_storage: "{{ config.spec.infrastructure.proxmox.storage | default('local-lvm') }}"
    
    # Environment-aware defaults
    control_plane_count: "{{ 1 if cluster_environment == 'development' else 3 }}"
    worker_count: "{{ 1 if cluster_environment == 'development' else 3 }}"
    vm_cores: "{{ 2 if cluster_environment == 'development' else 4 }}"
    vm_memory: "{{ 2048 if cluster_environment == 'development' else 4096 }}"
    vm_disk_size: "{{ '20G' if cluster_environment == 'development' else '50G' }}"
    vm_network_bridge: "{{ config.spec.infrastructure.proxmox.bridge | default('vmbr0') }}"
    
    # Auto-calculate IP addresses (simple default range)
    control_plane_ips: 
      - "10.0.0.10"
    worker_ips:
      - "10.0.0.20"
    
    # Version management (default to latest stable)
    talos_version: "v1.10.0"
    kubernetes_version: "v1.31.0"
    
  tasks:
    - name: Display deployment information
      debug:
        msg: |
          🚀 InfraFlux v2.0 Deployment Starting
          
          Deployment ID: {{ deployment_id }}
          Cluster: {{ cluster_name }}
          Environment: {{ cluster_environment }}
          Phase: {{ deployment_phase }}
          
          Target Infrastructure:
          - Proxmox Host: {{ proxmox_host }}
          - Control Plane Nodes: {{ control_plane_ips | length }}
          - Worker Nodes: {{ worker_ips | length }}
          
          Versions:
          - Talos: {{ talos_version }}
          - Kubernetes: {{ kubernetes_version }}

    # Phase 1: Prerequisites
    - name: Check prerequisites
      include_tasks: tasks/prerequisites.yml
      when: deployment_phase in ['all', 'prerequisites']

    # Phase 2: Generate configurations
    - name: Generate configurations
      include_tasks: tasks/generate-configs.yml
      when: deployment_phase in ['all', 'config', 'infrastructure']

    # Phase 3: Deploy infrastructure
    - name: Deploy Proxmox VMs
      include_tasks: tasks/deploy-infrastructure.yml
      when: deployment_phase in ['all', 'infrastructure']

    # Phase 4: Bootstrap Talos cluster
    - name: Bootstrap Talos cluster
      include_tasks: tasks/bootstrap-cluster.yml
      when: deployment_phase in ['all', 'bootstrap']

    # Phase 5: Install applications
    - name: Install applications
      include_tasks: tasks/install-apps.yml
      when: 
        - deployment_phase in ['all', 'apps']

    # Phase 6: Validate deployment
    - name: Validate deployment
      include_tasks: tasks/validate.yml
      when: deployment_phase in ['all', 'validate']

    - name: Display completion summary
      debug:
        msg: |
          🎉 InfraFlux v2.0 Deployment Completed!
          
          Cluster: {{ cluster_name }}
          Endpoint: https://{{ control_plane_ips[0] }}:6443
          Kubeconfig: {{ work_dir }}/kubeconfig
          
          Next steps:
          1. export KUBECONFIG={{ work_dir }}/kubeconfig
          2. kubectl get nodes
          3. kubectl get pods --all-namespaces