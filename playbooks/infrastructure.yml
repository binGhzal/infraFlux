---
- name: Gather Facts from Proxmox Host
  hosts: proxmox
  gather_facts: yes
  vars:
    ansible_user: "{{ proxmox_user.split('@')[0] if proxmox_user is defined else 'root' }}"
    ansible_password: "{{ proxmox_password }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

- name: Deploy Infrastructure using Terraform and Proxmox
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    vm_base_name: "{{ cluster_name | default('k3s') }}"
    terraform_dir: "/tmp/infraflux-terraform"

  tasks:
    - name: Display initial deployment information
      debug:
        msg:
          - "🌟 Starting Infrastructure Deployment with Terraform"
          - "Connecting to Proxmox host: {{ proxmox_host }}"
          - "Cluster: {{ vm_base_name }}"
          - "Controllers: {{ controller_count | default(3) }}"
          - "Workers: {{ worker_count | default(3) }}"

    - name: Auto-detect network configuration from Proxmox
      set_fact:
        detected_network_cidr: "{{ hostvars[proxmox_host]['ansible_default_ipv4']['network'] }}/24"
        detected_gateway: "{{ hostvars[proxmox_host]['ansible_default_ipv4']['gateway'] }}"
      when: network_cidr == "auto"

    - name: Use provided network configuration
      set_fact:
        detected_network_cidr: "{{ network_cidr }}"
        detected_gateway: "{{ gateway_ip | default(hostvars[proxmox_host]['ansible_default_ipv4']['gateway'] | default('192.168.1.1')) }}"
      when: network_cidr != "auto"

    - name: Set final network configuration
      set_fact:
        final_network_cidr: "{{ detected_network_cidr }}"
        final_gateway_ip: "{{ detected_gateway }}"

    - name: Display discovered network configuration
      debug:
        msg:
          - "✅ Network Discovery Complete"
          - "Network CIDR: {{ final_network_cidr }}"
          - "Gateway IP: {{ final_gateway_ip }}"
          - "Proxmox Node: {{ proxmox_node | default('pve') }}"

    - name: Create Terraform working directory
      file:
        path: "{{ terraform_dir }}"
        state: directory
        mode: '0755'

    - name: Copy Terraform templates
      copy:
        src: "{{ item }}"
        dest: "{{ terraform_dir }}/"
      loop:
        - "../ansible/templates/terraform/main.tf"
        - "../ansible/templates/terraform/variables.tf"
        - "../ansible/templates/terraform/outputs.tf"

    - name: Create Terraform variables file
      template:
        src: "../ansible/templates/terraform.tfvars.j2"
        dest: "{{ terraform_dir }}/terraform.tfvars"
      vars:
        tf_proxmox_host: "{{ proxmox_host }}"
        tf_proxmox_user: "{{ proxmox_user | default('root@pam') }}"
        tf_proxmox_password: "{{ proxmox_password }}"
        tf_proxmox_node: "{{ proxmox_node | default('pve') }}"
        tf_proxmox_storage: "{{ proxmox_storage | default('local-lvm') }}"
        tf_cluster_name: "{{ vm_base_name }}"
        tf_controller_count: "{{ controller_count | default(3) }}"
        tf_worker_count: "{{ worker_count | default(3) }}"
        tf_vm_template_name: "{{ vm_template_name | default('ubuntu-24.04-template') }}"
        tf_vm_cores: "{{ vm_cores | default(2) }}"
        tf_vm_memory: "{{ vm_memory | default(4096) }}"
        tf_vm_disk_size: "{{ vm_disk_size | default('20G') }}"
        tf_network_cidr: "{{ final_network_cidr }}"
        tf_gateway_ip: "{{ final_gateway_ip }}"
        tf_ssh_public_key: "{{ ssh_public_key }}"

    - name: Initialize Terraform
      terraform:
        project_path: "{{ terraform_dir }}"
        state: present
        force_init: true

    - name: Plan Terraform deployment
      terraform:
        project_path: "{{ terraform_dir }}"
        state: planned
        plan_file: "infraflux.plan"

    - name: Apply Terraform configuration
      terraform:
        project_path: "{{ terraform_dir }}"
        state: present
        plan_file: "infraflux.plan"
      register: terraform_output

    - name: Extract Terraform outputs
      set_fact:
        controller_ips: "{{ terraform_output.outputs.controller_ips.value }}"
        worker_ips: "{{ terraform_output.outputs.worker_ips.value }}"
        all_ips: "{{ terraform_output.outputs.all_ips.value }}"

    - name: Wait for VMs to be ready
      wait_for:
        host: "{{ item }}"
        port: 22
        delay: 30
        timeout: 300
      loop: "{{ all_ips }}"

    - name: Generate dynamic inventory for Ansible
      template:
        src: templates/inventory.ini.j2
        dest: /tmp/inventory.ini
      vars:
        controllers_with_ips: "{{ controller_ips | zip(range(1, (controller_count | int) + 1)) | list }}"
        workers_with_ips: "{{ worker_ips | zip(range(1, (worker_count | int) + 1)) | list }}"

    - name: Infrastructure deployment complete
      debug:
        msg:
          - "✅ Infrastructure Phase Complete!"
          - "Controller VMs: {{ controller_count }}"
          - "Worker VMs: {{ worker_count }}"
          - "Inventory file: inventory/hosts"
