---
- name: Create Proxmox VMs for Kubernetes Cluster
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    # Auto-detected network variables (can be overridden)
    detected_network: "{{ ansible_default_ipv4.network }}/{{ ansible_default_ipv4.netmask | ipaddr('prefix') }}"
    detected_gateway: "{{ ansible_default_ipv4.gateway }}"

    # Use provided network or auto-detected
    network_cidr: "{{ network_cidr | default(detected_network) }}"
    gateway_ip: "{{ gateway_ip | default(detected_gateway) }}"

    # VM configuration with smart defaults
    vm_base_name: "{{ cluster_name | default('k3s') }}"
    vm_memory: "{{ vm_memory | default('4096') }}"
    vm_cores: "{{ vm_cores | default('2') }}"
    vm_disk_size: "{{ vm_disk_size | default('20G') }}"

    # Generate IP range automatically
    network_base: "{{ network_cidr | ipaddr('network') }}"
    network_prefix: "{{ network_cidr | ipaddr('prefix') }}"
    start_ip: "{{ network_base | ipaddr('10') | ipaddr('address') }}"

  tasks:
    - name: Display deployment information
      debug:
        msg:
          - "🌟 Starting Infrastructure Deployment"
          - "Cluster: {{ vm_base_name }}"
          - "Network: {{ network_cidr }}"
          - "Gateway: {{ gateway_ip }}"
          - "Controllers: {{ controller_count | default(3) }}"
          - "Workers: {{ worker_count | default(3) }}"

    - name: Create controller VMs
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user | default('root@pam') }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ proxmox_node | default('pve') }}"
        vmid: "{{ 100 + item }}"
        name: "{{ vm_base_name }}-controller-{{ item }}"
        clone: "{{ vm_template_name | default('ubuntu-template') }}"
        full: yes
        storage: "{{ proxmox_storage | default('local-lvm') }}"
        memory: "{{ vm_memory }}"
        cores: "{{ vm_cores }}"
        net:
          net0: "virtio,bridge=vmbr0"
        ipconfig:
          ipconfig0: "ip={{ start_ip | ipmath(item) }}/{{ network_prefix }},gw={{ gateway_ip }}"
        sshkeys: "{{ lookup('file', ssh_key_path | default('~/.ssh/id_rsa.pub')) }}"
        state: present
        timeout: 300
      loop: "{{ range(1, (controller_count | int) + 1) | list }}"
      register: controller_vms

    - name: Create worker VMs
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user | default('root@pam') }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ proxmox_node | default('pve') }}"
        vmid: "{{ 200 + item }}"
        name: "{{ vm_base_name }}-worker-{{ item }}"
        clone: "{{ vm_template_name | default('ubuntu-template') }}"
        full: yes
        storage: "{{ proxmox_storage | default('local-lvm') }}"
        memory: "{{ vm_memory }}"
        cores: "{{ vm_cores }}"
        net:
          net0: "virtio,bridge=vmbr0"
        ipconfig:
          ipconfig0: "ip={{ start_ip | ipmath((controller_count | int) + item) }}/{{ network_prefix }},gw={{ gateway_ip }}"
        sshkeys: "{{ lookup('file', ssh_key_path | default('~/.ssh/id_rsa.pub')) }}"
        state: present
        timeout: 300
      loop: "{{ range(1, (worker_count | int) + 1) | list }}"
      register: worker_vms

    - name: Wait for VMs to be ready
      wait_for:
        host: "{{ start_ip | ipmath(item) }}"
        port: 22
        delay: 30
        timeout: 300
      loop: "{{ range(1, ((controller_count | int) + (worker_count | int)) + 1) | list }}"

    - name: Generate dynamic inventory
      template:
        src: templates/inventory.ini.j2
        dest: inventory/hosts
      vars:
        controllers: "{{ range(1, (controller_count | int) + 1) | list }}"
        workers: "{{ range(1, (worker_count | int) + 1) | list }}"

    - name: Infrastructure deployment complete
      debug:
        msg:
          - "✅ Infrastructure Phase Complete!"
          - "Controller VMs: {{ controller_count }}"
          - "Worker VMs: {{ worker_count }}"
          - "Inventory file: inventory/hosts"
