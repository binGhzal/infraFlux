---
# Deployment validation tasks

- name: Get cluster info
  shell: kubectl cluster-info --kubeconfig {{ work_dir }}/kubeconfig
  register: cluster_info

- name: Get node status
  shell: kubectl get nodes --kubeconfig {{ work_dir }}/kubeconfig -o wide
  register: node_status

- name: Get all pods
  shell: kubectl get pods --all-namespaces --kubeconfig {{ work_dir }}/kubeconfig
  register: pod_status

- name: Test connectivity with temporary pod
  kubernetes.core.k8s:
    kubeconfig: "{{ work_dir }}/kubeconfig"
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: connectivity-test
        namespace: default
      spec:
        containers:
        - name: test
          image: busybox:1.36
          command: ['sleep', '60']
        restartPolicy: Never
    state: present

- name: Wait for test pod to be ready
  shell: |
    kubectl wait --for=condition=ready pod/connectivity-test \
      --timeout=60s \
      --kubeconfig {{ work_dir }}/kubeconfig
  register: test_pod_ready

- name: Test DNS resolution
  shell: |
    kubectl exec connectivity-test \
      --kubeconfig {{ work_dir }}/kubeconfig \
      -- nslookup kubernetes.default.svc.cluster.local
  register: dns_test

- name: Test pod networking
  shell: |
    kubectl exec connectivity-test \
      --kubeconfig {{ work_dir }}/kubeconfig \
      -- wget -qO- http://kubernetes.default.svc.cluster.local/api/v1 | head -1
  register: network_test
  failed_when: false

- name: Cleanup test pod
  kubernetes.core.k8s:
    kubeconfig: "{{ work_dir }}/kubeconfig"
    name: connectivity-test
    api_version: v1
    kind: Pod
    namespace: default
    state: absent

- name: Display validation results
  debug:
    msg: |
      🎉 InfraFlux Deployment Validation Complete!
      
      ================================================
      CLUSTER INFORMATION
      ================================================
      {{ cluster_info.stdout }}
      
      ================================================
      NODE STATUS  
      ================================================
      {{ node_status.stdout }}
      
      ================================================
      VALIDATION TESTS
      ================================================
      Pod Scheduling: {{ 'PASSED' if test_pod_ready.rc == 0 else 'FAILED' }}
      DNS Resolution: {{ 'PASSED' if dns_test.rc == 0 else 'FAILED' }}
      Pod Networking: {{ 'PASSED' if network_test.rc == 0 else 'FAILED' }}
      
      ================================================
      QUICK START COMMANDS
      ================================================
      export KUBECONFIG={{ work_dir }}/kubeconfig
      kubectl get nodes
      kubectl get pods --all-namespaces
      
      🚀 Your Kubernetes cluster is ready for workloads!