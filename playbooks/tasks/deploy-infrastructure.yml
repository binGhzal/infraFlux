---
# Infrastructure deployment using Terraform

- name: Initialize Terraform
  terraform:
    project_path: "{{ work_dir }}/terraform"
    state: planned
    plan_file: "{{ work_dir }}/terraform/terraform.tfplan"
  register: terraform_plan

- name: Display Terraform plan
  debug:
    msg: |
      Terraform plan summary:
      {{ terraform_plan.stdout_lines[-10:] | join('\n') }}

- name: Apply Terraform configuration
  terraform:
    project_path: "{{ work_dir }}/terraform"
    state: present
    plan_file: "{{ work_dir }}/terraform/terraform.tfplan"
  register: terraform_apply

- name: Wait for VMs to boot
  wait_for:
    timeout: 60
  delegate_to: localhost

- name: Wait for Talos API on control plane
  wait_for:
    host: "{{ item }}"
    port: 50000
    delay: 30
    timeout: 300
    msg: "Talos API not available on {{ item }}"
  loop: "{{ control_plane_ips }}"

- name: Wait for Talos API on workers
  wait_for:
    host: "{{ item }}"
    port: 50000
    delay: 30
    timeout: 300
    msg: "Talos API not available on {{ item }}"
  loop: "{{ worker_ips }}"

- name: Display infrastructure deployment summary
  debug:
    msg: |
      ✅ Infrastructure deployed successfully!
      
      VMs created:
      - Control plane: {{ control_plane_ips | length }} nodes
      - Workers: {{ worker_ips | length }} nodes
      
      Next: Bootstrap Talos cluster