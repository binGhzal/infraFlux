---
# Talos cluster bootstrap tasks

- name: Apply control plane configuration
  shell: |
    talosctl apply-config \
      --insecure \
      --nodes {{ item }} \
      --file {{ work_dir }}/talos/controlplane.yaml
  loop: "{{ control_plane_ips }}"
  environment:
    TALOSCONFIG: "{{ work_dir }}/talos/talosconfig"

- name: Apply worker configuration
  shell: |
    talosctl apply-config \
      --insecure \
      --nodes {{ item }} \
      --file {{ work_dir }}/talos/worker.yaml
  loop: "{{ worker_ips }}"
  environment:
    TALOSCONFIG: "{{ work_dir }}/talos/talosconfig"

- name: Wait for nodes to apply configuration
  pause:
    seconds: 120

- name: Bootstrap Kubernetes cluster
  shell: |
    talosctl bootstrap --nodes {{ control_plane_ips[0] }}
  environment:
    TALOSCONFIG: "{{ work_dir }}/talos/talosconfig"
  register: bootstrap_result

- name: Wait for Kubernetes API
  wait_for:
    host: "{{ control_plane_ips[0] }}"
    port: 6443
    delay: 30
    timeout: 300
    msg: "Kubernetes API not available"

- name: Extract kubeconfig
  shell: |
    talosctl kubeconfig \
      --nodes {{ control_plane_ips[0] }} \
      {{ work_dir }}/kubeconfig
  environment:
    TALOSCONFIG: "{{ work_dir }}/talos/talosconfig"

- name: Wait for all nodes to be ready
  shell: |
    kubectl get nodes --kubeconfig {{ work_dir }}/kubeconfig \
      --no-headers | awk '{print $2}' | grep -v Ready || echo "waiting"
  register: nodes_ready
  until: nodes_ready.stdout == ""
  retries: 30
  delay: 10

- name: Display cluster status
  shell: kubectl get nodes --kubeconfig {{ work_dir }}/kubeconfig -o wide
  register: cluster_status

- name: Show bootstrap results
  debug:
    msg: |
      ✅ Talos cluster bootstrap completed!
      
      Cluster: {{ cluster_name }}
      Endpoint: https://{{ control_plane_ips[0] }}:6443
      Kubeconfig: {{ work_dir }}/kubeconfig
      
      {{ cluster_status.stdout }}