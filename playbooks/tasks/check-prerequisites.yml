---
# InfraFlux v2.0 - Prerequisites Check Tasks

- name: Check Python dependencies
  pip:
    name: "{{ item }}"
    state: present
  loop:
    - proxmoxer
    - requests
    - pyyaml
    - kubernetes
  register: python_deps_result
  failed_when: false

- name: Check required binaries
  command: which {{ item }}
  register: binary_check
  failed_when: false
  changed_when: false
  loop:
    - talosctl
    - kubectl
    - helm
    
- name: Display binary check results
  debug:
    msg: "{{ item.item }}: {{ 'Found' if item.rc == 0 else 'Missing' }}"
  loop: "{{ binary_check.results }}"
  
- name: Check Proxmox connectivity
  uri:
    url: "https://{{ proxmox_host }}:8006/api2/json/version"
    method: GET
    validate_certs: false
    status_code: 200
  register: proxmox_connectivity
  failed_when: false
  
- name: Display Proxmox connectivity
  debug:
    msg: "Proxmox connectivity: {{ 'OK' if proxmox_connectivity.status == 200 else 'Failed' }}"
    
- name: Verify Talos ISO availability
  uri:
    url: "https://github.com/siderolabs/talos/releases/download/{{ talos_version }}/talos-{{ talos_version }}-amd64.iso"
    method: HEAD
    status_code: 200
  register: talos_iso_check
  failed_when: false
  
- name: Display Talos ISO availability
  debug:
    msg: "Talos ISO availability: {{ 'OK' if talos_iso_check.status == 200 else 'Failed' }}"

- name: Fail if critical prerequisites are missing
  fail:
    msg: "Critical prerequisites are missing. Please install required tools."
  when: >
    (binary_check.results | selectattr('rc', 'ne', 0) | list | length > 0) or
    (proxmox_connectivity.status != 200)