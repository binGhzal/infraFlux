---
# InfraFlux v2.0 - Talos Bootstrap Tasks

- name: Wait for Talos API to be available on control plane nodes
  wait_for:
    host: "{{ item }}"
    port: 50000
    delay: 30
    timeout: 300
  loop: "{{ control_plane_ips }}"

- name: Wait for Talos API to be available on worker nodes
  wait_for:
    host: "{{ item }}"
    port: 50000
    delay: 30
    timeout: 300
  loop: "{{ worker_ips }}"

- name: Apply control plane configuration
  shell: |
    talosctl apply-config \
      --insecure \
      --nodes {{ item }} \
      --file {{ talos_config_dir }}/controlplane-{{ loop.index0 }}.yaml
  loop: "{{ control_plane_ips }}"
  environment:
    TALOSCONFIG: "{{ talos_config_dir }}/talosconfig"

- name: Apply worker configuration
  shell: |
    talosctl apply-config \
      --insecure \
      --nodes {{ item }} \
      --file {{ talos_config_dir }}/worker-{{ loop.index0 }}.yaml
  loop: "{{ worker_ips }}"
  environment:
    TALOSCONFIG: "{{ talos_config_dir }}/talosconfig"

- name: Wait for nodes to reboot and apply configuration
  wait_for:
    timeout: 120
  delegate_to: localhost

- name: Bootstrap Kubernetes cluster
  shell: |
    talosctl bootstrap \
      --nodes {{ control_plane_ips[0] }}
  environment:
    TALOSCONFIG: "{{ talos_config_dir }}/talosconfig"
  register: bootstrap_result
  
- name: Wait for Kubernetes API to be available
  wait_for:
    host: "{{ control_plane_ips[0] }}"
    port: 6443
    delay: 30
    timeout: 300

- name: Get kubeconfig
  shell: |
    talosctl kubeconfig \
      --nodes {{ control_plane_ips[0] }} \
      {{ kubeconfig_path }}
  environment:
    TALOSCONFIG: "{{ talos_config_dir }}/talosconfig"

- name: Wait for all nodes to be ready
  shell: |
    kubectl get nodes --kubeconfig {{ kubeconfig_path }} \
      -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | \
      grep -v False || echo "waiting"
  register: nodes_ready
  until: nodes_ready.stdout.find("False") == -1 and nodes_ready.stdout != "waiting"
  retries: 30
  delay: 10

- name: Display cluster status
  shell: kubectl get nodes --kubeconfig {{ kubeconfig_path }} -o wide
  register: cluster_status

- name: Show cluster information
  debug:
    msg: |
      Talos Cluster Bootstrap Complete!
      
      Cluster: {{ cluster_name }}
      Endpoint: https://{{ control_plane_ips[0] }}:6443
      Kubeconfig: {{ kubeconfig_path }}
      
      Node Status:
      {{ cluster_status.stdout }}