---
# InfraFlux v2.0 - Application Installation Tasks

- name: Wait for cluster to be ready
  shell: kubectl get nodes --kubeconfig {{ kubeconfig_path }} --no-headers | wc -l
  register: node_count
  until: node_count.stdout | int == ((control_plane_ips | length) + (worker_ips | length))
  retries: 30
  delay: 10

- name: Install Cilium CNI
  block:
    - name: Add Cilium Helm repository
      kubernetes.core.helm_repository:
        name: cilium
        repo_url: https://helm.cilium.io/
        
    - name: Install Cilium
      kubernetes.core.helm:
        name: cilium
        chart_ref: cilium/cilium
        release_namespace: kube-system
        kubeconfig: "{{ kubeconfig_path }}"
        values:
          k8sServiceHost: "{{ control_plane_ips[0] }}"
          k8sServicePort: 6443
          hubble:
            relay:
              enabled: true
            ui:
              enabled: true
          operator:
            replicas: 1
          cluster:
            name: "{{ cluster_name }}"
            id: 1
  when: applications_enabled | default(true)

- name: Wait for Cilium to be ready
  shell: |
    kubectl wait --for=condition=ready pod \
      -l k8s-app=cilium \
      -n kube-system \
      --timeout=300s \
      --kubeconfig {{ kubeconfig_path }}
  when: applications_enabled | default(true)

- name: Install metrics-server
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: metrics-server
        namespace: kube-system
  when: applications_enabled | default(true)

- name: Display application installation summary
  debug:
    msg: |
      Applications installed:
      - Cilium CNI: {{ 'Enabled' if applications_enabled else 'Disabled' }}
      - Metrics Server: {{ 'Enabled' if applications_enabled else 'Disabled' }}
      
      Access cluster:
      export KUBECONFIG={{ kubeconfig_path }}
      kubectl get nodes