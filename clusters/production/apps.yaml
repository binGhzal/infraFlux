---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-configs
  interval: 30m  # Longer interval for production stability
  path: ./apps/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
  validation: client
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: example-app
      namespace: example-app
  # Production-specific retry policy
  retryInterval: 2m