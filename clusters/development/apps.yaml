---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: "./apps/overlays/development"
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure