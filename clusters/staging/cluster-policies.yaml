---
# Staging Environment Policies
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-policies
  namespace: flux-system
spec:
  interval: 5m  # Frequent updates for rapid testing
  path: ./environments/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  validation: client
  
  # Staging-specific settings
  patches:
    - patch: |
        - op: replace
          path: /spec/interval
          value: 5m
      target:
        kind: Kustomization
        
  # Allow failures in staging for testing
  force: true