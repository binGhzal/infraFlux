# InfraFlux v2.0 - Production-like Test Configuration
# Realistic production configuration for dry-run testing

apiVersion: v1
kind: InfraFluxConfig
metadata:
  name: infraflux-production-test
  namespace: infraflux-system
  labels:
    app.kubernetes.io/name: infraflux
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/part-of: infraflux
  annotations:
    config.infraflux.dev/schema-version: "v2.0.0"
    config.infraflux.dev/generated-by: "InfraFlux Configuration System"
    config.infraflux.dev/purpose: "production-testing"

data:
  # Core Cluster Configuration
  cluster_name: "infraflux-prod"
  cluster_domain: "infraflux.binghzal.com"
  environment: "production"

  # Talos Linux Configuration
  talos_version: "v1.10.0"
  talos_image_factory_url: "https://factory.talos.dev"
  talos_extensions:
    - "qemu-guest-agent"
    - "util-linux-tools"

  # Kubernetes Configuration
  kubernetes_version: "v1.31.0"

  # Network Configuration - Production subnet
  pod_subnets:
    - "10.244.0.0/16"
  service_subnets:
    - "10.96.0.0/12"

  # Node Configuration - Production-like IPs
  control_plane_ips:
    - "10.0.100.10" # k8s-cp-01.infraflux.company.com
    - "10.0.100.11" # k8s-cp-02.infraflux.company.com
    - "10.0.100.12" # k8s-cp-03.infraflux.company.com
  worker_ips:
    - "10.0.100.20" # k8s-worker-01.infraflux.company.com
    - "10.0.100.21" # k8s-worker-02.infraflux.company.com
    - "10.0.100.22" # k8s-worker-03.infraflux.company.com
    - "10.0.100.23" # k8s-worker-04.infraflux.company.com
    - "10.0.100.24" # k8s-worker-05.infraflux.company.com

  # Proxmox Configuration - Production setup
  proxmox_host: "10.0.0.69"
  proxmox_user: "root@pve"
  proxmox_node: "pve"
  proxmox_storage: "bigdisk"

  # Security Configuration - Production security
  proxmox_tls_insecure: false # Secure TLS for production

  # VM Configuration - Production resources
  vm_cores: 2
  vm_memory: 2048 # 2GB RAM per node
  vm_disk_size: "20G"
  vm_network_bridge: "vmbr0"

  # Security Configuration - Full production security
  security:
    enable_pod_security_standards: true
    enable_network_policies: true
    enable_rbac: true
    sealed_secrets_version: "v0.24.5"
    api_only_access: true

  # GitOps Configuration - Production GitOps
  gitops:
    enabled: true
    git_repository: "ssh://git@github.com:binGhzal/infraFlux.git"
    git_branch: "main"
    flux_version: "v2.4.0"
    sync_interval: "5m"

  # Application Configuration - Full production stack
  applications:
    # Core Infrastructure
    cilium:
      enabled: true
      version: "1.16.0"
    cert_manager:
      enabled: true
      version: "v1.13.0"

    # Monitoring Stack - Full observability
    monitoring:
      enabled: true
      prometheus: true
      grafana: true
      loki: true

    # Security Stack - Production security tools
    security_stack:
      enabled: true
      sealed_secrets: true
      falco: true
      trivy: true

    # Productivity Applications - Enterprise tools
    productivity:
      enabled: true
      nextcloud: false
      vaultwarden: true
      gitea: false

    # Media Applications - Disabled for production
    media:
      enabled: false
      jellyfin: false
      sonarr: false
      radarr: false

  # Resource Configuration - Production resource management
  resources:
    default_requests:
      cpu: "200m"
      memory: "256Mi"
    default_limits:
      cpu: "1000m"
      memory: "1Gi"

  # Storage Configuration - Production storage
  storage:
    default_storage_class: "bigdisk"
    enable_longhorn: true
    backup_enabled: true

  # Advanced Configuration - Production features
  advanced:
    enable_gpu_support: false
    enable_auto_updates: false # Controlled updates in production
    cluster_timezone: "Asia/Dubai"
    log_level: "info"

  # Production Enhancement Configuration - All features enabled
  production:
    # Security Hardening
    enable_audit_logging: true
    enable_pod_security_policies: true
    enable_kernel_hardening: true
    enable_selinux: false

    # Performance Optimization
    enable_cpu_manager: true
    enable_topology_manager: true
    enable_bbr_congestion_control: true
    optimize_kernel_parameters: true

    # Monitoring Integration
    enable_metrics_server: true
    enable_node_exporter: true
    enable_enhanced_logging: true

    # Resource Management
    enable_resource_quotas: true
    enable_limit_ranges: true
    system_reserved_cpu: "500m"
    system_reserved_memory: "1Gi"
    kube_reserved_cpu: "200m"
    kube_reserved_memory: "512Mi"

    # High Availability
    enable_pod_disruption_budgets: true
    enable_node_affinity: true

    # Network Security
    enable_network_policies: true
    enable_ingress_security: true

    # Storage Optimization
    enable_storage_optimization: true
    enable_disk_quotas: true

  # External Auth Configuration - Production OIDC
  external_auth:
    enabled: true
    oidc_issuer_url: "https://auth.company.com"
    oidc_client_id: "infraflux-k8s"
    oidc_username_claim: "email"
    oidc_groups_claim: "groups"

  # Custom Extensions and Features - Production integrations
  extensions:
    enable_custom_ca: true
    custom_ca_certificate: |
      -----BEGIN CERTIFICATE-----
      # Company Root CA Certificate (placeholder)
      -----END CERTIFICATE-----
    enable_private_registry: true
    private_registry_url: "registry.company.com"
