# InfraFlux v2.0 - Test Configuration
# Minimal configuration for testing basic infrastructure deployment

apiVersion: v1
kind: InfraFluxConfig
metadata:
  name: infraflux-test-cluster
  namespace: infraflux-system
  labels:
    app.kubernetes.io/name: infraflux
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/part-of: infraflux
  annotations:
    config.infraflux.dev/schema-version: "v2.0.0"
    config.infraflux.dev/generated-by: "InfraFlux Configuration System"
    config.infraflux.dev/purpose: "testing"

data:
  # Core Cluster Configuration
  cluster_name: "infraflux-test"
  cluster_domain: "test.local"
  environment: "development" # Using development for testing

  # Talos Linux Configuration
  talos_version: "v1.10.0"
  talos_image_factory_url: "https://factory.talos.dev"
  talos_extensions:
    - "qemu-guest-agent"
    - "util-linux-tools"

  # Kubernetes Configuration
  kubernetes_version: "v1.31.0"

  # Network Configuration
  pod_subnets:
    - "10.244.0.0/16"
  service_subnets:
    - "10.96.0.0/12"

  # Node Configuration - Test with minimal nodes
  # TODO: Update these IPs to match your test environment
  control_plane_ips:
    - "10.0.0.10" # Single control plane for testing
  worker_ips:
    - "10.0.0.20" # Single worker for testing

  # Proxmox Configuration
  # TODO: Update these values for your test environment
  proxmox_host: "10.0.0.69" # CHANGE THIS
  proxmox_user: "root@pam"
  proxmox_node: "pve"
  proxmox_storage: "bigdisk"

  # Security Configuration
  proxmox_tls_insecure: true # Only for development with self-signed certificates

  # VM Configuration - Minimal resources for testing
  vm_cores: 2
  vm_memory: 2048 # MB - Reduced for testing
  vm_disk_size: "20G"
  vm_network_bridge: "vmbr0"

  # Security Configuration - Basic for testing
  security:
    enable_pod_security_standards: true
    enable_network_policies: false # Disabled for simpler testing
    enable_rbac: true
    sealed_secrets_version: "v0.24.5"
    api_only_access: true

  # GitOps Configuration - Disabled for initial testing
  gitops:
    enabled: false # Disable GitOps for basic infrastructure test
    git_repository: ""
    git_branch: "main"
    flux_version: "v2.4.0"
    sync_interval: "5m"

  # Application Configuration - Minimal for testing
  applications:
    # Core Infrastructure only
    cilium:
      enabled: true
      version: "1.16.0"
    cert_manager:
      enabled: false # Disable for basic test
      version: "v1.13.0"

    # Disable all other apps for basic testing
    monitoring:
      enabled: false
      prometheus: false
      grafana: false
      loki: false

    security_stack:
      enabled: false
      sealed_secrets: false
      falco: false
      trivy: false

    productivity:
      enabled: false

    media:
      enabled: false

  # Resource Configuration
  resources:
    default_requests:
      cpu: "100m"
      memory: "128Mi"
    default_limits:
      cpu: "500m"
      memory: "512Mi"

  # Storage Configuration
  storage:
    default_storage_class: "bigdisk"
    enable_longhorn: false
    backup_enabled: false

  # Advanced Configuration
  advanced:
    enable_gpu_support: false
    enable_auto_updates: false # Disable for testing
    cluster_timezone: "Asia/Dubai"
    log_level: "debug" # Enable debug logging for testing

  # Production features - Disabled for testing
  production:
    enable_audit_logging: false
    enable_pod_security_policies: false
    enable_kernel_hardening: false
    enable_selinux: false
    enable_cpu_manager: false
    enable_topology_manager: false
    enable_bbr_congestion_control: false
    optimize_kernel_parameters: false
    enable_metrics_server: false
    enable_node_exporter: false
    enable_enhanced_logging: false
    enable_resource_quotas: false
    enable_limit_ranges: false
    system_reserved_cpu: "200m"
    system_reserved_memory: "512Mi"
    kube_reserved_cpu: "100m"
    kube_reserved_memory: "256Mi"
    enable_pod_disruption_budgets: false
    enable_node_affinity: false
    enable_network_policies: false
    enable_ingress_security: false
    enable_storage_optimization: false
    enable_disk_quotas: false

  # External Auth - Disabled for testing
  external_auth:
    enabled: false

  # Extensions - Disabled for testing
  extensions:
    enable_custom_ca: false
    custom_ca_certificate: ""
    enable_private_registry: false
    private_registry_url: ""
