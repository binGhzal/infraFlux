# InfraFlux v2.0 - Example Cluster Configuration
# Copy this to cluster.yaml and customize for your environment

apiVersion: infraflux.dev/v1
kind: Cluster
metadata:
  name: infraflux-test
  environment: development # development, staging, production

spec:
  # =============================================================================
  # Infrastructure - Only Proxmox host is required!
  # =============================================================================
  infrastructure:
    proxmox:
      host: "10.0.0.69" # CHANGE THIS to your Proxmox IP
      node: "pve" # Proxmox node
      storage: "bigdisk" # Proxmox storage pool
      bridge: "vmbr0" # Network bridge
      tls_insecure: true # Only for development with self-signed certs
  # =============================================================================
  # Everything below uses intelligent defaults based on environment
  # Override anything as needed
  # =============================================================================

  # Smart defaults for development environment:
  # - 1 control plane, 1 worker
  # - 2GB RAM, 2 CPU each
  # - 20GB disk each
  # - Relaxed security
  # - No monitoring (faster startup)

  # For production, just change environment to "production" above and get:
  # - 3 control planes, 3 workers
  # - 4GB+ RAM, 4+ CPU each
  # - 50GB+ disk each
  # - Hardened security
  # - Full monitoring stack

  # =============================================================================
  # Manual Overrides (uncomment to customize)
  # =============================================================================

  # overrides:
  #   # Custom IP addresses
  #   networking:
  #     control_plane_ips:
  #       - "10.0.0.10"
  #     worker_ips:
  #       - "10.0.0.20"
  #
  #   # Custom VM resources
  #   nodes:
  #     control_plane:
  #       resources:
  #         cpu: 4
  #         memory: 4096
  #         disk: "30G"
  #     workers:
  #       resources:
  #         cpu: 4
  #         memory: 4096
  #         disk: "50G"
  #
  #   # Custom versions
  #   cluster:
  #     versions:
  #       talos: "v1.10.0"
  #       kubernetes: "v1.31.0"
  #
  #   # Enable monitoring in development
  #   applications:
  #     monitoring:
  #       enabled: true
