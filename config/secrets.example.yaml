# InfraFlux v2.0 - Secrets Configuration Example
# This file shows the structure for secrets that can be loaded during deployment
# Copy to secrets.yaml and fill with actual values (DO NOT commit secrets.yaml!)

apiVersion: v1
kind: Secret
metadata:
  name: infraflux-secrets
  namespace: infraflux-system
type: Opaque
data:
  # Proxmox credentials (base64 encoded)
  proxmox-password: ""  # echo -n "your-password" | base64
  proxmox-api-token: ""  # echo -n "your-api-token" | base64
  
  # Git repository access (base64 encoded)
  git-ssh-private-key: ""  # cat ~/.ssh/id_rsa | base64 -w 0
  github-token: ""  # echo -n "ghp_xxxxxxxxxxxx" | base64
  
  # Monitoring webhooks (base64 encoded)
  slack-webhook-url: ""  # echo -n "https://hooks.slack.com/..." | base64
  email-smtp-password: ""  # echo -n "smtp-password" | base64
  
  # External authentication (base64 encoded)
  oidc-client-secret: ""  # echo -n "oidc-secret" | base64
  
  # Private registry (base64 encoded)
  registry-username: ""  # echo -n "username" | base64
  registry-password: ""  # echo -n "password" | base64
  
stringData:
  # Plain text examples (will be automatically base64 encoded)
  custom-ca-cert: |
    -----BEGIN CERTIFICATE-----
    # Your custom CA certificate content
    -----END CERTIFICATE-----
  
  backup-encryption-key: "your-backup-encryption-key"
  
---
# Example sealed secret template (for production use)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: infraflux-sealed-secrets
  namespace: infraflux-system
spec:
  template:
    metadata:
      name: infraflux-secrets
      namespace: infraflux-system
    type: Opaque
  encryptedData:
    # These will be encrypted by sealed-secrets controller
    # Generate with: echo -n "value" | kubeseal --raw --from-file=/dev/stdin --name=infraflux-secrets --namespace=infraflux-system
    proxmox-password: ""
    github-token: ""
    slack-webhook-url: ""