apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: infraflux-base
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  # Core Infrastructure
  - infrastructure/namespace.yaml
  - infrastructure/configmap.yaml
  
  # Security Components
  - security/sealed-secrets.yaml
  - security/rbac.yaml
  - security/authentik
  - security/cert-manager
  
  # Monitoring Stack
  - monitoring/prometheus.yaml
  - monitoring/grafana.yaml
  - monitoring/loki.yaml
  - monitoring/alertmanager.yaml
  - monitoring/grafana-dashboards-configmap.yaml
  - monitoring/alerting-rules/cluster-health.yaml
  - monitoring/alerting-rules/application-alerts.yaml
  
  # GitOps Components
  - gitops
  
  # Backup & Recovery
  - backup/velero
  
  # Application Templates
  - applications/authelia.yaml
  - applications/homepage-enhanced.yaml
  - applications/nextcloud
  - applications/vaultwarden
  - applications/gitea

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: infraflux
      app.kubernetes.io/managed-by: flux

commonAnnotations:
  config.kubernetes.io/origin: |
    path: cluster/base/kustomization.yaml
  flux.weave.works/automated: "true"

images:
  - name: authelia/authelia
    newTag: "4.38.0"
  - name: grafana/grafana
    newTag: "10.0.0"
  - name: prom/prometheus
    newTag: "v2.47.0"
  - name: ghcr.io/gethomepage/homepage
    newTag: "latest"

