apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infraflux-cluster-health
  namespace: monitoring
  labels:
    app.kubernetes.io/name: infraflux-cluster-health
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  groups:
  - name: infraflux.cluster.health
    rules:
    # Node Health Alerts
    - alert: NodeDown
      expr: up{job="kubernetes-nodes"} == 0
      for: 5m
      labels:
        severity: critical
        component: node
      annotations:
        summary: "Node {{ $labels.instance }} is down"
        description: "Node {{ $labels.instance }} has been down for more than 5 minutes."
        runbook_url: "https://docs.infraflux.io/runbooks/node-down"

    - alert: NodeHighCPU
      expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
      for: 10m
      labels:
        severity: warning
        component: node
      annotations:
        summary: "High CPU usage on node {{ $labels.instance }}"
        description: "CPU usage on node {{ $labels.instance }} is above 80% for more than 10 minutes."

    - alert: NodeHighMemory
      expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
      for: 10m
      labels:
        severity: warning
        component: node
      annotations:
        summary: "High memory usage on node {{ $labels.instance }}"
        description: "Memory usage on node {{ $labels.instance }} is above 85% for more than 10 minutes."

    - alert: NodeDiskFull
      expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} * 100 > 85
      for: 10m
      labels:
        severity: warning
        component: node
      annotations:
        summary: "Disk usage high on node {{ $labels.instance }}"
        description: "Disk usage on node {{ $labels.instance }} is above 85% for more than 10 minutes."

    # Pod Health Alerts
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
      for: 5m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been restarting frequently."

    - alert: PodNotReady
      expr: kube_pod_status_ready{condition="false"} == 1
      for: 10m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for more than 10 minutes."

    # Kubernetes API Health
    - alert: KubernetesAPIDown
      expr: up{job="kubernetes-apiservers"} == 0
      for: 5m
      labels:
        severity: critical
        component: apiserver
      annotations:
        summary: "Kubernetes API server is down"
        description: "Kubernetes API server has been down for more than 5 minutes."

    - alert: KubernetesAPIHighLatency
      expr: histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{subresource!="log",verb!~"WATCH|WATCHLIST|PROXY"}[5m])) by (instance, verb, le)) > 1
      for: 10m
      labels:
        severity: warning
        component: apiserver
      annotations:
        summary: "Kubernetes API high latency"
        description: "Kubernetes API 99th percentile latency is above 1 second for more than 10 minutes."

    # etcd Health
    - alert: EtcdDown
      expr: up{job="etcd"} == 0
      for: 5m
      labels:
        severity: critical
        component: etcd
      annotations:
        summary: "etcd instance is down"
        description: "etcd instance {{ $labels.instance }} has been down for more than 5 minutes."

    - alert: EtcdHighDiskLatency
      expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) > 0.5
      for: 10m
      labels:
        severity: warning
        component: etcd
      annotations:
        summary: "etcd high disk latency"
        description: "etcd disk latency is high on {{ $labels.instance }}."