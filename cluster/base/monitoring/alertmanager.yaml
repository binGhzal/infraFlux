apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alertmanager@infraflux.local'

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'webhook'
      routes:
        - match:
            severity: critical
          receiver: 'discord'
          group_wait: 5s
          repeat_interval: 30m
        - match:
            severity: warning
          receiver: 'slack'
          group_wait: 10s
          repeat_interval: 2h
        - match:
            alertname: NodeDown
          receiver: 'discord'
          group_wait: 0s
          repeat_interval: 15m

    receivers:
      - name: 'webhook'
        webhook_configs:
          - url: 'http://webhook-receiver:5000/alerts'
            send_resolved: true

      - name: 'slack'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/slack_webhook_url'
            channel: '#infraflux-alerts'
            title: '🚨 InfraFlux Alert - {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts -}}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              *Instance:* {{ .Labels.instance }}
              {{ end }}
            send_resolved: true

      - name: 'discord'
        webhook_configs:
          - url_file: '/etc/alertmanager/secrets/discord_webhook_url'
            send_resolved: true
            http_config:
              headers:
                Content-Type: application/json
            title: 'InfraFlux Alert'
            text: |
              {
                "content": null,
                "embeds": [
                  {
                    "title": "🚨 {{ .GroupLabels.alertname }}",
                    "description": "{{ range .Alerts }}**{{ .Annotations.summary }}**\n{{ .Annotations.description }}{{ end }}",
                    "color": {{ if eq .Status "firing" }}16711680{{ else }}65280{{ end }},
                    "fields": [
                      {
                        "name": "Severity",
                        "value": "{{ .GroupLabels.severity }}",
                        "inline": true
                      },
                      {
                        "name": "Status",
                        "value": "{{ .Status }}",
                        "inline": true
                      }
                    ],
                    "timestamp": "{{ (index .Alerts 0).StartsAt }}"
                  }
                ]
              }

      - name: 'email'
        email_configs:
          - to: 'admin@infraflux.local'
            from: 'alertmanager@infraflux.local'
            subject: '🚨 InfraFlux Alert: {{ .GroupLabels.alertname }}'
            body: |
              Alert Details:
              {{ range .Alerts }}
              - Summary: {{ .Annotations.summary }}
              - Description: {{ .Annotations.description }}
              - Severity: {{ .Labels.severity }}
              - Instance: {{ .Labels.instance }}
              - Started: {{ .StartsAt }}
              {{ end }}

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'dev', 'instance']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.external-url=http://alertmanager.local.cluster'
          ports:
            - containerPort: 9093
              name: web
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
            - name: secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 100m
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}
        - name: secrets
          secret:
            secretName: alertmanager-secrets
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 9093
      targetPort: 9093
  selector:
    app.kubernetes.io/name: alertmanager
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: alertmanager.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager
                port:
                  number: 9093