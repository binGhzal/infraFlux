apiVersion: v1
kind: ConfigMap
metadata:
  name: k3s-cluster-dashboard
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-dashboard
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    grafana_dashboard: "1"
data:
  k3s-cluster-overview.json: |
    {
      "dashboard": {
        "id": null,
        "title": "K3s Cluster Overview",
        "tags": ["k3s", "kubernetes", "infraflux"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Cluster Nodes",
            "type": "stat",
            "targets": [
              {
                "expr": "kube_node_info",
                "legendFormat": "Nodes"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "red", "value": 80}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Pod Status",
            "type": "piechart",
            "targets": [
              {
                "expr": "sum by (phase) (kube_pod_status_phase)",
                "legendFormat": "{{phase}}"
              }
            ],
            "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0}
          },
          {
            "id": 3,
            "title": "CPU Usage",
            "type": "timeseries",
            "targets": [
              {
                "expr": "100 - (avg by (instance) (irate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
                "legendFormat": "{{instance}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "id": 4,
            "title": "Memory Usage",
            "type": "timeseries",
            "targets": [
              {
                "expr": "100 * (1 - ((node_memory_MemAvailable_bytes) / (node_memory_MemTotal_bytes)))",
                "legendFormat": "{{instance}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 5,
            "title": "Network I/O",
            "type": "timeseries",
            "targets": [
              {
                "expr": "irate(node_network_receive_bytes_total[5m])",
                "legendFormat": "{{instance}} - {{device}} RX"
              },
              {
                "expr": "irate(node_network_transmit_bytes_total[5m])",
                "legendFormat": "{{instance}} - {{device}} TX"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "10s"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k3s-applications-dashboard
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-dashboard
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    grafana_dashboard: "1"
data:
  k3s-applications.json: |
    {
      "dashboard": {
        "id": null,
        "title": "InfraFlux Applications",
        "tags": ["applications", "infraflux"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Authentik Status",
            "type": "stat",
            "targets": [
              {
                "expr": "up{job=\"authentik\"}",
                "legendFormat": "Authentik"
              }
            ],
            "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Prometheus Status",
            "type": "stat",
            "targets": [
              {
                "expr": "up{job=\"prometheus\"}",
                "legendFormat": "Prometheus"
              }
            ],
            "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}
          },
          {
            "id": 3,
            "title": "Grafana Status",
            "type": "stat",
            "targets": [
              {
                "expr": "up{job=\"grafana\"}",
                "legendFormat": "Grafana"
              }
            ],
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}
          },
          {
            "id": 4,
            "title": "Loki Status",
            "type": "stat",
            "targets": [
              {
                "expr": "up{job=\"loki\"}",
                "legendFormat": "Loki"
              }
            ],
            "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}
          },
          {
            "id": 5,
            "title": "Application Logs",
            "type": "logs",
            "targets": [
              {
                "expr": "{namespace=~\"monitoring|security|applications\"}",
                "datasource": "Loki"
              }
            ],
            "gridPos": {"h": 12, "w": 24, "x": 0, "y": 4}
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "10s"
      }
    }