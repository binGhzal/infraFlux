apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
  labels:
    app.kubernetes.io/name: nvidia-runtime
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: gpu-infrastructure
handler: nvidia
scheduling:
  nodeClassification:
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: intel-gpu
  labels:
    app.kubernetes.io/name: intel-gpu-runtime
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: gpu-infrastructure
handler: runc
scheduling:
  nodeClassification:
    tolerations:
      - key: gpu.intel.com/i915
        operator: Exists
        effect: NoSchedule

---
# PodSecurityPolicy for GPU access (if PSP is enabled)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: gpu-access
  labels:
    app.kubernetes.io/name: gpu-security-policy
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: gpu-infrastructure
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
    - 'hostPath'  # Required for GPU device access
  hostPath:
    - pathPrefix: "/dev/dri"      # Intel GPU devices
      readOnly: true
    - pathPrefix: "/dev/nvidia"   # NVIDIA GPU devices
      readOnly: true
  runAsUser:
    rule: 'RunAsAny'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'

---
# ClusterRole for GPU access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-access
  labels:
    app.kubernetes.io/name: gpu-access
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: gpu-infrastructure
rules:
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["use"]
    resourceNames: ["gpu-access"]

---
# ServiceAccount for applications that need GPU access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-user
  namespace: applications
  labels:
    app.kubernetes.io/name: gpu-user
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: gpu-infrastructure

---
# Bind GPU access to applications namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-access-applications
  labels:
    app.kubernetes.io/name: gpu-access-applications
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: gpu-infrastructure
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpu-access
subjects:
  - kind: ServiceAccount
    name: gpu-user
    namespace: applications
  - kind: ServiceAccount
    name: default
    namespace: applications

---
# GPU monitoring ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gpu-metrics
  namespace: kube-system
  labels:
    app.kubernetes.io/name: gpu-metrics
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: gpu-infrastructure
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-device-plugin
  endpoints:
    - port: http-metrics
      interval: 30s
      path: /metrics