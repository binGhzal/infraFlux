apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-config
  namespace: infraflux-system
  labels:
    app.kubernetes.io/name: cluster-config
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  # Cluster Configuration
  cluster_name: "infraflux"
  cluster_domain: "local.cluster"
  cluster_timezone: "UTC"
  
  # Network Configuration
  network_cidr: "auto"
  service_cidr: "10.96.0.0/12"
  pod_cidr: "10.244.0.0/16"
  
  # K3s Configuration
  k3s_version: "v1.28.5+k3s1"
  k3s_cluster_init: "true"
  k3s_disable_servicelb: "false"
  k3s_disable_traefik: "false"
  
  # Feature Flags
  enable_cilium: "true"
  enable_cert_manager: "true"
  enable_monitoring: "true"
  enable_sso: "true"
  enable_gitops: "true"
  enable_sealed_secrets: "true"
  
  # Authentication
  auth_provider: "authentik"
  
  # Monitoring
  monitoring_stack: "basic"
  enable_log_aggregation: "false"
  
  # Backup
  enable_backup: "false"