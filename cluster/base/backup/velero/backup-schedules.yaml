apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-backup
  namespace: velero
  labels:
    app.kubernetes.io/name: velero
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
    - applications
    - security
    - monitoring
    - flux-system
    - cert-manager
    excludedNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - velero
    includeClusterResources: true
    defaultVolumesToRestic: true
    storageLocation: default
    volumeSnapshotLocations:
    - default
    ttl: 168h0m0s  # 7 days
    metadata:
      labels:
        backup-type: "daily"
        cluster: "infraflux"
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: weekly-backup
  namespace: velero
  labels:
    app.kubernetes.io/name: velero
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "0 3 * * 0"  # Sunday at 3 AM
  template:
    includedNamespaces: []  # All namespaces
    excludedNamespaces:
    - kube-public
    - kube-node-lease
    includeClusterResources: true
    defaultVolumesToRestic: true
    storageLocation: default
    volumeSnapshotLocations:
    - default
    ttl: 720h0m0s  # 30 days
    metadata:
      labels:
        backup-type: "weekly"
        cluster: "infraflux"
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: monthly-backup
  namespace: velero
  labels:
    app.kubernetes.io/name: velero
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "0 4 1 * *"  # First day of month at 4 AM
  template:
    includedNamespaces: []  # All namespaces
    includeClusterResources: true
    defaultVolumesToRestic: true
    storageLocation: default
    volumeSnapshotLocations:
    - default
    ttl: 2160h0m0s  # 90 days
    metadata:
      labels:
        backup-type: "monthly"
        cluster: "infraflux"
---
apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: default
  namespace: velero
  labels:
    app.kubernetes.io/name: velero
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  provider: aws
  default: true
  objectStorage:
    bucket: infraflux-velero-backups
    prefix: "cluster-backups"
  config:
    region: us-west-2
    s3ForcePathStyle: "true"
    s3Url: https://s3.us-west-2.amazonaws.com
  accessMode: ReadWrite
---
apiVersion: velero.io/v1
kind: VolumeSnapshotLocation
metadata:
  name: default
  namespace: velero
  labels:
    app.kubernetes.io/name: velero
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  provider: aws
  config:
    region: us-west-2