apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-deployment
spec:
  template:
    spec:
      containers:
        - name: default-container
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limit-range
  namespace: infraflux-system
spec:
  limits:
    - default:
        memory: "512Mi"
        cpu: "500m"
      defaultRequest:
        memory: "256Mi"
        cpu: "200m"
      type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limit-range
  namespace: monitoring
spec:
  limits:
    - default:
        memory: "1Gi"
        cpu: "1000m"
      defaultRequest:
        memory: "512Mi"
        cpu: "500m"
      type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: security-limit-range
  namespace: security
spec:
  limits:
    - default:
        memory: "512Mi"
        cpu: "500m"
      defaultRequest:
        memory: "256Mi"
        cpu: "200m"
      type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: applications-limit-range
  namespace: applications
spec:
  limits:
    - default:
        memory: "512Mi"
        cpu: "500m"
      defaultRequest:
        memory: "256Mi"
        cpu: "200m"
      type: Container