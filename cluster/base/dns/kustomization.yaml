apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: dns-services
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  - external-dns-cloudflare.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: infraflux
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/component: dns

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/stack: dns

images:
  - name: k8s.gcr.io/external-dns/external-dns
    newTag: "v0.14.0"

# Note: Dynamic configuration will be applied via configure-apps.sh
# ConfigMap replacements require proper namespace configuration

# Default conditional patches
patches:
  # Default to disabled state - will be enabled by configure-apps.sh if needed
  - target:
      kind: Deployment
      name: external-dns-cloudflare
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0