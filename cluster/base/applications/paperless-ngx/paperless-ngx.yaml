apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: applications
  labels:
    app.kubernetes.io/name: paperless-ngx
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h paperless-postgresql -p 5432 -U paperless; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretRef:
                  name: paperless-secrets
                  key: database-password
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx:1.17.4
          ports:
            - containerPort: 8000
              name: http
          env:
            # Database Configuration
            - name: PAPERLESS_DBENGINE
              value: "postgresql"
            - name: PAPERLESS_DBHOST
              value: "paperless-postgresql"
            - name: PAPERLESS_DBPORT
              value: "5432"
            - name: PAPERLESS_DBNAME
              value: "paperless"
            - name: PAPERLESS_DBUSER
              value: "paperless"
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretRef:
                  name: paperless-secrets
                  key: database-password
            
            # Redis Configuration
            - name: PAPERLESS_REDIS
              value: "redis://paperless-redis:6379/0"
            
            # General Configuration
            - name: PAPERLESS_URL
              value: "https://paperless.local.cluster"
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretRef:
                  name: paperless-secrets
                  key: secret-key
            - name: PAPERLESS_TIME_ZONE
              value: "UTC"
            - name: PAPERLESS_OCR_LANGUAGE
              value: "eng"
            - name: PAPERLESS_OCR_LANGUAGES
              value: "eng fra deu spa"
            
            # Admin User
            - name: PAPERLESS_ADMIN_USER
              value: "admin"
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretRef:
                  name: paperless-secrets
                  key: admin-password
            - name: PAPERLESS_ADMIN_MAIL
              value: "admin@infraflux.local"
            
            # Storage Configuration
            - name: PAPERLESS_CONSUMPTION_DIR
              value: "/usr/src/paperless/consume"
            - name: PAPERLESS_DATA_DIR
              value: "/usr/src/paperless/data"
            - name: PAPERLESS_MEDIA_ROOT
              value: "/usr/src/paperless/media"
            - name: PAPERLESS_STATICDIR
              value: "/usr/src/paperless/static"
            
            # Features
            - name: PAPERLESS_TIKA_ENABLED
              value: "true"
            - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
              value: "http://paperless-gotenberg:3000"
            - name: PAPERLESS_TIKA_ENDPOINT
              value: "http://paperless-tika:9998"
            
            # Security
            - name: PAPERLESS_FORCE_SCRIPT_NAME
              value: ""
            - name: PAPERLESS_STATIC_URL
              value: "/static/"
            
          volumeMounts:
            - name: paperless-data
              mountPath: /usr/src/paperless/data
            - name: paperless-media
              mountPath: /usr/src/paperless/media
            - name: paperless-consume
              mountPath: /usr/src/paperless/consume
            - name: paperless-export
              mountPath: /usr/src/paperless/export
          
          resources:
            limits:
              memory: 2Gi
              cpu: 1000m
            requests:
              memory: 512Mi
              cpu: 200m
          
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      
      volumes:
        - name: paperless-data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: paperless-media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: paperless-consume
          persistentVolumeClaim:
            claimName: paperless-consume
        - name: paperless-export
          persistentVolumeClaim:
            claimName: paperless-export

---
# PostgreSQL Database for Paperless-ngx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-postgresql
  namespace: applications
  labels:
    app.kubernetes.io/name: paperless-postgresql
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRES_DB
              value: "paperless"
            - name: POSTGRES_USER
              value: "paperless"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretRef:
                  name: paperless-secrets
                  key: database-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - paperless
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - paperless
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: paperless-postgresql-data

---
# Redis for Paperless-ngx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-redis
  namespace: applications
  labels:
    app.kubernetes.io/name: paperless-redis
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "900 1"
            - --save
            - "300 10"
            - --save
            - "60 10000"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: paperless-redis-data

---
# Gotenberg for document conversion
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-gotenberg
  namespace: applications
  labels:
    app.kubernetes.io/name: paperless-gotenberg
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-gotenberg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-gotenberg
    spec:
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:7.10
          ports:
            - containerPort: 3000
              name: http
          command:
            - gotenberg
            - --chromium-disable-javascript=true
            - --chromium-allow-list=file:///tmp/.*
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m

---
# Tika for document parsing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-tika
  namespace: applications
  labels:
    app.kubernetes.io/name: paperless-tika
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-tika
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-tika
    spec:
      containers:
        - name: tika
          image: apache/tika:2.9.1.0-full
          ports:
            - containerPort: 9998
              name: http
          resources:
            limits:
              memory: 1Gi
              cpu: 500m
            requests:
              memory: 512Mi
              cpu: 100m

