apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: nextcloud
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  - nextcloud.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: infraflux
      app.kubernetes.io/managed-by: flux

images:
  - name: nextcloud
    newTag: "28-apache"
  - name: mysql
    newTag: "8.0"