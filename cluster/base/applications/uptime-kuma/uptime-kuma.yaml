apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: applications
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-kuma
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1.23.8-alpine
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: UPTIME_KUMA_PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - name: uptime-kuma-data
              mountPath: /app/data
          
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
          
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      
      volumes:
        - name: uptime-kuma-data
          persistentVolumeClaim:
            claimName: uptime-kuma-data

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: applications
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: http
  selector:
    app.kubernetes.io/name: uptime-kuma

---
# Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  namespace: applications
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-kuma
  namespace: applications
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Enable websocket support
    traefik.ingress.kubernetes.io/router.middlewares: applications-uptime-kuma-headers@kubernetescrd
spec:
  tls:
    - hosts:
        - uptime.local.cluster
      secretName: uptime-kuma-tls
  rules:
    - host: uptime.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uptime-kuma
                port:
                  number: 3001

---
# Middleware for WebSocket support
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: uptime-kuma-headers
  namespace: applications
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    customResponseHeaders:
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"

---
# ServiceMonitor for Prometheus monitoring
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: uptime-kuma
  namespace: applications
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
  endpoints:
    - port: http
      interval: 30s
      path: /metrics