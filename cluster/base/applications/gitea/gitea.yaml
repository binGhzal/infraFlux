apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-db-data
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea-db
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  postgres-password: "change_me_postgres_password"
  gitea-admin-username: "admin"
  gitea-admin-password: "change_me_gitea_password"
  gitea-admin-email: "admin@infraflux.local"
  gitea-secret-key: "change_me_gitea_secret_key_64_chars_long_random_string_here"
  gitea-internal-token: "change_me_gitea_internal_token_104_chars_long"
  gitea-jwt-secret: "change_me_jwt_secret_43_chars_long_string"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-db
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea-db
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "gitea"
            - name: POSTGRES_USER
              value: "gitea"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: postgres-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              memory: 512Mi
              cpu: 300m
            requests:
              memory: 256Mi
              cpu: 150m
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - gitea
                - -d
                - gitea
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - gitea
                - -d
                - gitea
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-db
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea-db
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: gitea-db
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  app.ini: |
    APP_NAME = InfraFlux Git Service
    RUN_MODE = prod
    RUN_USER = git

    [repository]
    ROOT = /data/git/repositories
    SCRIPT_TYPE = bash
    DEFAULT_BRANCH = main
    DEFAULT_PRIVATE = private
    MAX_CREATION_LIMIT = 50
    DISABLE_HTTP_GIT = false
    USE_COMPAT_SSH_URI = false

    [repository.local]
    LOCAL_COPY_PATH = /data/gitea/tmp/local-repo

    [repository.upload]
    TEMP_PATH = /data/gitea/uploads

    [server]
    PROTOCOL = http
    DOMAIN = gitea.local.cluster
    HTTP_PORT = 3000
    ROOT_URL = https://gitea.local.cluster/
    DISABLE_SSH = false
    SSH_PORT = 22
    SSH_LISTEN_PORT = 22
    LFS_START_SERVER = true
    LFS_CONTENT_PATH = /data/git/lfs
    LFS_JWT_SECRET = %(LFS_JWT_SECRET)s
    OFFLINE_MODE = false

    [database]
    DB_TYPE = postgres
    HOST = gitea-db:5432
    NAME = gitea
    USER = gitea
    PASSWD = %(POSTGRES_PASSWORD)s
    SCHEMA = 
    SSL_MODE = disable
    CHARSET = utf8

    [indexer]
    ISSUE_INDEXER_PATH = /data/gitea/indexers/issues.bleve
    REPO_INDEXER_ENABLED = true
    REPO_INDEXER_PATH = /data/gitea/indexers/repos.bleve
    MAX_FILE_SIZE = 1048576

    [session]
    PROVIDER = file
    PROVIDER_CONFIG = /data/gitea/sessions
    COOKIE_NAME = i_like_gitea
    COOKIE_SECURE = true
    COOKIE_USERNAME = gitea_awesome

    [picture]
    AVATAR_UPLOAD_PATH = /data/gitea/avatars
    REPOSITORY_AVATAR_UPLOAD_PATH = /data/gitea/repo-avatars
    DISABLE_GRAVATAR = false
    ENABLE_FEDERATED_AVATAR = true

    [attachment]
    PATH = /data/gitea/attachments
    ALLOWED_TYPES = image/jpeg|image/png|application/zip|application/gzip|application/pdf|text/plain
    MAX_SIZE = 4
    MAX_FILES = 5
    ENABLED = true

    [log]
    MODE = console
    LEVEL = info
    ROOT_PATH = /data/gitea/log

    [security]
    INSTALL_LOCK = true
    SECRET_KEY = %(SECRET_KEY)s
    REVERSE_PROXY_LIMIT = 1
    REVERSE_PROXY_TRUSTED_PROXIES = *
    INTERNAL_TOKEN = %(INTERNAL_TOKEN)s
    PASSWORD_HASH_ALGO = pbkdf2

    [service]
    DISABLE_REGISTRATION = true
    ALLOW_ONLY_EXTERNAL_REGISTRATION = false
    REQUIRE_SIGNIN_VIEW = false
    REGISTER_EMAIL_CONFIRM = false
    ENABLE_NOTIFY_MAIL = false
    ENABLE_CAPTCHA = false
    DEFAULT_KEEP_EMAIL_PRIVATE = false
    DEFAULT_ALLOW_CREATE_ORGANIZATION = true
    DEFAULT_ENABLE_TIMETRACKING = true
    NO_REPLY_ADDRESS = noreply.gitea.local.cluster

    [webhook]
    ALLOWED_HOST_LIST = *

    [mailer]
    ENABLED = false

    [openid]
    ENABLE_OPENID_SIGNIN = false
    ENABLE_OPENID_SIGNUP = false

    [oauth2]
    JWT_SECRET = %(JWT_SECRET)s

    [actions]
    ENABLED = true
    DEFAULT_ACTIONS_URL = https://gitea.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.21.3
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: GITEA__database__DB_TYPE
              value: "postgres"
            - name: GITEA__database__HOST
              value: "gitea-db:5432"
            - name: GITEA__database__NAME
              value: "gitea"
            - name: GITEA__database__USER
              value: "gitea"
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: postgres-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: gitea-secret-key
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: gitea-internal-token
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: gitea-jwt-secret
            - name: LFS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: gitea-jwt-secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: postgres-password
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /data/gitea/conf
          resources:
            limits:
              memory: 1Gi
              cpu: 500m
            requests:
              memory: 512Mi
              cpu: 250m
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
        - name: config
          configMap:
            name: gitea-config
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: ssh
      port: 22
      targetPort: 22
  selector:
    app.kubernetes.io/name: gitea
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea
  namespace: applications
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: default-security-headers@kubernetescrd
spec:
  tls:
  - hosts:
    - gitea.local.cluster
    secretName: gitea-tls
  rules:
    - host: gitea.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitea
                port:
                  number: 3000