apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: gitea
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  - gitea.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: infraflux
      app.kubernetes.io/managed-by: flux

images:
  - name: gitea/gitea
    newTag: "1.21.3"
  - name: postgres
    newTag: "15-alpine"