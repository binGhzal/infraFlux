apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: code-server
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  - code-server.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: infraflux
      app.kubernetes.io/managed-by: flux

images:
  - name: codercom/code-server
    newTag: "4.18.0"
  - name: docker
    newTag: "24.0-dind"