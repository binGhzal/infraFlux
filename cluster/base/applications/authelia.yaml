apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: security
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  configuration.yml: |
    ---
    theme: dark
    jwt_secret: a_very_important_secret
    default_redirection_url: https://authelia.local.cluster
    
    server:
      host: 0.0.0.0
      port: 9091
    
    log:
      level: warn
    
    totp:
      issuer: authelia.com
      period: 30
      skew: 1
    
    authentication_backend:
      file:
        path: /config/users_database.yml
        password:
          algorithm: argon2id
          iterations: 1
          salt_length: 16
          parallelism: 8
          memory: 1024
    
    access_control:
      default_policy: deny
      rules:
        - domain: authelia.local.cluster
          policy: bypass
        - domain: "*.local.cluster"
          policy: one_factor
    
    session:
      name: authelia_session
      secret: unsecure_session_secret
      expiration: 3600
      inactivity: 300
      domain: local.cluster
    
    regulation:
      max_retries: 3
      find_time: 120
      ban_time: 300
    
    storage:
      local:
        path: /config/db.sqlite3
    
    notifier:
      smtp:
        username: test
        password: test
        host: 127.0.0.1
        port: 1025
        sender: admin@example.com
        disable_require_tls: true
  
  users_database.yml: |
    ---
    users:
      authelia:
        displayname: "Authelia User"
        password: "$argon2id$v=19$m=1024,t=1,p=8$plus921DKJw3XgvL3JlHe4zOg$eP4CyV88QNWxQFqNBmLaK06NZg1v3RY4fGlnIFYBqCCpyXnx/X8EWnfLGfHNdABnLm6kqjsglvhTLmXQBHd3KkCjp0WQdx1bQvCnmMuCw1iU9aZyYpQN0nLWzfX8B14I/wc8qR7rMFnJGiZJKUe9wFTLcejYJFGq1i8h1JFCw/Y5bGaQn0qvQ"
        email: authelia@authelia.com
        groups:
          - admins
          - dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: security
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authelia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authelia
    spec:
      containers:
        - name: authelia
          image: authelia/authelia:4.38.0
          ports:
            - containerPort: 9091
              name: http
          volumeMounts:
            - name: authelia-config
              mountPath: /config
            - name: authelia-data
              mountPath: /data
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 100m
      volumes:
        - name: authelia-config
          configMap:
            name: authelia-config
        - name: authelia-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: security
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9091
      targetPort: 9091
  selector:
    app.kubernetes.io/name: authelia
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authelia
  namespace: security
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: authelia.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authelia
                port:
                  number: 9091