apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: applications
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretRef:
                  name: open-webui-secrets
                  key: secret-key
            - name: WEBUI_JWT_SECRET_KEY
              valueFrom:
                secretRef:
                  name: open-webui-secrets
                  key: jwt-secret-key
            - name: DEFAULT_MODELS
              value: "llama3.2:3b,codellama:7b,mistral:7b"
            - name: DEFAULT_USER_ROLE
              value: "user"
            - name: ENABLE_SIGNUP
              value: "false"  # Disable signup for security
            - name: WEBUI_AUTH
              value: "true"
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
              value: "true"
            # Authentik SSO integration
            - name: OPENID_PROVIDER_URL
              value: "https://auth.local.cluster/application/o/open-webui/"
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretRef:
                  name: open-webui-secrets
                  key: oauth-client-id
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretRef:
                  name: open-webui-secrets
                  key: oauth-client-secret
            - name: OPENID_REDIRECT_URI
              value: "https://ai.local.cluster/oauth/oidc/callback"
            # Performance and behavior settings
            - name: ENABLE_RAG_HYBRID_SEARCH
              value: "true"
            - name: ENABLE_RAG_WEB_LOADER_SSL_VERIFICATION
              value: "true"
            - name: RAG_EMBEDDING_ENGINE
              value: "ollama"
            - name: RAG_EMBEDDING_MODEL
              value: "nomic-embed-text"
            - name: CHUNK_SIZE
              value: "1000"
            - name: CHUNK_OVERLAP
              value: "100"
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
          resources:
            limits:
              memory: 2Gi
              cpu: 1000m
            requests:
              memory: 512Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-data

---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: applications
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: open-webui

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: applications
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: applications
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Enable CORS and security
    traefik.ingress.kubernetes.io/router.middlewares: applications-open-webui-cors@kubernetescrd
    # External DNS annotations (applied if public access enabled)
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  tls:
    - hosts:
        - ai.local.cluster
      secretName: open-webui-tls
  rules:
    - host: ai.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080

---
# Middleware for CORS support
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: open-webui-cors
  namespace: applications
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://ai.local.cluster"
      - "http://localhost:3000"
    accessControlMaxAge: 100
    addVaryHeader: true
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    customResponseHeaders:
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "SAMEORIGIN"

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: open-webui
  namespace: applications
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow communication with Ollama
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ollama
      ports:
        - protocol: TCP
          port: 11434
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow HTTPS for OAuth and external services
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow HTTP for OAuth callback
    - to: []
      ports:
        - protocol: TCP
          port: 80