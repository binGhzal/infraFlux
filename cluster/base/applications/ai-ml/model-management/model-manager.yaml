apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model-manager
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: ai-ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-model-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-model-manager
    spec:
      serviceAccountName: ai-model-manager
      containers:
        - name: model-manager
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "🤖 AI Model Manager starting..."
              
              # Function to check if Ollama is ready
              wait_for_ollama() {
                echo "⏳ Waiting for Ollama to be ready..."
                local max_attempts=30
                local attempt=1
                
                while [ $attempt -le $max_attempts ]; do
                  if curl -f http://ollama:11434/api/tags >/dev/null 2>&1; then
                    echo "✅ Ollama is ready!"
                    return 0
                  fi
                  echo "Attempt $attempt/$max_attempts: Ollama not ready, waiting..."
                  sleep 10
                  attempt=$((attempt + 1))
                done
                
                echo "❌ Ollama failed to become ready after $max_attempts attempts"
                return 1
              }
              
              # Function to download a model
              download_model() {
                local model_name="$1"
                local model_size="$2"
                echo "📦 Downloading model: $model_name (Size: $model_size)"
                
                # Check if model already exists
                if curl -s http://ollama:11434/api/tags | grep -q "\"name\":\"$model_name\""; then
                  echo "✅ Model $model_name already exists, skipping download"
                  return 0
                fi
                
                # Download the model
                echo "🔄 Starting download of $model_name..."
                if curl -X POST http://ollama:11434/api/pull \
                  -H "Content-Type: application/json" \
                  -d "{\"name\": \"$model_name\"}" \
                  --max-time 1800; then  # 30 minute timeout
                  echo "✅ Successfully downloaded $model_name"
                  return 0
                else
                  echo "❌ Failed to download $model_name"
                  return 1
                fi
              }
              
              # Function to get model info
              get_model_info() {
                local model_name="$1"
                echo "📊 Getting info for model: $model_name"
                curl -s -X POST http://ollama:11434/api/show \
                  -H "Content-Type: application/json" \
                  -d "{\"name\": \"$model_name\"}" || echo "Failed to get model info"
              }
              
              # Function to optimize model storage
              optimize_storage() {
                echo "🗂️ Optimizing model storage..."
                
                # List all models
                echo "📋 Current models:"
                curl -s http://ollama:11434/api/tags | grep -o '"name":"[^"]*"' | cut -d'"' -f4 || echo "No models found"
                
                # Check available storage
                echo "💾 Storage usage:"
                df -h /root/.ollama/models || echo "Storage info unavailable"
              }
              
              # Function to create model manifest
              create_model_manifest() {
                echo "📝 Creating model manifest..."
                cat > /tmp/model-manifest.json << 'EOF'
              {
                "recommended_models": {
                  "general_purpose": [
                    {
                      "name": "llama3.2:3b",
                      "size": "2.0GB",
                      "description": "Efficient general-purpose model for homelab use",
                      "use_cases": ["chat", "general_qa", "light_coding"],
                      "priority": "high"
                    },
                    {
                      "name": "mistral:7b",
                      "size": "4.1GB", 
                      "description": "Balanced performance and efficiency",
                      "use_cases": ["chat", "reasoning", "analysis"],
                      "priority": "medium"
                    }
                  ],
                  "coding": [
                    {
                      "name": "codellama:7b",
                      "size": "3.8GB",
                      "description": "Specialized for code generation and analysis",
                      "use_cases": ["code_generation", "code_review", "debugging"],
                      "priority": "high"
                    },
                    {
                      "name": "deepseek-coder:6.7b",
                      "size": "3.8GB",
                      "description": "Advanced coding assistant",
                      "use_cases": ["complex_coding", "architecture", "refactoring"],
                      "priority": "medium"
                    }
                  ],
                  "specialized": [
                    {
                      "name": "nomic-embed-text",
                      "size": "274MB",
                      "description": "Text embedding model for RAG",
                      "use_cases": ["embeddings", "semantic_search", "rag"],
                      "priority": "high"
                    },
                    {
                      "name": "llava:7b",
                      "size": "4.7GB",
                      "description": "Multimodal model for image analysis",
                      "use_cases": ["image_analysis", "visual_qa", "ocr"],
                      "priority": "low"
                    }
                  ]
                },
                "storage_optimization": {
                  "cleanup_threshold_gb": 80,
                  "keep_recent_models": 5,
                  "compression_enabled": true
                }
              }
              EOF
                echo "✅ Model manifest created"
              }
              
              # Main model management logic
              main() {
                echo "🚀 Starting AI Model Management..."
                
                # Wait for Ollama to be ready
                if ! wait_for_ollama; then
                  echo "❌ Cannot proceed without Ollama"
                  exit 1
                fi
                
                # Create model manifest
                create_model_manifest
                
                # Download essential models based on configuration
                case "${MODEL_CATEGORY:-essential}" in
                  "essential")
                    echo "📦 Downloading essential models..."
                    download_model "llama3.2:3b" "2.0GB"
                    download_model "nomic-embed-text" "274MB"
                    ;;
                  "development")
                    echo "📦 Downloading development models..."
                    download_model "llama3.2:3b" "2.0GB"
                    download_model "codellama:7b" "3.8GB"
                    download_model "nomic-embed-text" "274MB"
                    ;;
                  "full")
                    echo "📦 Downloading full model suite..."
                    download_model "llama3.2:3b" "2.0GB"
                    download_model "mistral:7b" "4.1GB"
                    download_model "codellama:7b" "3.8GB"
                    download_model "nomic-embed-text" "274MB"
                    ;;
                  *)
                    echo "⚠️ Unknown model category: ${MODEL_CATEGORY}, using essential"
                    download_model "llama3.2:3b" "2.0GB"
                    download_model "nomic-embed-text" "274MB"
                    ;;
                esac
                
                # Optimize storage
                optimize_storage
                
                # Keep the container running for monitoring
                echo "✅ Model management completed. Entering monitoring mode..."
                while true; do
                  sleep 300  # Check every 5 minutes
                  optimize_storage
                done
              }
              
              # Run main function
              main
          env:
            - name: MODEL_CATEGORY
              valueFrom:
                configMapKeyRef:
                  name: ai-model-config
                  key: model_category
                  optional: true
            - name: MAX_MODELS
              valueFrom:
                configMapKeyRef:
                  name: ai-model-config
                  key: max_models
                  optional: true
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: ollama-data
              mountPath: /root/.ollama
              readOnly: true
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -f http://ollama:11434/api/tags || exit 1"
            initialDelaySeconds: 60
            periodSeconds: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -f http://ollama:11434/api/tags || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: ai-model-storage
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data

---
apiVersion: v1
kind: Service
metadata:
  name: ai-model-manager
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: ai-model-manager

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-model-storage
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-storage
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi  # Additional storage for model management
  storageClassName: local-path

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-model-config
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-config
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  # Model categories: essential, development, full
  model_category: "essential"
  
  # Maximum number of models to keep
  max_models: "10"
  
  # Storage optimization settings
  cleanup_threshold_gb: "80"
  compression_enabled: "true"
  
  # Model update schedule
  update_check_hours: "24"
  
  # Performance tuning
  concurrent_downloads: "2"
  download_timeout_minutes: "30"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-model-manager
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-model-manager
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-model-manager
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-model-manager
subjects:
  - kind: ServiceAccount
    name: ai-model-manager
    namespace: applications

---
# CronJob for periodic model updates
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-model-updater
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-updater
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: ai-ml
spec:
  # Run daily at 3 AM to check for model updates
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ai-model-updater
        spec:
          serviceAccountName: ai-model-manager
          restartPolicy: OnFailure
          containers:
            - name: model-updater
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "🔄 Checking for model updates..."
                  
                  # Check if Ollama is available
                  if ! curl -f http://ollama:11434/api/tags >/dev/null 2>&1; then
                    echo "⚠️ Ollama is not available, skipping update check"
                    exit 0
                  fi
                  
                  # Get list of current models
                  CURRENT_MODELS=$(curl -s http://ollama:11434/api/tags | grep -o '"name":"[^"]*"' | cut -d'"' -f4 || echo "")
                  
                  if [ -z "$CURRENT_MODELS" ]; then
                    echo "ℹ️ No models found, nothing to update"
                    exit 0
                  fi
                  
                  # Check each model for updates (Ollama will handle version checking)
                  echo "📋 Current models: $CURRENT_MODELS"
                  
                  for model in $CURRENT_MODELS; do
                    echo "🔍 Checking for updates to $model..."
                    # Pull latest version (Ollama handles version checking)
                    curl -X POST http://ollama:11434/api/pull \
                      -H "Content-Type: application/json" \
                      -d "{\"name\": \"$model\"}" \
                      --max-time 1800 || echo "⚠️ Failed to update $model"
                  done
                  
                  echo "✅ Model update check completed"
              resources:
                limits:
                  memory: 256Mi
                  cpu: 200m
                requests:
                  memory: 128Mi
                  cpu: 100m

---
# ServiceMonitor for Prometheus monitoring
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-model-manager
  namespace: applications
  labels:
    app.kubernetes.io/name: ai-model-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-model-manager
  endpoints:
    - port: http-metrics
      interval: 30s
      path: /metrics