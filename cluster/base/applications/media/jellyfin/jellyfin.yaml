apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      # Use GPU runtime for hardware transcoding
      runtimeClassName: nvidia
      serviceAccountName: gpu-user
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          ports:
            - containerPort: 8096
              name: http
            - containerPort: 8920
              name: https
            - containerPort: 1900
              name: dlna
              protocol: UDP
            - containerPort: 7359
              name: discovery
              protocol: UDP
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: "https://media.local.cluster"
            - name: JELLYFIN_DATA_DIR
              value: "/config"
            - name: JELLYFIN_CACHE_DIR
              value: "/cache"
            - name: JELLYFIN_CONFIG_DIR
              value: "/config/config"
            - name: JELLYFIN_LOG_DIR
              value: "/config/log"
            - name: JELLYFIN_WEB_DIR
              value: "/jellyfin/jellyfin-web"
            # Hardware transcoding settings
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,video,utility"
          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
            - name: jellyfin-cache
              mountPath: /cache
            - name: media-storage
              mountPath: /media
              readOnly: true
            # Device access for hardware transcoding
            - name: dev-dri
              mountPath: /dev/dri
              readOnly: true
          resources:
            limits:
              memory: 8Gi
              cpu: 4000m
              # Intel Quick Sync Video (if available)
              gpu.intel.com/i915: 1
              # NVIDIA GPU (now available with GPU infrastructure)
              nvidia.com/gpu: 1
            requests:
              memory: 2Gi
              cpu: 1000m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 20
      volumes:
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: jellyfin-cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-storage
        # Hardware acceleration devices
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: DirectoryOrCreate
      # Tolerations for hardware access
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      # Node selector for nodes with GPU/hardware transcoding
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: hardware.feature.node.kubernetes.io/gpu
                    operator: Exists

---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8096
      targetPort: http
    - name: https
      port: 8920
      targetPort: https
  selector:
    app.kubernetes.io/name: jellyfin

---
# DLNA/UPnP service for local network discovery
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-dlna
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin-dlna
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: NodePort
  ports:
    - name: dlna
      port: 1900
      targetPort: dlna
      protocol: UDP
      nodePort: 31900
    - name: discovery
      port: 7359
      targetPort: discovery
      protocol: UDP
      nodePort: 31359
  selector:
    app.kubernetes.io/name: jellyfin

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi  # Large cache for transcoding
  storageClassName: local-path

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-storage
  namespace: applications
  labels:
    app.kubernetes.io/name: media-storage
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteMany  # Shared across multiple media applications
  resources:
    requests:
      storage: 500Gi  # Large storage for media files
  storageClassName: local-path

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Optimize for streaming
    traefik.ingress.kubernetes.io/router.middlewares: applications-jellyfin-headers@kubernetescrd
    # Increase timeout for streaming
    traefik.ingress.kubernetes.io/router.timeout: "300s"
spec:
  tls:
    - hosts:
        - media.local.cluster
      secretName: jellyfin-tls
  rules:
    - host: media.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096

---
# Middleware for streaming optimization
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-headers
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "media.local.cluster"
    customResponseHeaders:
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "SAMEORIGIN"
      X-XSS-Protection: "1; mode=block"
      # Optimize for media streaming
      Cache-Control: "public, max-age=3600"
      Access-Control-Allow-Origin: "*"
      Access-Control-Allow-Methods: "GET, POST, OPTIONS"
      Access-Control-Allow-Headers: "Content-Type, Authorization"

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jellyfin
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Traefik
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8096
        - protocol: TCP
          port: 8920
    # Allow DLNA discovery from local network
    - from: []
      ports:
        - protocol: UDP
          port: 1900
        - protocol: UDP
          port: 7359
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow metadata lookups (TMDB, TVDB, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

---
# ConfigMap for Jellyfin configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyfin-config
  namespace: applications
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  # Jellyfin server configuration
  system.xml: |
    <?xml version="1.0" encoding="utf-8"?>
    <ServerConfiguration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <LogFileRetentionDays>3</LogFileRetentionDays>
      <IsStartupWizardCompleted>false</IsStartupWizardCompleted>
      <CachePath>/cache</CachePath>
      <PreviousVersion>10.8.13.0</PreviousVersion>
      <PreviousVersionStr>10.8.13</PreviousVersionStr>
      <EnableUPnP>true</EnableUPnP>
      <PublicPort>8096</PublicPort>
      <PublicHttpsPort>8920</PublicHttpsPort>
      <HttpServerPortNumber>8096</HttpServerPortNumber>
      <HttpsPortNumber>8920</HttpsPortNumber>
      <EnableHttps>true</EnableHttps>
      <EnableNormalizedItemByNameIds>true</EnableNormalizedItemByNameIds>
      <CertificatePath></CertificatePath>
      <CertificatePassword></CertificatePassword>
      <IsPortAuthorized>true</IsPortAuthorized>
      <QuickConnectAvailable>false</QuickConnectAvailable>
      <EnableRemoteAccess>true</EnableRemoteAccess>
      <EnableCaseSensitiveItemIds>true</EnableCaseSensitiveItemIds>
      <DisableLiveTvChannelUserDataName>true</DisableLiveTvChannelUserDataName>
      <MetadataPath>/config/metadata</MetadataPath>
      <MetadataNetworkPath></MetadataNetworkPath>
      <PreferredMetadataLanguage>en</PreferredMetadataLanguage>
      <MetadataCountryCode>US</MetadataCountryCode>
      <SortReplaceCharacters>
        <string>.</string>
        <string>+</string>
        <string>%</string>
      </SortReplaceCharacters>
      <SortRemoveCharacters>
        <string>,</string>
        <string>&amp;</string>
        <string>-</string>
        <string>{</string>
        <string>}</string>
        <string>'</string>
      </SortRemoveCharacters>
      <SortRemoveWords>
        <string>the</string>
        <string>a</string>
        <string>an</string>
      </SortRemoveWords>
      <MinResumePct>5</MinResumePct>
      <MaxResumePct>90</MaxResumePct>
      <MinResumeDurationSeconds>300</MinResumeDurationSeconds>
      <ThumbnailImagePrimaryImageWidth>320</ThumbnailImagePrimaryImageWidth>
      <MaxAudiobookResume>5</MaxAudiobookResume>
      <LibraryMonitorDelay>60</LibraryMonitorDelay>
      <EnableDashboardResponseCaching>true</EnableDashboardResponseCaching>
      <DashboardSourcePath></DashboardSourcePath>
      <ImageSavingConvention>Compatible</ImageSavingConvention>
      <EnableSlowResponseWarning>true</EnableSlowResponseWarning>
      <SlowResponseThresholdMs>500</SlowResponseThresholdMs>
      <CorsHosts>
        <string>*</string>
      </CorsHosts>
      <ActivityLogRetentionDays>30</ActivityLogRetentionDays>
      <LibraryScanFanoutConcurrency>0</LibraryScanFanoutConcurrency>
      <LibraryMetadataRefreshConcurrency>0</LibraryMetadataRefreshConcurrency>
      <RemoveOldPlugins>false</RemoveOldPlugins>
      <DisablePluginImages>false</DisablePluginImages>
    </ServerConfiguration>