apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: n8n
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  - n8n.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: infraflux
      app.kubernetes.io/managed-by: flux

images:
  - name: n8nio/n8n
    newTag: "1.13.1"
  - name: postgres
    newTag: "15-alpine"
  - name: redis
    newTag: "7-alpine"