apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h n8n-postgresql -p 5432 -U n8n; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretRef:
                  name: n8n-secrets
                  key: database-password
      containers:
        - name: n8n
          image: n8nio/n8n:1.13.1
          ports:
            - containerPort: 5678
              name: http
          env:
            # Database Configuration
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              value: "n8n-postgresql"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_USER
              value: "n8n"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretRef:
                  name: n8n-secrets
                  key: database-password
            
            # Redis Configuration for queue mode
            - name: QUEUE_BULL_REDIS_HOST
              value: "n8n-redis"
            - name: QUEUE_BULL_REDIS_PORT
              value: "6379"
            - name: EXECUTIONS_MODE
              value: "queue"
            
            # General Configuration
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_HOST
              value: "n8n.local.cluster"
            - name: N8N_PORT
              value: "5678"
            - name: WEBHOOK_URL
              value: "https://n8n.local.cluster/"
            
            # Security
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretRef:
                  name: n8n-secrets
                  key: encryption-key
            
            # User Management
            - name: N8N_USER_MANAGEMENT_DISABLED
              value: "false"
            - name: N8N_OWNER_EMAIL
              value: "admin@infraflux.local"
            - name: N8N_OWNER_PASSWORD
              valueFrom:
                secretRef:
                  name: n8n-secrets
                  key: admin-password
            
            # Timezone
            - name: GENERIC_TIMEZONE
              value: "UTC"
            - name: TZ
              value: "UTC"
            
            # File System
            - name: N8N_USER_FOLDER
              value: "/home/node/.n8n"
            
            # Features
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
            - name: N8N_TEMPLATES_ENABLED
              value: "true"
            - name: N8N_ONBOARDING_FLOW_DISABLED
              value: "true"
            
            # Security Headers
            - name: N8N_SECURE_COOKIE
              value: "true"
            
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          
          resources:
            limits:
              memory: 1Gi
              cpu: 1000m
            requests:
              memory: 512Mi
              cpu: 200m
          
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data

---
# PostgreSQL Database for n8n
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-postgresql
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n-postgresql
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRES_DB
              value: "n8n"
            - name: POSTGRES_USER
              value: "n8n"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretRef:
                  name: n8n-secrets
                  key: database-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - n8n
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - n8n
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: n8n-postgresql-data

---
# Redis for n8n queue mode
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-redis
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n-redis
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "900 1"
            - --save
            - "300 10"
            - --save
            - "60 10000"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: n8n-redis-data

---
# Worker deployment for n8n queue processing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n-worker
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n-worker
    spec:
      containers:
        - name: n8n-worker
          image: n8nio/n8n:1.13.1
          command: ["n8n", "worker"]
          env:
            # Database Configuration
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              value: "n8n-postgresql"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_USER
              value: "n8n"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretRef:
                  name: n8n-secrets
                  key: database-password
            
            # Redis Configuration
            - name: QUEUE_BULL_REDIS_HOST
              value: "n8n-redis"
            - name: QUEUE_BULL_REDIS_PORT
              value: "6379"
            - name: EXECUTIONS_MODE
              value: "queue"
            
            # Security
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretRef:
                  name: n8n-secrets
                  key: encryption-key
            
            # Timezone
            - name: GENERIC_TIMEZONE
              value: "UTC"
            - name: TZ
              value: "UTC"
            
            # File System
            - name: N8N_USER_FOLDER
              value: "/home/node/.n8n"
            
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          
          resources:
            limits:
              memory: 1Gi
              cpu: 1000m
            requests:
              memory: 256Mi
              cpu: 100m
      
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5678
      targetPort: http
  selector:
    app.kubernetes.io/name: n8n

---
apiVersion: v1
kind: Service
metadata:
  name: n8n-postgresql
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n-postgresql
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    app.kubernetes.io/name: n8n-postgresql

---
apiVersion: v1
kind: Service
metadata:
  name: n8n-redis
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n-redis
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: n8n-redis

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-postgresql-data
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n-postgresql
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-redis-data
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n-redis
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - n8n.local.cluster
      secretName: n8n-tls
  rules:
    - host: n8n.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678