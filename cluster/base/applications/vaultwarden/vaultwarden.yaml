apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
  namespace: applications
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Secret
metadata:
  name: vaultwarden-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  admin-token: "change_me_admin_token_hash"
  smtp-password: "change_me_smtp_password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-config
  namespace: applications
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  DATABASE_URL: "sqlite:///data/db.sqlite3"
  DOMAIN: "https://vaultwarden.local.cluster"
  WEBSOCKET_ENABLED: "true"
  WEBSOCKET_ADDRESS: "0.0.0.0"
  WEBSOCKET_PORT: "3012"
  ROCKET_PORT: "8080"
  SHOW_PASSWORD_HINT: "false"
  SIGNUPS_ALLOWED: "false"
  SIGNUPS_VERIFY: "true"
  SIGNUPS_DOMAINS_WHITELIST: "local.cluster"
  EMERGENCY_ACCESS_ALLOWED: "true"
  SENDS_ALLOWED: "true"
  WEB_VAULT_ENABLED: "true"
  LOG_LEVEL: "info"
  EXTENDED_LOGGING: "true"
  LOG_FILE: "/data/vaultwarden.log"
  # Email Configuration
  SMTP_HOST: "smtp.gmail.com"
  SMTP_FROM: "vaultwarden@infraflux.local"
  SMTP_FROM_NAME: "InfraFlux Vaultwarden"
  SMTP_PORT: "587"
  SMTP_SECURITY: "starttls"
  SMTP_USERNAME: "vaultwarden@infraflux.local"
  SMTP_AUTH_MECHANISM: "Login"
  # Security
  DISABLE_ADMIN_TOKEN: "false"
  DISABLE_ICON_DOWNLOAD: "false"
  ICON_CACHE_TTL: "2592000"
  ICON_CACHE_NEGTTL: "259200"
  ICON_DOWNLOAD_TIMEOUT: "10"
  ICON_BLACKLIST_NON_GLOBAL_IPS: "true"
  DISABLE_2FA_REMEMBER: "false"
  # Performance
  DATABASE_MAX_CONNS: "10"
  DATABASE_TIMEOUT: "30"
  # Backup
  BACKUP_SCHEDULE: "0 5 * * *"
  BACKUP_RETENTION_DAYS: "30"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: applications
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vaultwarden
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.30.1-alpine
          envFrom:
            - configMapRef:
                name: vaultwarden-config
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: admin-token
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: smtp-password
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 3012
              name: websocket
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 512Mi
              cpu: 300m
            requests:
              memory: 256Mi
              cpu: 150m
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: applications
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: websocket
      port: 3012
      targetPort: 3012
  selector:
    app.kubernetes.io/name: vaultwarden
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaultwarden
  namespace: applications
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: default-security-headers@kubernetescrd
spec:
  tls:
  - hosts:
    - vaultwarden.local.cluster
    secretName: vaultwarden-tls
  rules:
    - host: vaultwarden.local.cluster
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80
          - path: /notifications/hub
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 3012