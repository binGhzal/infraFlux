apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificates.cert-manager.io
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/instance: cert-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  group: cert-manager.io
  names:
    kind: Certificate
    listKind: CertificateList
    plural: certificates
    shortNames:
    - cert
    - certs
    singular: certificate
    categories:
    - cert-manager
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        description: "A Certificate resource should be created to ensure an up to date and signed X.509 certificate is stored in the Kubernetes Secret resource named in `spec.secretName`."
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.'
            type: string
          metadata:
            type: object
          spec:
            description: 'Specification of the desired state of the Certificate resource.'
            type: object
            required:
            - issuerRef
            - secretName
            properties:
              secretName:
                description: 'The name of the Kubernetes Secret resource that will be automatically created and managed by this Certificate resource.'
                type: string
              issuerRef:
                description: 'Reference to the issuer for this certificate.'
                type: object
                required:
                - name
                properties:
                  name:
                    description: 'Name of the resource being referred to.'
                    type: string
                  kind:
                    description: 'Kind of the resource being referred to.'
                    type: string
                  group:
                    description: 'Group of the resource being referred to.'
                    type: string
              commonName:
                description: 'Requested common name X509 certificate subject attribute.'
                type: string
              dnsNames:
                description: 'Requested DNS subject alternative names.'
                type: array
                items:
                  type: string
              duration:
                description: 'Requested certificate validity duration.'
                type: string
              renewBefore:
                description: 'How long before the currently issued certificate expires cert-manager should renew the certificate.'
                type: string
          status:
            description: 'Status of the Certificate.'
            type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificaterequests.cert-manager.io
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/instance: cert-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  group: cert-manager.io
  names:
    kind: CertificateRequest
    listKind: CertificateRequestList
    plural: certificaterequests
    shortNames:
    - cr
    - crs
    singular: certificaterequest
    categories:
    - cert-manager
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: "A CertificateRequest is used to request a signed certificate from one of the configured issuers."
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.'
            type: string
          metadata:
            type: object
          spec:
            description: 'Specification of the desired state of the CertificateRequest resource.'
            type: object
            required:
            - issuerRef
            - request
            properties:
              request:
                description: 'The PEM-encoded X.509 certificate signing request to be submitted to the issuer for signing.'
                type: string
                format: byte
              issuerRef:
                description: 'Reference to the issuer for this CertificateRequest.'
                type: object
                required:
                - name
                properties:
                  name:
                    description: 'Name of the resource being referred to.'
                    type: string
                  kind:
                    description: 'Kind of the resource being referred to.'
                    type: string
                  group:
                    description: 'Group of the resource being referred to.'
                    type: string
          status:
            description: 'Status of the CertificateRequest.'
            type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: issuers.cert-manager.io
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/instance: cert-manager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  group: cert-manager.io
  names:
    kind: Issuer
    listKind: IssuerList
    plural: issuers
    singular: issuer
    categories:
    - cert-manager
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: "An Issuer represents a certificate issuing authority which can be referenced as part of `issuerRef` fields."
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.'
            type: string
          metadata:
            type: object
          spec:
            description: 'Specification of the desired state of the Issuer resource.'
            type: object
          status:
            description: 'Status of the Issuer.'
            type: object
---
