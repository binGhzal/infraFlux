apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-operator
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trivy-operator
    spec:
      serviceAccountName: trivy-operator
      containers:
        - name: trivy-operator
          image: aquasec/trivy-operator:0.15.1
          ports:
            - containerPort: 8080
              name: http-metrics
            - containerPort: 9443
              name: webhook-server
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPERATOR_TARGET_NAMESPACES
              value: ""
            - name: OPERATOR_LOG_DEV_MODE
              value: "false"
            - name: OPERATOR_SCAN_JOB_TIMEOUT
              value: "5m"
            - name: OPERATOR_CONCURRENT_SCAN_JOBS_LIMIT
              value: "10"
            - name: OPERATOR_SCAN_JOB_RETRY_AFTER
              value: "30s"
            - name: OPERATOR_BATCH_DELETE_LIMIT
              value: "10"
            - name: OPERATOR_BATCH_DELETE_DELAY
              value: "10s"
            - name: OPERATOR_METRICS_BIND_ADDRESS
              value: ":8080"
            - name: OPERATOR_HEALTH_PROBE_BIND_ADDRESS
              value: ":9090"
            - name: OPERATOR_CIS_KUBERNETES_BENCHMARK_ENABLED
              value: "true"
            - name: OPERATOR_VULNERABILITY_SCANNER_ENABLED
              value: "true"
            - name: OPERATOR_SBOM_GENERATION_ENABLED
              value: "true"
            - name: OPERATOR_CONFIG_AUDIT_SCANNER_ENABLED
              value: "true"
            - name: OPERATOR_RBAC_ASSESSMENT_SCANNER_ENABLED
              value: "true"
            - name: OPERATOR_INFRA_ASSESSMENT_SCANNER_ENABLED
              value: "true"
            - name: OPERATOR_CLUSTER_COMPLIANCE_ENABLED
              value: "true"
            - name: TRIVY_SERVER_HEALTH_CHECK_CACHE_EXPIRATION
              value: "10h"
            - name: OPERATOR_ACCESS_GLOBAL_SECRETS_SERVICE_ACCOUNTS
              value: "true"
            - name: OPERATOR_BUILT_IN_TRIVY_SERVER
              value: "true"
          args:
            - --config-file=/etc/trivy-operator/trivy-operator.yaml
            - --v=1
          volumeMounts:
            - name: trivy-operator-config
              mountPath: /etc/trivy-operator
              readOnly: true
            - name: webhook-config
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          resources:
            limits:
              memory: 1Gi
              cpu: 1000m
            requests:
              memory: 512Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: trivy-operator-config
          configMap:
            name: trivy-operator-config
        - name: webhook-config
          secret:
            secretName: trivy-operator-webhook-config
            optional: true

---
# Trivy Server for centralized vulnerability database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-server
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-server
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trivy-server
    spec:
      containers:
        - name: trivy-server
          image: aquasec/trivy:0.45.1
          args:
            - server
            - --listen
            - "0.0.0.0:4954"
            - --cache-dir
            - /tmp/trivy/.cache
            - --log-level
            - info
          ports:
            - containerPort: 4954
              name: trivy-http
          env:
            - name: TRIVY_LISTEN
              value: "0.0.0.0:4954"
            - name: TRIVY_CACHE_DIR
              value: "/tmp/trivy/.cache"
            - name: TRIVY_DEBUG
              value: "false"
            - name: TRIVY_SKIP_UPDATE
              value: "false"
            - name: TRIVY_OFFLINE_SCAN
              value: "false"
            - name: TRIVY_INSECURE
              value: "false"
            - name: TRIVY_TIMEOUT
              value: "5m0s"
          volumeMounts:
            - name: trivy-cache
              mountPath: /tmp/trivy/.cache
          resources:
            limits:
              memory: 2Gi
              cpu: 1000m
            requests:
              memory: 512Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /healthz
              port: trivy-http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: trivy-http
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: trivy-cache
          persistentVolumeClaim:
            claimName: trivy-server-cache

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: trivy-operator
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-metrics
  selector:
    app.kubernetes.io/name: trivy-operator

---
apiVersion: v1
kind: Service
metadata:
  name: trivy-server
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-server
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: trivy-http
      port: 4954
      targetPort: trivy-http
  selector:
    app.kubernetes.io/name: trivy-server

---
# ServiceAccount and RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy-operator
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-operator
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "replicationcontrollers", "resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints", "configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-operator
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-operator
subjects:
  - kind: ServiceAccount
    name: trivy-operator
    namespace: security

---
# PersistentVolumeClaim for Trivy cache
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trivy-server-cache
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-server
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path

---
# ConfigMap for Trivy Operator
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-operator-config
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  trivy-operator.yaml: |
    namespace: "security"
    targetNamespaces: ""
    excludeNamespaces: "kube-system,kube-public,kube-node-lease"
    targetWorkloads: "pod,replicaset,replicationcontroller,statefulset,daemonset,cronjob,job"
    scanJobTimeout: "5m"
    concurrentScanJobsLimit: 10
    scanJobRetryAfter: "30s"
    batchDeleteLimit: 10
    batchDeleteDelay: "10s"
    
    vulnerabilityReports:
      scanner: "Trivy"
      
    configAuditReports:
      scanner: "Trivy"
      
    rbacAssessmentReports:
      scanner: "Trivy"
      
    infraAssessmentReports:
      scanner: "Trivy"
      
    clusterComplianceReports:
      scanner: "Trivy"
      
    trivy:
      # Trivy server URL
      serverURL: "http://trivy-server:4954"
      mode: "ClientServer"
      
      # Vulnerability database
      skipUpdate: false
      offlineScan: false
      timeout: "5m0s"
      
      # Resources
      resources:
        requests:
          cpu: 100m
          memory: 100M
        limits:
          cpu: 500m
          memory: 500M
      
      # Security Context
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

---
# ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: trivy-operator
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-operator
  endpoints:
    - port: http-metrics
      interval: 30s
      path: /metrics