---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: server
      app.kubernetes.io/part-of: authentik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: authentik
    spec:
      containers:
      - name: authentik
        image: ghcr.io/goauthentik/server:2024.2.2
        args:
        - server
        env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: secret_key
        - name: AUTHENTIK_REDIS__HOST
          value: authentik-redis
        - name: AUTHENTIK_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: redis_password
        - name: AUTHENTIK_POSTGRESQL__HOST
          value: authentik-postgresql
        - name: AUTHENTIK_POSTGRESQL__USER
          value: authentik
        - name: AUTHENTIK_POSTGRESQL__NAME
          value: authentik
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: postgres_password
        - name: AUTHENTIK_ERROR_REPORTING__ENABLED
          value: "false"
        - name: AUTHENTIK_DISABLE_UPDATE_CHECK
          value: "true"
        - name: AUTHENTIK_DISABLE_STARTUP_ANALYTICS
          value: "true"
        - name: AUTHENTIK_AVATARS
          value: "initials"
        - name: AUTHENTIK_DEFAULT_USER_CHANGE_NAME
          value: "false"
        - name: AUTHENTIK_DEFAULT_USER_CHANGE_EMAIL
          value: "true"
        - name: AUTHENTIK_DEFAULT_USER_CHANGE_USERNAME
          value: "false"
        - name: AUTHENTIK_GDPR_COMPLIANCE
          value: "true"
        ports:
        - name: http
          containerPort: 9000
        - name: https
          containerPort: 9443
        - name: metrics
          containerPort: 9300
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /-/health/live/
            port: http
          initialDelaySeconds: 50
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /-/health/ready/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /-/health/live/
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 20
          successThreshold: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: authentik-config
          mountPath: /blueprints/custom
          readOnly: true
      volumes:
      - name: authentik-config
        configMap:
          name: authentik-config
      serviceAccountName: authentik
      securityContext:
        fsGroup: 1000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authentik
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: authentik