---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: security
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: authentik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.rule: Host(`auth.{{ cluster_domain }}`)
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - auth.{{ cluster_domain }}
    secretName: authentik-tls
  rules:
  - host: auth.{{ cluster_domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: authentik
            port:
              number: 80
---
# Traefik Middleware for Forward Auth
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: security
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: middleware
    app.kubernetes.io/part-of: authentik
spec:
  forwardAuth:
    address: http://authentik.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
# Global Traefik Middleware for SSO
apiVersion: traefik.containo.us/v1alpha1  
kind: Middleware
metadata:
  name: authentik-sso
  namespace: traefik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: middleware
    app.kubernetes.io/part-of: infraflux-security
spec:
  forwardAuth:
    address: http://authentik.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid