labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/part-of: infraflux
      app.kubernetes.io/managed-by: flux

images:
  - name: ghcr.io/goauthentik/server
    newTag: "2024.2.2"
  - name: library/postgres
    newTag: "15-alpine"
  - name: library/redis
    newTag: "alpine"

