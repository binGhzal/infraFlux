apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: authentik-base
  annotations:
    config.kubernetes.io/local-config: "true"

namespace: security

resources:
  # - namespace.yaml  # Namespace created by base infrastructure
  - postgresql.yaml
  - redis.yaml
  - authentik-server.yaml
  - authentik-worker.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml

# configMapGenerator:
