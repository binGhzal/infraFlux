---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: security
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: authentik
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9300"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: https
    protocol: TCP
  - name: metrics
    port: 9300
    targetPort: metrics
    protocol: TCP
  selector:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: authentik