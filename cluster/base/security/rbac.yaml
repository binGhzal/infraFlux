apiVersion: v1
kind: ServiceAccount
metadata:
  name: infraflux-operator
  namespace: infraflux-system
  labels:
    app.kubernetes.io/name: infraflux-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infraflux-operator
  labels:
    app.kubernetes.io/name: infraflux-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
rules:
  # Core resource management
  - apiGroups: [""]
    resources: ["namespaces", "configmaps", "secrets", "services", "endpoints", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    
  # Application management
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    
  # Ingress and networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    
  # RBAC management (limited)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    
  # Monitoring resources
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "podmonitors", "prometheusrules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    
  # Event access for troubleshooting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
    
  # Pod management for scaling operations
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
    
  # Node information for cluster management
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infraflux-operator
  labels:
    app.kubernetes.io/name: infraflux-operator
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infraflux-operator
subjects:
  - kind: ServiceAccount
    name: infraflux-operator
    namespace: infraflux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraflux-monitoring
  namespace: monitoring
  labels:
    app.kubernetes.io/name: infraflux-monitoring
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraflux-monitoring
  namespace: monitoring
  labels:
    app.kubernetes.io/name: infraflux-monitoring
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraflux-monitoring
subjects:
  - kind: ServiceAccount
    name: infraflux-operator
    namespace: infraflux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraflux-security
  namespace: security
  labels:
    app.kubernetes.io/name: infraflux-security
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraflux-security
  namespace: security
  labels:
    app.kubernetes.io/name: infraflux-security
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: infraflux-security
subjects:
  - kind: ServiceAccount
    name: infraflux-operator
    namespace: infraflux-system