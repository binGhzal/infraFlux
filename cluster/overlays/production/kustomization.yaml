apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: infraflux-production
  annotations:
    config.kubernetes.io/local-config: "true"

# namespace: infraflux-system  # Commented out to avoid conflicts

resources:
  - ../../base

patches:
  # Simple resource patches for production
  - target:
      kind: Deployment
      name: grafana
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
  - target:
      kind: Deployment
      name: authentik-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "1Gi"
            cpu: "300m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

configMapGenerator:
  - name: cluster-config
    files:
      - config=cluster-config.yaml
    options:
      disableNameSuffixHash: true

secretGenerator:
  - name: cluster-secrets
    files:
      - proxmox-password=secrets/proxmox-password.txt
      - jwt-secret=secrets/jwt-secret.txt
    type: Opaque
    options:
      disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      environment: production
      cluster: infraflux-prod

replicas:
  - name: grafana
    count: 2
  - name: authentik-server
    count: 3
  - name: authentik-worker
    count: 2

images:
  - name: authelia/authelia
    newTag: "4.38.0"
  - name: grafana/grafana
    newTag: "10.0.0"
  - name: prom/prometheus
    newTag: "v2.47.0"
  - name: authentik/authentik
    newTag: "2023.10.4"