apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: infraflux-production
  annotations:
    config.kubernetes.io/local-config: "true"

namespace: infraflux-system

resources:
  - ../../base

patchesStrategicMerge:
  - patches/production-resources.yaml
  - patches/production-ingress.yaml
  - patches/production-security.yaml

configMapGenerator:
  - name: cluster-config
    files:
      - config=cluster-config.yaml
    options:
      disableNameSuffixHash: true

secretGenerator:
  - name: cluster-secrets
    files:
      - proxmox-password=secrets/proxmox-password.txt
      - jwt-secret=secrets/jwt-secret.txt
    type: Opaque
    options:
      disableNameSuffixHash: true

commonLabels:
  environment: production
  cluster: infraflux-prod

replicas:
  - name: prometheus
    count: 2
  - name: grafana
    count: 2
  - name: authelia
    count: 2

images:
  - name: authelia/authelia
    newTag: "4.38.0"
  - name: grafana/grafana
    newTag: "10.0.0"
  - name: prom/prometheus
    newTag: "v2.47.0"

patches:
  # Enable high availability for production
  - target:
      kind: Deployment
      name: prometheus
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: prometheus
                topologyKey: kubernetes.io/hostname
  
  # Production resource limits
  - target:
      kind: Deployment
      name: grafana
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"