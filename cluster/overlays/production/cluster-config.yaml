# InfraFlux Production Configuration
# This file defines production-specific settings for the cluster

apiVersion: v1
kind: ConfigMap
metadata:
  name: infraflux-config
  namespace: infraflux-system
data:
  # Cluster Configuration
  cluster_name: "infraflux-prod"
  cluster_domain: "cluster.local"
  environment: "production"

  # Network Configuration
  network_cidr: "192.168.1.0/24"  # Specific CIDR for production
  service_cidr: "10.96.0.0/12"
  pod_cidr: "10.244.0.0/16"

  # Proxmox Configuration
  proxmox_host: "proxmox.example.com"
  proxmox_user: "root@pam"
  proxmox_node: "pve"
  proxmox_storage: "local-lvm"

  # VM Template Configuration
  vm_template_id: "9000"
  vm_template_name: "ubuntu-24.04-template"

  # Node Configuration (HA Production)
  controller_count: "3"          # HA controllers
  worker_count: "5"              # Multiple workers
  vm_memory: "8192"              # Increased memory for production
  vm_cores: "4"                  # Multiple cores for production
  vm_disk_size: "50G"            # Larger disk for production
  
  # VM Scaling Configuration (Enabled for production)
  enable_vm_scaling: "true"
  min_worker_count: "3"
  max_worker_count: "20"
  scale_threshold_cpu: "70"      # Lower threshold for production
  scale_threshold_memory: "70"
  scale_cooldown_minutes: "15"   # Longer cooldown for production

  # K3s Configuration
  k3s_version: "v1.28.5+k3s1"
  k3s_cluster_init: "true"
  k3s_disable_servicelb: "false"
  k3s_disable_traefik: "false"

  # Security Configuration (Enhanced for production)
  disable_swap: "true"
  enable_firewall: "true"
  ssh_key_path: "~/.ssh/id_rsa.pub"

  # Core Applications (Full stack for production)
  install_cilium: "true"
  install_metallb: "false"
  install_ingress_nginx: "false"
  install_cert_manager: "true"     # Essential for production
  install_monitoring: "true"
  install_logging: "true"          # Full logging for production

  # Traefik Configuration (Secure for production)
  traefik_dashboard_enabled: "true"
  traefik_api_insecure: "false"    # Secure for production
  traefik_log_level: "INFO"        # Production logging level
  traefik_enable_dashboard_ingress: "true"

  # Monitoring Stack (Full for production)
  monitoring_stack: "full"
  enable_log_aggregation: "true"   # Enable Loki for production
  enable_hubble_ui: "true"         # Network observability
  monitoring_retention_days: "90"  # Longer retention for production

  # Authentication & Security (Full security for production)
  auth_provider: "authentik"       # Enable SSO for production
  enable_sso: "true"
  enable_2fa: "true"
  enable_crowdsec: "true"          # Behavioral security
  forward_auth_domains: "*.local"

  # Backup & Recovery (Essential for production)
  enable_backup: "true"
  backup_provider: "velero"
  backup_schedule: "0 2 * * *"     # Daily backups
  backup_retention_days: "90"      # Longer retention
  enable_volume_backup: "true"     # Full volume backup

  # Network & VPN Integration (Enhanced for production)
  enable_vpn: "true"
  vpn_provider: "tailscale"
  enable_pihole: "true"            # Network-wide ad blocking
  enable_external_dns: "true"      # Automatic DNS management

  # Application Catalog (Enabled for production)
  enable_app_catalog: "true"
  default_app_categories: "security,monitoring,productivity"
  auto_create_ingress: "true"

  # Development & DevOps Tools (Full suite for production)
  enable_gitops: "true"
  enable_container_registry: "true"
  enable_ci_cd: "true"

  # Productivity Applications (Enabled for production)
  enable_nextcloud: "true"
  enable_vaultwarden: "true"
  enable_homepage: "true"

  # Media & Entertainment (Optional for production)
  enable_jellyfin: "false"
  enable_transmission: "false"

  # Advanced Configuration (Full features for production)
  enable_auto_updates: "true"
  enable_sealed_secrets: "true"
  cluster_timezone: "UTC"
  
  # Resource Management (Strict for production)
  enable_resource_quotas: "true"
  default_storage_class: "local-path"
  enable_pod_security_policies: "true"

  # Alerting & Notifications (Full alerting for production)
  enable_alerting: "true"
  alert_channels: "discord,slack"
  discord_webhook_url: ""
  slack_webhook_url: ""
  smtp_server: "smtp.example.com"
  smtp_username: "alerts@example.com"