apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: infraflux-development
  annotations:
    config.kubernetes.io/local-config: "true"

# namespace: infraflux-dev  # Commented out to avoid conflicts

resources:
  - ../../base

patches:
  # Simple resource patches for development
  - target:
      kind: Deployment
      name: grafana
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
  - target:
      kind: Deployment
      name: authentik-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"

configMapGenerator:
  - name: cluster-config
    files:
      - config=cluster-config-dev.yaml
    options:
      disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      environment: development
      cluster: infraflux-dev

replicas:
  - name: grafana
    count: 1
  - name: authentik-server
    count: 1
  - name: authentik-worker
    count: 1

images:
  - name: authelia/authelia
    newTag: "4.38.0"
  - name: grafana/grafana
    newTag: "10.0.0"
  - name: prom/prometheus
    newTag: "v2.47.0"
  - name: authentik/authentik
    newTag: "2023.10.4"