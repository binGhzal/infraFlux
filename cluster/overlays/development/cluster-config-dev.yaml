# InfraFlux Development Configuration
# This file defines development-specific settings for the cluster

apiVersion: v1
kind: ConfigMap
metadata:
  name: infraflux-config
  namespace: infraflux-dev
data:
  # Cluster Configuration
  cluster_name: "infraflux-dev"
  cluster_domain: "dev.local"
  environment: "development"

  # Network Configuration
  network_cidr: "auto"
  service_cidr: "10.96.0.0/12"
  pod_cidr: "10.244.0.0/16"

  # Proxmox Configuration
  proxmox_host: "proxmox.example.com"
  proxmox_user: "root@pam"
  proxmox_node: "pve"
  proxmox_storage: "local-lvm"

  # VM Template Configuration
  vm_template_id: "9000"
  vm_template_name: "ubuntu-24.04-template"

  # Node Configuration (Smaller for development)
  controller_count: "1"          # Single controller for dev
  worker_count: "1"              # Single worker for dev
  vm_memory: "2048"              # Reduced memory for dev
  vm_cores: "1"                  # Single core for dev
  vm_disk_size: "15G"            # Smaller disk for dev
  
  # VM Scaling Configuration (Disabled for dev)
  enable_vm_scaling: "false"
  min_worker_count: "1"
  max_worker_count: "3"
  scale_threshold_cpu: "80"
  scale_threshold_memory: "80"
  scale_cooldown_minutes: "10"

  # K3s Configuration
  k3s_version: "v1.28.5+k3s1"
  k3s_cluster_init: "true"
  k3s_disable_servicelb: "false"
  k3s_disable_traefik: "false"

  # Security Configuration
  disable_swap: "true"
  enable_firewall: "true"
  ssh_key_path: "~/.ssh/id_rsa.pub"

  # Core Applications (Minimal for dev)
  install_cilium: "true"
  install_metallb: "false"
  install_ingress_nginx: "false"
  install_cert_manager: "false"    # Disabled for dev
  install_monitoring: "true"
  install_logging: "false"

  # Traefik Configuration
  traefik_dashboard_enabled: "true"
  traefik_api_insecure: "true"     # Insecure for dev
  traefik_log_level: "DEBUG"       # Debug logging for dev
  traefik_enable_dashboard_ingress: "true"

  # Monitoring Stack (Basic for dev)
  monitoring_stack: "basic"
  enable_log_aggregation: "false"
  enable_hubble_ui: "false"
  monitoring_retention_days: "7"   # Shorter retention for dev

  # Authentication & Security (Minimal for dev)
  auth_provider: "none"
  enable_sso: "false"
  enable_2fa: "false"
  enable_crowdsec: "false"
  forward_auth_domains: "*.dev.local"

  # Backup & Recovery (Disabled for dev)
  enable_backup: "false"
  backup_provider: "none"
  backup_schedule: "0 2 * * *"
  backup_retention_days: "7"
  enable_volume_backup: "false"

  # Network & VPN Integration (Disabled for dev)
  enable_vpn: "false"
  vpn_provider: "none"
  enable_pihole: "false"
  enable_external_dns: "false"

  # Application Catalog (Disabled for dev)
  enable_app_catalog: "false"
  default_app_categories: "monitoring"
  auto_create_ingress: "true"

  # Development & DevOps Tools (Enabled for dev)
  enable_gitops: "true"            # Enable GitOps for dev
  enable_container_registry: "false"
  enable_ci_cd: "false"

  # Productivity Applications (Disabled for dev)
  enable_nextcloud: "false"
  enable_vaultwarden: "false"
  enable_homepage: "true"          # Enable homepage for dev

  # Media & Entertainment (Disabled for dev)
  enable_jellyfin: "false"
  enable_transmission: "false"

  # Advanced Configuration
  enable_auto_updates: "false"     # Disabled for dev
  enable_sealed_secrets: "true"
  cluster_timezone: "UTC"
  
  # Resource Management (Relaxed for dev)
  enable_resource_quotas: "false"
  default_storage_class: "local-path"
  enable_pod_security_policies: "false"  # Disabled for dev

  # Alerting & Notifications (Minimal for dev)
  enable_alerting: "false"
  alert_channels: "webhook"
  discord_webhook_url: ""
  slack_webhook_url: ""
  smtp_server: ""
  smtp_username: ""