name: infraflux-v2
runtime: nodejs
description: Unified Infrastructure as Code for Proxmox homelab automation
main: dist/index.js

template:
  config:
    infraflux:cluster-name:
      description: The name of the Kubernetes cluster to create
      default: homelab
    infraflux:node-count:
      description: The number of worker nodes to create
      default: 3
    infraflux:vm-template:
      description: The VM template to use for nodes
      default: talos-v1.6.0
    infraflux:environment:
      description: The deployment environment
      default: dev
    proxmox:endpoint:
      description: Proxmox API endpoint URL
      secret: false
    proxmox:node:
      description: Proxmox node name for VM deployment
      default: pve1
    proxmox:datastore:
      description: Proxmox datastore for VM storage
      default: local-lvm
    proxmox:network-bridge:
      description: Proxmox network bridge for VMs
      default: vmbr0
    proxmox:api-token-id:
      description: Proxmox API token ID
      secret: false
    proxmox:api-token-secret:
      description: Proxmox API token secret
      secret: true
    cluster:version:
      description: Kubernetes version to deploy
      default: v1.28.0
    cluster:pod-subnet:
      description: Pod network subnet
      default: 10.244.0.0/16
    cluster:service-subnet:
      description: Service network subnet
      default: 10.96.0.0/12
    cluster:domain:
      description: Cluster domain suffix
      default: cluster.local

plugins:
  providers:
    - name: proxmoxve
      path: "@muhlba91/pulumi-proxmoxve"
      version: ">=6.2.0"
    - name: kubernetes
      path: "@pulumi/kubernetes"
      version: ">=4.5.0"
    - name: tls
      path: "@pulumi/tls"
      version: ">=5.0.0"
    - name: random
      path: "@pulumi/random"
      version: ">=4.15.0"
    - name: command
      path: "@pulumi/command"
      version: ">=0.9.0"

backend:
  url: file://./state