# AlertManager Notification Secrets Template
# Copy this file to /templates/sealed-secrets/alertmanager-sealed-secrets.yaml
# Replace the placeholder values with your actual webhook URLs
# Then encrypt with: kubeseal -f alertmanager-sealed-secrets.yaml -w alertmanager-sealed-secrets-encrypted.yaml

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  # Slack webhook URL (replace with your actual webhook)
  slack_webhook_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
  
  # Discord webhook URL (replace with your actual webhook)
  discord_webhook_url: "https://discord.com/api/webhooks/YOUR/DISCORD/WEBHOOK"
  
  # SMTP password for email notifications (optional)
  smtp_password: "your-smtp-password"
  
  # Additional webhook URLs for custom integrations
  custom_webhook_url: "https://your-custom-webhook.com/alerts"

---
# Example of how to use kubeseal to encrypt this secret:
# 1. Update the webhook URLs above with your actual values
# 2. Save this file as alertmanager-secrets.yaml
# 3. Run: kubeseal -f alertmanager-secrets.yaml -w alertmanager-sealed-secrets.yaml
# 4. Delete the plaintext file: rm alertmanager-secrets.yaml
# 5. Add the sealed secret to your cluster: kubectl apply -f alertmanager-sealed-secrets.yaml