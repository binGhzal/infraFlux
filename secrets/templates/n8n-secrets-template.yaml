# n8n Secrets Template
# Copy this file to /templates/sealed-secrets/n8n-sealed-secrets.yaml
# Replace the placeholder values with your actual credentials
# Then encrypt with: kubeseal -f n8n-sealed-secrets.yaml -w n8n-sealed-secrets-encrypted.yaml

apiVersion: v1
kind: Secret
metadata:
  name: n8n-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  # Database password for PostgreSQL
  database-password: "change-me-secure-db-password"
  
  # Encryption key for n8n (should be long and random)
  encryption-key: "change-me-long-random-encryption-key-for-n8n-workflows"
  
  # Admin user password
  admin-password: "change-me-admin-password"

---
# Example of how to use kubeseal to encrypt this secret:
# 1. Update the passwords above with your actual secure values
# 2. Save this file as n8n-secrets.yaml
# 3. Run: kubeseal -f n8n-secrets.yaml -w n8n-sealed-secrets.yaml
# 4. Delete the plaintext file: rm n8n-secrets.yaml
# 5. Add the sealed secret to your cluster: kubectl apply -f n8n-sealed-secrets.yaml