---
# Discord webhook secret template
apiVersion: v1
kind: Secret
metadata:
  name: discord-webhook
  namespace: flux-system
type: Opaque
stringData:
  webhook-url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"

---
# Slack webhook secret template
apiVersion: v1
kind: Secret
metadata:
  name: slack-webhook
  namespace: flux-system
type: Opaque
stringData:
  webhook-url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"

---
# Generic webhook secret template
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secret
  namespace: flux-system
type: Opaque
stringData:
  token: "your-webhook-authentication-token"

---
# SMTP configuration secret template
apiVersion: v1
kind: Secret
metadata:
  name: smtp-credentials
  namespace: flux-system
type: Opaque
stringData:
  smtp-config: |
    {
      "smtp_server": "smtp.gmail.com:587",
      "smtp_username": "your-email@gmail.com",
      "smtp_password": "your-app-password",
      "from_email": "infraflux@your-domain.com",
      "to_emails": ["admin@your-domain.com"]
    }