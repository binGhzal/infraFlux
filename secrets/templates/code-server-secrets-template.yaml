# Code-Server Secrets Template
# Copy this file to /templates/sealed-secrets/code-server-sealed-secrets.yaml
# Replace the placeholder values with your actual credentials
# Then encrypt with: kubeseal -f code-server-sealed-secrets.yaml -w code-server-sealed-secrets-encrypted.yaml

apiVersion: v1
kind: Secret
metadata:
  name: code-server-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: code-server
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  # Password for Code Server web interface
  password: "change-me-secure-password"
  
  # Sudo password for terminal access in Code Server
  sudo-password: "change-me-sudo-password"

---
# Example of how to use kubeseal to encrypt this secret:
# 1. Update the passwords above with your actual secure values
# 2. Save this file as code-server-secrets.yaml
# 3. Run: kubeseal -f code-server-secrets.yaml -w code-server-sealed-secrets.yaml
# 4. Delete the plaintext file: rm code-server-secrets.yaml
# 5. Add the sealed secret to your cluster: kubectl apply -f code-server-sealed-secrets.yaml