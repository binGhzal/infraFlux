# Open WebUI Secrets Template
# Copy this file to /templates/sealed-secrets/open-webui-sealed-secrets.yaml
# Replace the placeholder values with your actual credentials
# Then encrypt with: kubeseal -f open-webui-sealed-secrets.yaml -w open-webui-sealed-secrets-encrypted.yaml

apiVersion: v1
kind: Secret
metadata:
  name: open-webui-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  # Secret key for WebUI sessions (generate a random 32+ character string)
  secret-key: "change-me-to-a-long-random-secret-key-for-sessions"
  
  # JWT secret key for authentication tokens (generate a random 32+ character string)
  jwt-secret-key: "change-me-to-a-long-random-jwt-secret-key"
  
  # OAuth client ID from Authentik (create in Authentik admin panel)
  oauth-client-id: "open-webui-client-id-from-authentik"
  
  # OAuth client secret from Authentik (create in Authentik admin panel)
  oauth-client-secret: "open-webui-client-secret-from-authentik"

---
# Instructions for Authentik OAuth setup:
# 1. Login to Authentik admin panel at https://auth.local.cluster/if/admin/
# 2. Go to Applications -> Providers
# 3. Create new OAuth2/OpenID Provider with these settings:
#    - Name: Open WebUI
#    - Client type: Confidential
#    - Client ID: open-webui-client-id
#    - Redirect URIs: https://ai.local.cluster/oauth/oidc/callback
#    - Scopes: openid profile email
# 4. Go to Applications -> Applications
# 5. Create new Application:
#    - Name: Open WebUI
#    - Slug: open-webui
#    - Provider: Open WebUI (from step 3)
#    - Launch URL: https://ai.local.cluster
# 6. Copy the client ID and secret to this template

# Example of how to use kubeseal to encrypt this secret:
# 1. Update the values above with your actual secure credentials
# 2. Save this file as open-webui-secrets.yaml
# 3. Run: kubeseal -f open-webui-secrets.yaml -w open-webui-sealed-secrets.yaml
# 4. Delete the plaintext file: rm open-webui-secrets.yaml
# 5. Add the sealed secret to your cluster: kubectl apply -f open-webui-sealed-secrets.yaml