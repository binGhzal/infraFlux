# CrowdSec Secrets Template
# Copy this file to /templates/sealed-secrets/crowdsec-sealed-secrets.yaml
# Replace the placeholder values with your actual credentials
# Then encrypt with: kubeseal -f crowdsec-sealed-secrets.yaml -w crowdsec-sealed-secrets-encrypted.yaml

apiVersion: v1
kind: Secret
metadata:
  name: crowdsec-secrets
  namespace: security
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  # Agent password for communication with LAPI
  agent-password: "change-me-secure-agent-password"
  
  # Enrollment key for CrowdSec Console (optional, get from console.crowdsec.net)
  enroll-key: "change-me-enrollment-key-from-console"
  
  # Bouncer API key for Traefik integration
  bouncer-api-key: "change-me-secure-bouncer-api-key"

---
# Example of how to use kubeseal to encrypt this secret:
# 1. Update the passwords above with your actual secure values
# 2. Save this file as crowdsec-secrets.yaml
# 3. Run: kubeseal -f crowdsec-secrets.yaml -w crowdsec-sealed-secrets.yaml
# 4. Delete the plaintext file: rm crowdsec-secrets.yaml
# 5. Add the sealed secret to your cluster: kubectl apply -f crowdsec-sealed-secrets.yaml
#
# Note: The enroll-key can be obtained from https://console.crowdsec.net/
# The bouncer-api-key should be generated in the CrowdSec console