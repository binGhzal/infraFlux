# Paperless-ngx Secrets Template
# Copy this file to /templates/sealed-secrets/paperless-sealed-secrets.yaml
# Replace the placeholder values with your actual credentials
# Then encrypt with: kubeseal -f paperless-sealed-secrets.yaml -w paperless-sealed-secrets-encrypted.yaml

apiVersion: v1
kind: Secret
metadata:
  name: paperless-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: paperless-ngx
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  # Database password for PostgreSQL
  database-password: "change-me-secure-db-password"
  
  # Secret key for Paperless-ngx (should be long and random)
  secret-key: "change-me-long-random-secret-key-for-paperless-ngx-security"
  
  # Admin user password
  admin-password: "change-me-admin-password"

---
# Example of how to use kubeseal to encrypt this secret:
# 1. Update the passwords above with your actual secure values
# 2. Save this file as paperless-secrets.yaml
# 3. Run: kubeseal -f paperless-secrets.yaml -w paperless-sealed-secrets.yaml
# 4. Delete the plaintext file: rm paperless-secrets.yaml
# 5. Add the sealed secret to your cluster: kubectl apply -f paperless-sealed-secrets.yaml