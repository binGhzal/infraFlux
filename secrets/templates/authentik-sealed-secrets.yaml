# Template for generating sealed secrets - Instructions for users
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-sealed-secrets-instructions
  namespace: security
  labels:
    app.kubernetes.io/name: authentik-instructions
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
data:
  instructions.md: |
    # Authentik Sealed Secrets Instructions
    
    To generate the sealed secrets for Authentik, follow these steps:
    
    ## 1. Install kubeseal CLI
    ```bash
    # Install kubeseal
    wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/kubeseal-0.24.0-linux-amd64.tar.gz
    tar -xzf kubeseal-0.24.0-linux-amd64.tar.gz
    sudo install -m 755 kubeseal /usr/local/bin/kubeseal
    ```
    
    ## 2. Generate your secrets
    ```bash
    # Generate a strong secret key (replace with your own)
    SECRET_KEY=$(openssl rand -base64 32)
    POSTGRES_PASSWORD=$(openssl rand -base64 32)
    REDIS_PASSWORD=$(openssl rand -base64 32)
    
    # Create sealed secrets
    echo -n "$SECRET_KEY" | kubeseal --raw --from-file=/dev/stdin --name=authentik-secrets --namespace=security --scope=strict > secret_key.sealed
    echo -n "$POSTGRES_PASSWORD" | kubeseal --raw --from-file=/dev/stdin --name=authentik-secrets --namespace=security --scope=strict > postgres_password.sealed
    echo -n "$REDIS_PASSWORD" | kubeseal --raw --from-file=/dev/stdin --name=authentik-secrets --namespace=security --scope=strict > redis_password.sealed
    echo -n "authentik" | kubeseal --raw --from-file=/dev/stdin --name=authentik-secrets --namespace=security --scope=strict > postgres_db.sealed
    echo -n "authentik" | kubeseal --raw --from-file=/dev/stdin --name=authentik-secrets --namespace=security --scope=strict > postgres_user.sealed
    ```
    
    ## 3. Update the sealed secret file
    Replace the encrypted values in authentik-sealed-secrets.yaml with the output from the commands above.
    
    ## 4. Deploy
    ```bash
    kubectl apply -f authentik-sealed-secrets.yaml
    ```