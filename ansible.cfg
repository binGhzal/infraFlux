[defaults]
# InfraFlux v2.0 - Pure Declarative Configuration
inventory = inventory/localhost
host_key_checking = False

# Environment variable loading
lookup_plugins = ~/.local/lib/python*/site-packages/ansible/plugins/lookup:/usr/share/ansible/plugins/lookup
vars_plugins = ~/.local/lib/python*/site-packages/ansible/plugins/vars:/usr/share/ansible/plugins/vars

# Output
stdout_callback = yaml
callback_plugins = ~/.local/lib/python*/site-packages/ansible/plugins/callback
display_skipped_hosts = False

# Performance  
forks = 10
gathering = smart
fact_caching = memory

# Retry and reliability
retry_files_enabled = False

[ssh_connection]
pipelining = True