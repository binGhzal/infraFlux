# InfraFlux v2.0 - Ansible Inventory
# Dynamic inventory for infrastructure deployment

all:
  children:
    proxmox:
      hosts:
        proxmox-01:
          ansible_host: "{{ proxmox_host }}"
          ansible_user: root
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
      vars:
        proxmox_api_host: "{{ proxmox_host }}"
        proxmox_api_user: "{{ proxmox_user }}"
        proxmox_api_password: "{{ proxmox_password }}"
        proxmox_api_token_id: "{{ proxmox_api_token_id | default('') }}"
        proxmox_api_token_secret: "{{ proxmox_api_token_secret | default('') }}"
        proxmox_node: "{{ proxmox_node }}"

    talos_cluster:
      children:
        control_plane:
          hosts:
            {% for ip in control_plane_ips %}
            cp-{{ loop.index }}:
              ansible_host: {{ ip }}
              talos_role: controlplane
              node_ip: {{ ip }}
            {% endfor %}
        workers:
          hosts:
            {% for ip in worker_ips %}
            worker-{{ loop.index }}:
              ansible_host: {{ ip }}
              talos_role: worker
              node_ip: {{ ip }}
            {% endfor %}
      vars:
        cluster_name: "{{ cluster_name }}"
        cluster_endpoint: "https://{{ control_plane_ips[0] }}:6443"
        talos_version: "{{ talos_version }}"
        kubernetes_version: "{{ kubernetes_version }}"