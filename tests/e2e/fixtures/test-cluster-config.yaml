# InfraFlux v2.0 - Test Configuration
# Test fixture for end-to-end testing

apiVersion: v1
kind: InfraFluxConfig
metadata:
  name: infraflux-test-cluster
  namespace: infraflux-system
  labels:
    app.kubernetes.io/name: infraflux
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/part-of: infraflux
  annotations:
    config.infraflux.dev/schema-version: "v2.0.0"
    config.infraflux.dev/generated-by: "InfraFlux E2E Testing"

data:
  # Core Cluster Configuration
  cluster_name: "infraflux-test"
  cluster_domain: "cluster.local"
  environment: "development"  # Using development for testing
  
  # Talos Linux Configuration
  talos_version: "v1.10.0"
  talos_image_factory_url: "https://factory.talos.dev"
  talos_extensions:
    - "qemu-guest-agent"
    - "util-linux-tools"
  
  # Kubernetes Configuration  
  kubernetes_version: "v1.31.0"
  
  # Network Configuration
  pod_subnets:
    - "10.244.0.0/16"
  service_subnets:
    - "10.96.0.0/12"
  
  # Node Configuration (Test IPs)
  control_plane_ips:
    - "192.168.100.10"
    - "192.168.100.11" 
    - "192.168.100.12"
  worker_ips:
    - "192.168.100.20"
    - "192.168.100.21"
  
  # Proxmox Configuration (Test values)
  proxmox_host: "test-proxmox.local"
  proxmox_user: "root@pam"
  proxmox_node: "test-pve"
  proxmox_storage: "local-lvm"
  
  # VM Configuration (Reduced for testing)
  vm_cores: 2
  vm_memory: 2048  # Reduced for testing
  vm_disk_size: "20G"
  vm_network_bridge: "vmbr0"
  
  # Security Configuration
  security:
    enable_pod_security_standards: true
    enable_network_policies: true
    enable_rbac: true
    sealed_secrets_version: "v0.24.5"
    api_only_access: true
  
  # GitOps Configuration
  gitops:
    enabled: true
    git_repository: "https://github.com/test-user/infraflux-test.git"
    git_branch: "main"
    flux_version: "v2.4.0"
    sync_interval: "5m"
  
  # Application Configuration (Minimal for testing)
  applications:
    # Core Infrastructure
    cilium:
      enabled: true
      version: "1.16.0"
    cert_manager:
      enabled: true
      version: "v1.13.0"
    
    # Monitoring Stack (Basic)
    monitoring:
      enabled: true
      prometheus: true
      grafana: true
      loki: false
    
    # Security Stack
    security_stack:
      enabled: true
      sealed_secrets: true
      falco: false
      trivy: false
    
    # Productivity Applications (Disabled for testing)
    productivity:
      enabled: false
      nextcloud: false
      vaultwarden: false
      gitea: false
    
    # Media Applications (Disabled for testing)
    media:
      enabled: false
      jellyfin: false
      sonarr: false
      radarr: false
  
  # Resource Configuration (Minimal for testing)
  resources:
    default_requests:
      cpu: "50m"
      memory: "64Mi"
    default_limits:
      cpu: "200m"
      memory: "256Mi"
  
  # Storage Configuration
  storage:
    default_storage_class: "local-path"
    enable_longhorn: false
    backup_enabled: false
  
  # Advanced Configuration
  advanced:
    enable_gpu_support: false
    enable_auto_updates: true
    cluster_timezone: "UTC"
    log_level: "info"
  
  # Production Enhancement Configuration (All enabled for testing)
  production:
    # Security Hardening
    enable_audit_logging: true
    enable_pod_security_policies: true
    enable_kernel_hardening: true
    enable_selinux: false
    
    # Performance Optimization
    enable_cpu_manager: true
    enable_topology_manager: true
    enable_bbr_congestion_control: true
    optimize_kernel_parameters: true
    
    # Monitoring Integration
    enable_metrics_server: true
    enable_node_exporter: true
    enable_enhanced_logging: true
    
    # Resource Management
    enable_resource_quotas: true
    enable_limit_ranges: true
    system_reserved_cpu: "100m"
    system_reserved_memory: "256Mi"
    kube_reserved_cpu: "50m"
    kube_reserved_memory: "128Mi"
    
    # High Availability
    enable_pod_disruption_budgets: true
    enable_node_affinity: true
    
    # Network Security
    enable_network_policies: true
    enable_ingress_security: true
    
    # Storage Optimization
    enable_storage_optimization: true
    enable_disk_quotas: true
  
  # External Auth Configuration (Disabled for testing)
  external_auth:
    enabled: false
    oidc_issuer_url: ""
    oidc_client_id: ""
    oidc_username_claim: "email"
    oidc_groups_claim: "groups"
  
  # Custom Extensions (Disabled for testing)
  extensions:
    enable_custom_ca: false
    custom_ca_certificate: ""
    enable_private_registry: false
    private_registry_url: ""