---
# Discord notification provider
apiVersion: notification.toolkit.fluxcd.io/v1beta2
kind: Provider
metadata:
  name: discord
  namespace: flux-system
spec:
  type: discord
  channel: infraflux-deployments
  secretRef:
    name: discord-webhook
    key: webhook-url

---
# Slack notification provider
apiVersion: notification.toolkit.fluxcd.io/v1beta2
kind: Provider
metadata:
  name: slack
  namespace: flux-system
spec:
  type: slack
  channel: '#infraflux-deployments'
  secretRef:
    name: slack-webhook
    key: webhook-url

---
# Generic webhook provider for custom integrations
apiVersion: notification.toolkit.fluxcd.io/v1beta2
kind: Provider
metadata:
  name: webhook
  namespace: flux-system
spec:
  type: generic
  address: http://webhook-service.flux-system:8080/hook
  secretRef:
    name: webhook-secret
    key: token

---
# Email notification provider (SMTP)
apiVersion: notification.toolkit.fluxcd.io/v1beta2
kind: Provider
metadata:
  name: email
  namespace: flux-system
spec:
  type: generic-hmac
  address: http://smtp-forwarder.flux-system:8080/email
  secretRef:
    name: smtp-credentials
    key: smtp-config