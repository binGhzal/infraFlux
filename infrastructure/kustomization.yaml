apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure Components for InfraFlux v2.0
# Core platform services managed by Flux

resources:
  # Core Controllers
  - controllers/cilium
  - controllers/cert-manager
  - controllers/sealed-secrets
  
  # Configuration Sources
  - sources/container-registry
  
  # Platform Configs
  - configs/cluster-issuers
  - configs/network-policies