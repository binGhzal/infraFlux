apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: infrastructure-controllers
  annotations:
    config.kubernetes.io/local-config: "true"

# Flux-managed infrastructure controllers
# Note: Core infrastructure is deployed by Ansible in cluster/base/
# This directory is for NEW controllers that benefit from Flux GitOps

resources:
  # Flux image automation controllers
  - image-automation/
  
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/part-of: infraflux
      
# Note: This is intentionally minimal to avoid duplicating
# the sophisticated infrastructure already in cluster/base/