---
# Image Automation Controller for updating Git repositories
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: image-automation-controller
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: image-automation-controller
      version: ">=0.37.0"
      sourceRef:
        kind: HelmRepository
        name: fluxcd
        namespace: flux-system
      interval: 12h
  values:
    # Controller configuration
    replicaCount: 1
    
    image:
      repository: fluxcd/image-automation-controller
      tag: "v0.37.1"
      
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 64Mi
        
    # Security context
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: ["ALL"]
        
    # Monitoring
    prometheus:
      enabled: true
      
    # Git automation configuration
    env:
      - name: RUNTIME_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace