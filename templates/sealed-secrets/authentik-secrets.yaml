# Authentik Sealed Secrets Template
# Generate with: ./seal-secret.sh authentik-secrets authentik secret_key "your-super-secret-key-here"

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: authentik-secrets
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: authentik
spec:
  encryptedData:
    # Replace these with actual sealed values
    secret_key: REPLACE_WITH_SEALED_SECRET_KEY
    postgres_password: REPLACE_WITH_SEALED_POSTGRES_PASSWORD  
    redis_password: REPLACE_WITH_SEALED_REDIS_PASSWORD
  template:
    metadata:
      name: authentik-secrets
      namespace: authentik
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: secrets
        app.kubernetes.io/part-of: authentik
    type: Opaque

# To create the actual sealed secrets, use these commands:
# 
# echo -n "your-super-secret-key-here" | kubeseal --raw --from-file=/dev/stdin --name authentik-secrets --namespace authentik --scope cluster-wide
# echo -n "postgres-password-here" | kubeseal --raw --from-file=/dev/stdin --name authentik-secrets --namespace authentik --scope cluster-wide  
# echo -n "redis-password-here" | kubeseal --raw --from-file=/dev/stdin --name authentik-secrets --namespace authentik --scope cluster-wide