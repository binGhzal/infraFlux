# Cloudflare Secrets Template
# Copy this file and replace placeholder values with your actual Cloudflare credentials
# Then encrypt with: kubeseal -f cloudflare-secrets.yaml -w cloudflare-sealed-secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-secrets
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cloudflare-dns
    app.kubernetes.io/part-of: infraflux
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  # Cloudflare API Token (scoped to Zone:Read, DNS:Edit)
  api-token: "your-cloudflare-api-token-here"
  
  # Optional: Cloudflare API Key and Email (legacy auth method)
  api-key: "your-cloudflare-global-api-key-here"
  email: "your-cloudflare-email@example.com"

---
# Instructions for creating Cloudflare API Token:
# 1. Login to Cloudflare dashboard: https://dash.cloudflare.com/
# 2. Go to "My Profile" -> "API Tokens"
# 3. Click "Create Token"
# 4. Use "Custom token" template with permissions:
#    - Zone:Zone:Read (for all zones)
#    - Zone:DNS:Edit (for specific zone or all zones)
# 5. Add zone resource: Include -> Zone -> your-domain.com
# 6. Copy the token and replace the placeholder above
# 7. Encrypt with kubeseal:
#    kubeseal -f cloudflare-secrets.yaml -w cloudflare-sealed-secrets.yaml
# 8. Apply the sealed secret: kubectl apply -f cloudflare-sealed-secrets.yaml
# 9. Delete the plaintext file: rm cloudflare-secrets.yaml

# Alternative: Use the Global API Key method (less secure)
# 1. Go to "My Profile" -> "API Tokens" 
# 2. View "Global API Key"
# 3. Use both email and api-key fields above