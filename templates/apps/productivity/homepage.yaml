---
# Homepage Dashboard Template
apiVersion: v1
kind: Namespace
metadata:
  name: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: "{{ cluster_name | default('InfraFlux') }} Dashboard"
    theme: dark
    color: slate
    headerStyle: boxed
    layout:
      - Infrastructure:
          style: row
          columns: 3
      - Applications:
          style: row
          columns: 4
      - Monitoring:
          style: row
          columns: 3

  services.yaml: |
    - Infrastructure:
        - Proxmox:
            href: "https://{{ proxmox_host | default('proxmox.local') }}:8006"
            description: Virtualization Management
            icon: proxmox.png
        - Traefik:
            href: "http://traefik.{{ cluster_domain | default('local.cluster') }}"
            description: Ingress Controller
            icon: traefik.png
        - Kubernetes:
            href: "https://{{ cluster_domain | default('local.cluster') }}:6443"
            description: K3s Cluster
            icon: kubernetes.png

    - Applications:
        - Authelia:
            href: "http://auth.{{ cluster_domain | default('local.cluster') }}"
            description: Authentication
            icon: authelia.png
        - Nextcloud:
            href: "http://nextcloud.{{ cluster_domain | default('local.cluster') }}"
            description: File Storage
            icon: nextcloud.png
        - Vaultwarden:
            href: "http://vault.{{ cluster_domain | default('local.cluster') }}"
            description: Password Manager
            icon: vaultwarden.png
        - Gitea:
            href: "http://git.{{ cluster_domain | default('local.cluster') }}"
            description: Git Repository
            icon: gitea.png

    - Monitoring:
        - Grafana:
            href: "http://grafana.{{ cluster_domain | default('local.cluster') }}"
            description: Monitoring Dashboard
            icon: grafana.png
        - Hubble:
            href: "http://hubble.{{ cluster_domain | default('local.cluster') }}"
            description: Network Observability
            icon: cilium.png
        - Prometheus:
            href: "http://prometheus.{{ cluster_domain | default('local.cluster') }}"
            description: Metrics Collection
            icon: prometheus.png

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - search:
        provider: duckduckgo
        target: _blank

  bookmarks.yaml: |
    - Infrastructure:
        - K3s Documentation:
            - href: https://k3s.io/
        - Traefik Documentation:
            - href: https://doc.traefik.io/traefik/
        - Proxmox Documentation:
            - href: https://pve.proxmox.com/wiki/Main_Page

    - Development:
        - GitHub:
            - href: https://github.com/
        - Docker Hub:
            - href: https://hub.docker.com/
        - Kubernetes:
            - href: https://kubernetes.io/docs/

  docker.yaml: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: config
          mountPath: /app/config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: config
        configMap:
          name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
spec:
  selector:
    app: homepage
  ports:
  - name: http
    port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: homepage
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: "home.{{ cluster_domain | default('local.cluster') }}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homepage
            port:
              number: 80