---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Development environment overlay for InfraFlux v2.0

namespace: default

bases:
  - ../../base

# Development-specific labels
commonLabels:
  environment: development
  
# Development-specific annotations
commonAnnotations:
  environment: development
  managed-by: flux-v2

# Resource modifications for development
patchesStrategicMerge: []

# Development-specific resources
resources: []