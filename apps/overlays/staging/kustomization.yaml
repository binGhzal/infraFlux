---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging environment overlay for InfraFlux v2.0

namespace: default

bases:
  - ../../base

# Staging-specific labels
commonLabels:
  environment: staging
  
# Staging-specific annotations
commonAnnotations:
  environment: staging
  managed-by: flux-v2

# Resource modifications for staging
patchesStrategicMerge: []

# Staging-specific resources
resources: []