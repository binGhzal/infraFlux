apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: apps-production
  annotations:
    config.kubernetes.io/local-config: "true"

# Production environment overlay for Flux-managed applications
namespace: flux-system

resources:
  - ../base

patchesStrategicMerge:
  - example-app-patch.yaml

commonLabels:
  environment: production
  app.kubernetes.io/managed-by: flux

# Production-specific image policies (stable versions only)
images:
  - name: nginx
    newTag: "1.25"