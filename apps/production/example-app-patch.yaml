apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: example-app
  namespace: example-app
spec:
  chart:
    spec:
      # Stable versions only in production
      version: ">=1.0.0"
  values:
    # Production-specific configuration
    replicaCount: 2
    
    ingress:
      hosts:
        - host: example.production.local
          paths:
            - path: /
              pathType: Prefix
              
    # Production security and performance
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      
    # Higher resource allocation for production
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
        
    # Production-grade monitoring
    serviceMonitor:
      enabled: true
      
    # Strict upgrade policy
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
      
  # Longer timeout for production deployments
  timeout: 10m