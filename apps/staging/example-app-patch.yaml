apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: example-app
  namespace: example-app
spec:
  chart:
    spec:
      # Allow pre-release versions in staging
      version: ">=1.0.0-alpha"
  values:
    # Staging-specific configuration
    replicaCount: 1
    
    ingress:
      hosts:
        - host: example.staging.local
          paths:
            - path: /
              pathType: Prefix
              
    # Enable testing and debugging in staging
    debug:
      enabled: true
      
    # Relaxed resource limits for testing
    resources:
      requests:
        memory: "32Mi"
        cpu: "25m"
      limits:
        memory: "64Mi"
        cpu: "50m"
        
  # Enable automatic testing in staging
  test:
    enable: true
    timeout: 300s