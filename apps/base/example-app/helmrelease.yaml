apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: example-app
  namespace: example-app
spec:
  interval: 30m
  chart:
    spec:
      chart: nginx
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h
  values:
    # Common values for all environments
    replicaCount: 1
    
    image:
      tag: "1.25"
      
    service:
      type: ClusterIP
      port: 80
      
    ingress:
      enabled: true
      className: "traefik"
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: example.local.cluster
          paths:
            - path: /
              pathType: Prefix
              
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
        
  # Health checks
  test:
    enable: true
    
  # Upgrade configuration
  upgrade:
    remediation:
      retries: 3