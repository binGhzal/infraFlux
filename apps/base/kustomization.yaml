---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base application configurations for InfraFlux v2.0
# These are environment-agnostic base configurations

resources:
  # Monitoring Stack
  - monitoring/
  
  # Future applications
  # - security/
  # - productivity/

# Common labels for all applications
commonLabels:
  app.kubernetes.io/part-of: infraflux-v2
  app.kubernetes.io/managed-by: flux

# Common annotations
commonAnnotations:
  flux.weave.works/automated: "true"