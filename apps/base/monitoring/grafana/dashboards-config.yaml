---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infraflux-dashboards-config
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  infraflux-dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: infraflux
        orgId: 1
        folder: InfraFlux
        type: file
        disableDeletion: false
        editable: true
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards/infraflux