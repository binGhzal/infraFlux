apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: monitoring
data:
  config.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # Kubernetes pod logs
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          # Include only pods with logs
          - source_labels:
              - __meta_kubernetes_pod_controller_name
            regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
            target_label: __tmp_controller_name
          
          # Add namespace label
          - source_labels:
              - __meta_kubernetes_pod_namespace
            target_label: namespace
          
          # Add pod name label  
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          
          # Add container name label
          - source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container
          
          # Add node name label
          - source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node
          
          # Include pod labels as log labels
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          
          # Set log path
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__

      # Kubernetes audit logs (if available)
      - job_name: kubernetes-audit
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-audit
              __path__: /var/log/audit/*.log

      # System logs from nodes
      - job_name: system-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: system-logs
              __path__: /var/log/{messages,syslog}

      # Talos specific logs (API server logs)
      - job_name: talos-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: talos-logs
              __path__: /var/log/talos/*.log