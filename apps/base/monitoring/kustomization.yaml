---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Monitoring Stack for InfraFlux v2.0
# Comprehensive observability platform

namespace: monitoring

resources:
  - namespace.yaml
  - prometheus/
  - grafana/
  - loki/
  - promtail/

# Common labels for all monitoring components
commonLabels:
  app.kubernetes.io/part-of: infraflux-monitoring
  app.kubernetes.io/managed-by: flux

# Common annotations
commonAnnotations:
  flux.weave.works/automated: "true"