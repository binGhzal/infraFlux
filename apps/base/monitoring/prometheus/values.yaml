# Prometheus Stack Configuration for InfraFlux v2.0

# Global configuration
global:
  imageRegistry: ""
  imagePullSecrets: []

# Prometheus Server configuration
prometheus:
  prometheusSpec:
    # Data retention
    retention: 30d
    retentionSize: 45GB
    
    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    
    # Resource management
    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi
    
    # Security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
    
    # Additional scrape configs for Talos
    additionalScrapeConfigs:
      - job_name: 'talos-kubelet'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

# Grafana configuration
grafana:
  enabled: true
  
  # Admin credentials (use sealed secrets in production)
  adminPassword: admin  # TODO: Replace with sealed secret
  
  # Persistence
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  
  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging
    hosts:
      - grafana.local.cluster
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.local.cluster
  
  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472
  
  # Resource management
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# AlertManager configuration
alertmanager:
  enabled: true
  
  alertmanagerSpec:
    # Storage configuration
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    
    # Security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
    
    # Resource management
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Node Exporter configuration
nodeExporter:
  enabled: true
  
# Kube State Metrics configuration
kubeStateMetrics:
  enabled: true

# Default rules configuration
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true