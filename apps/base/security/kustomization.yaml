---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Security Stack for InfraFlux v2.0
# Authentication, authorization, and security services

namespace: security

resources:
  - namespace.yaml
  # Future security applications:
  # - authentik/
  # - trivy/
  # - crowdsec/

# Common labels for all security components
commonLabels:
  app.kubernetes.io/part-of: infraflux-security
  app.kubernetes.io/managed-by: flux

# Common annotations
commonAnnotations:
  flux.weave.works/automated: "true"